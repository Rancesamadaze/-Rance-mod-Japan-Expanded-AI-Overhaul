l_japanese:
 # --- communism route ---
 jap_prc_union.1.t:0 "東京からの提案"
 jap_prc_union.1.d:0 "日本共産党から、我々に歴史的な提案が届いた。彼らは、帝国主義に対抗し、真の汎アジア・ソビエト連邦を築くためには、互いの境界を取り払う必要があると考えている。彼らは二つの政権を統合し、東京の指導の下で太平洋ソビエト連邦を通じて共に未来へ進むことを提案している。"
 jap_prc_union.1.a:0 "プロレタリアの団結のため、合併に同意する！"
 jap_prc_union.1.b:0 "いや、我々は独自の道を歩む。"
 jap_prc_union.2.t:0 "中国同志の返答"
 jap_prc_union.2.d:0 "中国共産党は我々の提案に同意した！彼らは国境を捨て、我々の太平洋ソビエト連邦へ加わる意思を示している。これは歴史的瞬間であり、アジアのプロレタリアはかつてないほど団結している。"
 jap_prc_union.2.a:0 "労働者よ、団結せよ！"
 JAP_cede_leadership_to_mao:0 "最高指導権を譲渡"
 JAP_cede_leadership_to_mao_desc:0 "太平洋ソビエト連邦の長き未来のためには、進路を導く真の舵手が必要である。毛沢東同志が理論と実践で示した卓越した成果は、彼こそが最もふさわしい人物であることを証明している。東京は一歩退き、大陸から来たこの巨人を全力で支えることになる。"
 RULE_OPTION_COMMUNIST_PACIFIC_UNION:0 "太平洋ソビエト連邦（中国共産党との合流）"
 RULE_OPTION_COMMUNIST_PACIFIC_UNION_DESC:0 "日本はマルクス主義を受け入れ、「講座派」ルートを通じて太平洋ソビエト連邦を建設し、最終的に中国共産党との合併を目指して、毛沢東に指導権を譲渡する。"
 JAP_revolutionary_fervor_idea:0 "革命的熱狂"
 JAP_revolutionary_fervor_idea_desc:0 "治安維持法の枷から解き放たれ、我らの戦士は故郷を守り同志を解放する中で、驚くべき戦闘力を発揮している。\n§G中核領土攻撃：+15%§!\n§G中核領土防御：+15%§!"
 Anti_Kuomintang_League:0 "アジア反封建統一戦線"
 jap_prc_union.3.t:0 "反封建統一戦線の結成を提案"
 jap_prc_union.3.d:0 "日本政府から緊急電が届いた。国民党反動派は現実を認めようとしないばかりか、「封建の残滓と軍閥支配を一掃する」歴史的過程を妨げ続けている。これを受け、日本側は一時的にイデオロギー上の相違を脇に置くことを提案してきた。彼らは、蒋介石の官僚資本主義的支配を打倒しない限り、アジア人民に解放の日は永遠に訪れないと述べている。そのため、日本側は我が軍に全面的支援を提供し、共に敵へ立ち向かう用意があるという。"
 jap_prc_union.3.a:0 "独裁者と封建軍閥を打倒せよ。協力に同意する！"
 jap_prc_union.3.b:0 "何があろうと、帝国主義者とは組まない！"
 jap_prc_union.4.t:0 "延安方面が同盟に同意"
 jap_prc_union.4.d:0 "毛沢東は返電し、提案を受諾した。彼は弁証法の観点を引用し、現在の主要矛盾の下では、大地主・大資産階級の利益を代表する国民党政府を徹底的に消滅させることが最優先の任務であると指摘した。中国共産党軍は直ちに銃口を転じ、我が軍と連携して南京政府を挟撃する。"
 jap_prc_union.4.a:0 "旧時代の弔鐘が鳴った。"
 CHI_regime_collapse:0 "政権の全面崩壊"
 CHI_regime_collapse_desc:0 "首都南京が赤色同盟に占領されたことで、国民政府の法統と士気は完全に崩壊した。軍は戦闘を拒み、官僚たちは相次いで離反し、もはや抵抗に意味はない。"
 jap_prc_war.100.t:0 "南京陥落：赤い夜明け"
 jap_prc_war.100.d:0 "我々の防衛線は無いも同然だった。日本共産党と中国共産党の連合軍はすでに南京城内へ進入し、総統府には赤旗が翻っている。これは単なる軍事的敗北ではなく、政治的な死刑宣告である。この知らせが全国へ広がるにつれ、各地の軍閥は独立を宣言し、前線部隊は編制ごと降伏している。我々もまた、現実を直視すべき時だ。"
 jap_prc_war.100.a:0 "各部隊に通達せよ。無条件降伏だ。"
 jap_prc_war.101.t:0 "国民党政権の崩壊"
 jap_prc_war.101.d:0 "「アジア反封建統一戦線」が南京を占領したことで、蒋介石の国民政府はすでに名ばかりの存在となった。そこで中国と日本の共産党員が会師したことは、旧秩序の終焉を示している。観測筋は、中国戦線の戦闘は数日以内に完全に終結すると見ている。"
 jap_prc_war.101.a:0 "東アジアの新秩序が確立された。"
 RULE_OPTION_JAP_PACIFIC_UNION:0 "太平洋ソビエト連邦（日共）"
 RULE_OPTION_JAP_PACIFIC_UNION_DESC:0 "日本は共産主義を受け入れ、反封建統一戦線を結成し、最終的に「太平洋ソビエト社会主義共和国連邦」国策を通じて中国と合併する。毛沢東がこの新たな超大国を率い、同時にコミンテルンへ加盟してソ連と肩を並べて戦う。\n\nAIは関連国策を優先的に選択する。"
 JAP_created_mao_name:0 "毛沢東"
 JAP_jcp_war_operations_category:0 "日本共産党戦争行動"
 JAP_jcp_war_operations_category_desc:0 "目的を達成するために、全面的勝利が必ずしも必要とは限らない。そうすれば、我々はより遠大な目標へ力を注ぐことができる。"
 JAP_force_kwantung_surrender:0 "関東軍に降伏を命じる"
 JAP_joint_ultimatum_to_warlords:0 "反封建共同最後通牒を発する"
 JAP_joint_ultimatum_to_warlords_desc:0 "我々は中国共産党と統一戦線を結成した。今こそ一地方に割拠する旧軍閥どもに武器を置かせ、人民による再編を受け入れさせる時である。"
 japan_jcp.11.t:0 "日共と中国共産党からの共同最後通牒"
 japan_jcp.11.d:0 "日本共産党と中国共産党は共同声明を発表し、我々の割拠行為をアジア解放を阻む封建的残滓であると非難した。彼らは、いま武器を置いて中国共産党の再編を受け入れるなら、我々の身の安全と部隊の待遇を保証すると約束している。さもなくば、我々は徹底的な殲滅の運命に直面することになる。"
 japan_jcp.11.a:0 "大勢は去った。生き残るため、再編を受け入れる。"
 japan_jcp.11.b:0 "こんなものは馬鹿げた脅迫だ！我々は決して屈しない！"
 JAP_liberate_nanjing_collapse:0 "南京解放：旧政権の崩壊"
 JAP_liberate_nanjing_collapse_desc:0 "南京は解放された！国民党反動派の首都は再び持ち主を変えたが、今回は人民の手へ戻ったのである。指揮中枢の陥落により、敵軍の士気は完全に崩壊した。我々はこの機会を利用し、その残る防衛区域を全面的に接収して、完全降伏を迫るべきである。"
 JAP_controls_nanjing_tooltip:0 "南京（11913）が我が方または同盟国に支配されている"
 japan_jcp.12.t:0 "南京解放"
 japan_jcp.12.d:0 "日本共産党と中国共産党の連合軍先鋒が中華門へ入ったことで、国民党政府の統治中枢である南京は正式に持ち主を変えた。かつて歴史上起こった悲劇とは異なり、今回入城した部隊は規律を保ち、街路には赤い旗が翻っている。\n\n国民党政府の行政機構は完全な麻痺に陥り、主要官僚は慌てて逃亡した。ここに築かれた統一戦線にとって、これは決定的な勝利であり、東アジア大陸における旧秩序の終焉を示している。"
 japan_jcp.12.a:0 "これはアジア人民共通の勝利だ！"
 japan_jcp.12.b:0 "暗黒の日だ……"
 japan_jcp.12.c:0 "東アジアの情勢は激変した。"
 JAP_PRC_union:0 "太平洋ソビエト社会主義共和国連邦"
 JAP_PRC_union_DEF:0 "太平洋ソビエト社会主義共和国連邦"
 JAP_PRC_union_ADJ:0 "アジア"
 JAP_jcp_join_the_comintern:0 "コミンテルンに加盟"
 JAP_jcp_join_the_comintern_desc:0 "今日の世界は帝国主義者、ファシスト、そして貪欲な資本家たちによって脅かされている。我々とソ連の道が完全には同じでないとしても、相違を脇に置くべきである。団結してこそ、赤い星は世界を照らすことができる。"
 JAP_soviet_research_exchange:0 "日ソ科学研究交流"
 JAP_soviet_research_exchange_desc:0 "コミンテルン加盟後、日本共産党とソ連は深度ある科学研究交流を開始した。異なる分野における先進技術を共有することで、両国の国防工業は共に新たな段階へ進むことになる。"
 JAP_artillery_tech_bonus:0 "日ソ科学研究交流：火砲ボーナス"
 JAP_tank_tech_bonus:0 "日ソ科学研究交流：戦車ボーナス"
 SOV_naval_tech_bonus:0 "日ソ科学研究交流：艦船ボーナス"
 SOV_air_tech_bonus:0 "日ソ科学研究交流：航空機ボーナス"
 JAP_help_prc_against_chi:0 "中国への緊急介入"
