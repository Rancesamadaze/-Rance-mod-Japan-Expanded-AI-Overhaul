 JAP_kaguya_events.1.t:0 "八雲紫からの手紙"
 JAP_kaguya_events.1.d:0 "八雲紫の手紙によれば、今の皇道派の隠し指導者にはあまり興味がないので、輝夜を日本の統治者として招きたい、ということだった。\n\n輝夜はもともと、大戦略ゲームの愛好家である。しかも、永遠亭に座ったまま、少々多すぎる時間をただ潰しているだけなら、いっそ世界征服の楽しみを味わってみるのも悪くない。HoI4の腕前を上げてから戻り、妹紅を誘って一局PvPでもすれば、それだけで十分に元は取れるだろう。\n\nそうして輝夜は、ほとんど迷うことなくその提案を受け入れた。\nなにしろ、姫がたまに気まぐれを起こすのは、ごく普通のことなのだから。"
 JAP_kaguya_events.1.a:0 "LINK START!"
