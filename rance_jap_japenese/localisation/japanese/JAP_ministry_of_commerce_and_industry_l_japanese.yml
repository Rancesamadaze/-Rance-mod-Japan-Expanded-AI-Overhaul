l_japanese:
 JAP_ministry_of_commerce_and_industry_decisions:0 "商工省"
 JAP_ministry_of_commerce_and_industry_decisions_desc:0 "商工省は§Y[ROOT.GetName]§!の商工業政策、産業整備、生産統制を統括し、民需工業、資源配分、企業経営事務を調整することで、国家の経済動員と工業発展能力を強化する。"
 JAP_shoko_special_charter:0 "商工省特別認可"
 JAP_shoko_special_charter_desc:0 "§Y商工省§!が特定地域へ発給する建設認可。認可を受けた地域は、工事の進行中に追加の行政調整と資源の重点配分を受け、地域全体の建設効率を高める。"
 JAP_unlock_ministry_of_commerce_and_industry_decisions_tt:0 "§Y政局が安定§!した後、ディシジョンカテゴリー§Y商工省§!を解禁する。"
 JAP_shoko_develop_kanto:0 "関東開発"
 JAP_shoko_develop_kanto_desc:0 "§Y関東§!とは通常、§Y東京§!を中心とする本州東部の広大な地域を指し、日本の§Y政治、経済、文化、交通§!が最も発達した地域の一つである。一般に§Y東京§!、§Y神奈川§!、§Y埼玉§!、§Y千葉§!、§Y茨城§!、§Y栃木§!、§Y群馬§!の七都県を含む。\n\nここには§Y近代的大都市§!の繁栄だけでなく、自然景観と伝統文化が並存する独特の魅力もある。日本の首都である§Y東京§!は§Y国際金融、商業、流行の中心地§!であり、§Y横浜§!は港町としての性格が鮮明で、§Y鎌倉§!には濃厚な歴史的雰囲気が残っている。\n\n同時に、§Y関東地方§!は交通網が整い、生活の利便性が高く、§Y教育、科学技術、産業資源§!が高度に集中しているため、国内から多くの人口を引き寄せるだけでなく、海外からの来訪者にも親しまれている。"
 JAP_shoko_develop_kanto_mission:0 "関東開発計画"
 JAP_shoko_develop_kanto_mission_desc:0 "§Y商工省§!は関係機関と連携し、§Y首都圏§!の諸機能を充実させるため、§Y関東地方整備計画§!を推進している。これは§Y戦時体制§!下で増大する§Y行政、交通、産業需要§!に対応し、同時に地域の§Y電力輸送§!能力を整えるためのものである。\n\n関連工事はいまだ実施中であり、その§Y進捗と成果§!は、後続の§Y投資と拡張方針§!を定める重要な根拠となる。"
 JAP_shoko_develop_tokaido:0 "東海道開発"
 JAP_shoko_develop_tokaido_desc:0 "§Y東海道§!は本州太平洋沿岸に位置し、古くから§Y東京§!と§Y関西§!を結ぶ交通・産業回廊であった。域内には港湾、鉄道、都市網が密集し、重工業、商業流通、人口集積の強みを兼ね備えており、§Y[ROOT.GetName]§!本土で最も潜在力のある経済動脈の一つである。"
 JAP_shoko_develop_tokaido_mission:0 "東海道開発計画"
 JAP_shoko_develop_tokaido_mission_desc:0 "§Y商工省§!は§Y東海道§!地域の整備を進め、沿線の§Y工業生産§!、§Y交通統制§!、§Y電力輸送§!、§Y航空研究能力§!を強化している。期限内にインフラと工場の拡充を完了できれば、§Y[ROOT.GetName]§!の経済幹線としての機能をさらに充実させられる。"
 JAP_shoko_develop_kansai:0 "関西開発"
 JAP_shoko_develop_kansai_desc:0 "§Y関西§!は日本の伝統的な政治・商工業の重鎮の一つであり、§Y大阪§!、§Y京都§!、§Y神戸§!などの重要都市を含む。同地域は§Y[ROOT.GetName]§!本土の重要な工業基地であると同時に、内海航運、鉄道幹線、都市消費市場を結ぶ中核地域でもある。"
 JAP_shoko_develop_kansai_mission:0 "関西開発計画"
 JAP_shoko_develop_kansai_mission_desc:0 "§Y商工省§!は関係機関と連携し、§Y関西§!地域の整備を進めている。目的は同地域の§Y工業受容力§!、§Y交通統制§!、§Y電力輸送§!能力を高めることである。期限内にインフラと軍需工場の拡充を完了できれば、§Y[ROOT.GetName]§!西部工業中枢としての地位をさらに固められる。"
 JAP_shoko_develop_sanyo:0 "山陽開発"
 JAP_shoko_develop_sanyo_desc:0 "§Y山陽§!は瀬戸内海沿いに広がり、多くの港湾、工業都市、交通結節点を有する本州西部の重要な商工業地帯である。インフラをさらに整備し、民需工業を拡充できれば、§Y[ROOT.GetName]§!の内海経済回廊としての総合的機能を強化できる。"
 JAP_shoko_develop_sanyo_mission:0 "山陽開発計画"
 JAP_shoko_develop_sanyo_mission_desc:0 "§Y商工省§!は§Y山陽§!地域の整備を進め、同地域の§Y工業生産§!、§Y港湾交通§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!本土工業体系への支援力をさらに高められる。"
 JAP_shoko_develop_north_kyushu:0 "北九州開発"
 JAP_shoko_develop_north_kyushu_desc:0 "§Y北九州§!は日本西端に位置し、石炭・鉄資源、港湾条件、工業基盤を兼ね備える、§Y[ROOT.GetName]§!本土の重要な重工業・海運拠点である。インフラをさらに整備し、民需工業を拡充できれば、西部工業と物流の中核としての地位を強化できる。"
 JAP_shoko_develop_north_kyushu_mission:0 "北九州開発計画"
 JAP_shoko_develop_north_kyushu_mission_desc:0 "§Y商工省§!は§Y北九州§!地域の整備を進め、同地域の§Y工業生産§!、§Y港湾交通§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!西部工業体系への支援力をさらに高められる。"
 JAP_shoko_develop_hokuriku:0 "北陸開発"
 JAP_shoko_develop_hokuriku_desc:0 "§Y北陸§!は日本海に面し、港湾、山地交通、地方工業基盤を兼ね備えた、本州中北部の重要な地域支点である。インフラ改善と民需工業の拡充を継続すれば、§Y[ROOT.GetName]§!北部経済と後方工業への受容力をさらに高められる。"
 JAP_shoko_develop_hokuriku_mission:0 "北陸開発計画"
 JAP_shoko_develop_hokuriku_mission_desc:0 "§Y商工省§!は§Y北陸§!地域の整備を進め、同地域の§Y工業生産§!、§Y交通統制§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!北部工業体系への支援力をさらに強められる。"
 JAP_shoko_develop_koshinetsu:0 "甲信越開発"
 JAP_shoko_develop_koshinetsu_desc:0 "§Y甲信越§!は本州中部を横断し、山地資源、内陸交通、沿海港湾との連絡を兼ね備えた、日本海と内地市場を結ぶ重要地域である。インフラをさらに整え、造船所を拡充できれば、§Y[ROOT.GetName]§!の海運と後方工業体系への支援能力を大きく高められる。"
 JAP_shoko_develop_koshinetsu_mission:0 "甲信越開発計画"
 JAP_shoko_develop_koshinetsu_mission_desc:0 "§Y商工省§!は§Y甲信越§!地域の整備を進め、同地域の§Y沿岸工業§!、§Y交通連絡§!、§Y電力輸送§!能力を強化している。期限内にインフラと造船所の拡充を完了できれば、§Y[ROOT.GetName]§!の海運体系と後方工業への支援力をさらに強められる。"
 JAP_shoko_develop_sanin:0 "山陰開発"
 JAP_shoko_develop_sanin_desc:0 "§Y山陰§!は日本海沿いに広がり、港湾、鉱産資源、地方工業基盤を有する、本州西北部の重要な地域支点である。インフラ改善と民需工業の拡充を継続すれば、§Y[ROOT.GetName]§!西部後方工業と沿岸輸送への受容力をさらに高められる。"
 JAP_shoko_develop_sanin_mission:0 "山陰開発計画"
 JAP_shoko_develop_sanin_mission_desc:0 "§Y商工省§!は§Y山陰§!地域の整備を進め、同地域の§Y工業生産§!、§Y交通連絡§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、現地の§Y工業受容空間§!をさらに広げ、後続の軍需生産により安定した§Y電力網の支え§!を提供できる。"
 JAP_shoko_develop_shikoku:0 "四国開発"
 JAP_shoko_develop_shikoku_desc:0 "§Y四国§!は瀬戸内海と太平洋の間に位置し、港湾、沿岸交通、地方工業基盤を有する、§Y[ROOT.GetName]§!の内海航運と西日本沿岸輸送における重要な結節点である。インフラ改善と民需工業の拡充を継続すれば、海運と後方工業への受容力をさらに強化できる。"
 JAP_shoko_develop_shikoku_mission:0 "四国開発計画"
 JAP_shoko_develop_shikoku_mission_desc:0 "§Y商工省§!は§Y四国§!地域の整備を進め、同地域の§Y工業生産§!、§Y港湾交通§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!の内海海運体系への支援力をさらに強められる。"
 JAP_shoko_develop_south_kyushu:0 "南九州開発"
 JAP_shoko_develop_south_kyushu_desc:0 "§Y南九州§!は太平洋と東シナ海に臨み、港湾、沿岸航運、地方工業基盤を兼ね備えた、§Y[ROOT.GetName]§!南西方面の重要な海運・後方工業拠点である。インフラ改善と民需工業の拡充を継続すれば、造船所建設と海運体系への支援能力をさらに強化できる。"
 JAP_shoko_develop_south_kyushu_mission:0 "南九州開発計画"
 JAP_shoko_develop_south_kyushu_mission_desc:0 "§Y商工省§!は§Y南九州§!地域の整備を進め、同地域の§Y工業生産§!、§Y港湾交通§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!南部海運体系と造船所建設への支援力をさらに強められる。"
 JAP_shoko_develop_tohoku:0 "東北開発"
 JAP_shoko_develop_tohoku_desc:0 "§Y東北地方§!は本州北部に広がる広大な地域であり、農産、林業、鉱産、沿海港湾条件を兼ね備えた、§Y[ROOT.GetName]§!北方の後備工業と輸送体系における重要な腹地である。§Y南東北§!と§Y北東北§!の整備を統合的に進めれば、工業生産、交通連絡、戦時後方体系への支援能力をさらに高められる。"
 JAP_shoko_develop_south_tohoku_mission:0 "南東北開発計画"
 JAP_shoko_develop_south_tohoku_mission_desc:0 "§Y商工省§!は§Y南東北§!地域の整備を進め、同地域の§Y工業生産§!、§Y交通連絡§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!北方工業体系への支援力をさらに高められる。"
 JAP_shoko_develop_north_tohoku_mission:0 "北東北開発計画"
 JAP_shoko_develop_north_tohoku_mission_desc:0 "§Y商工省§!は§Y北東北§!地域の整備を進め、同地域の§Y工業生産§!、§Y交通連絡§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!北方後備工業・輸送拠点としての地位をさらに固められる。"
 JAP_shoko_develop_hokkaido:0 "北海道開発"
 JAP_shoko_develop_hokkaido_desc:0 "§Y北海道§!は§Y[ROOT.GetName]§!の北疆に位置し、広大な地域、農林水産、鉱産、港湾条件を兼ね備えた、§Y[ROOT.GetName]§!北方開発と後方工業の重要な支点である。インフラ改善と民需工業の拡充を継続すれば、軍需生産、エネルギー輸送、北方交通体系への受容力をさらに高められる。"
 JAP_shoko_develop_hokkaido_mission:0 "北海道開発計画"
 JAP_shoko_develop_hokkaido_mission_desc:0 "§Y商工省§!は§Y北海道§!地域の整備を進め、同地域の§Y工業生産§!、§Y交通連絡§!、§Y電力輸送§!能力を強化している。期限内にインフラと民需工業の拡充を完了できれば、§Y[ROOT.GetName]§!北方軍需体系への支援力をさらに強化し、同時に§Y地域発展§!を推進できる。"
 JAP_shoko_develop_shanghai:0 "上海開発"
 JAP_shoko_develop_shanghai_desc:0 "§Y上海§!は長江河口に位置し、§Y[ROOT.GetName]§!にとって華中地区で最も重要な港湾、工業、商業の中枢の一つである。現地のインフラをさらに整備し、造船所能力を拡充できれば、海運、工業調整、沿岸経済体系への支援力をさらに強化できる。"
 JAP_shoko_develop_shanghai_mission:0 "上海開発計画"
 JAP_shoko_develop_shanghai_mission_desc:0 "§Y商工省§!は§Y上海§!地域の整備を進め、同地域の§Y港湾輸送§!、§Y工業協同§!、§Y電力輸送§!能力を強化している。期限内にインフラと造船所の拡充を完了できれば、§Y[ROOT.GetName]§!沿岸工業と海運拠点としての地位をさらに固められる。"

