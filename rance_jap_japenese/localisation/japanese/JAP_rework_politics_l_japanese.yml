 JAP_rework_rana:0 "要楽奈"
 JAP_rework_kaguya:0 "蓬莱山輝夜"
 JAP_rework_kaguya_desc:0 "§L輝夜は月の民の一族であり、月の姫として大切に育てられた。甘やかされて育った彼女は非常にわがままで、一時の気まぐれから永琳に禁断の秘薬、すなわち蓬莱の薬を作らせ、自らもその製作に関わった。\n\nこの件はすぐに露見し、輝夜は処刑された。しかし永遠の力を持つ彼女は、たとえ死んでもただちに転生してしまうため、実際には本当に死ぬことなどできなかった。罰として、彼女は次の世で地上の卑しき民と共に暮らすよう命じられ、凡塵へ落とされ、そこで「輝夜」の名をもって地上での生活を始めた。\n\n数年後、輝夜の刑期は満了し、本来なら月へ帰るはずだった。だが、地上で自分を世話してくれた人々への未練から、彼女はためらっていた。その時、彼女は旧知の永琳と出会う。当時の出来事に強い罪悪感を抱いていた永琳は月の使者を裏切り、輝夜の逃亡を助け、彼女と共に人里離れた深山へ隠れ住んだ。\n\nそれから長い歳月が過ぎ、月から使者が来ることはなく、二人も過去を次第に忘れ、穏やかに暮らしていた。ところがある日、逃亡してきた月の兎が永遠亭に迷い込む。名を鈴仙という彼女は、月が人類に侵略され、月面に旗を立てて月は自分たちのものだと宣言した者までいる、と語った。輝夜はそこでようやく、自分もまた月の民であることを思い出した。\n\nさらに数十年が過ぎたある満月の夜、鈴仙は月の兎の仲間からの知らせを受け取った。月の民は地上人に対する最後の全面戦争を決定し、次の満月の夜までに鈴仙を連れ戻しに来るというのだ。輝夜は永琳と相談した末、鈴仙を月へ返すことを拒むと決めた。逃亡と隠棲を続けるよりも、輝夜は地上で堂々と暮らすことを望んだのである。\n\nそこで永琳は「満月を地上から消す」方法を提案した。輝夜たちは本物の月を隠し、偽物の月で空の満月を置き換え、地上と月との往来を断ち切った。唯一の誤算は、満月の力に依存する妖怪たちがこれほど強大だとは思わなかったことである。最終的に、人間と妖怪が力を合わせたことで、この幻術は破られた。\n\nだがその結果、彼女たちは幻想郷そのものが閉ざされた空間であり、月の使者が容易には再び来られないことも知った。今や輝夜、永琳、鈴仙は隠れ住み続ける必要もなく、永遠亭で静かで普通の生活を送っている。月の最後の結末については、地上に定住することを選んだ彼女たちには、知るすべもない。§!"
