l_japanese:
 JAP_comintern_industrial_integration:0 "§Rコミンテルン工業統合§!"
 JAP_comintern_industrial_integration_desc:0 "我々はソビエト連邦およびその他のコミンテルン加盟国と、深度ある工業協力を展開する。東アジアの農産物と軽工業製品がシベリア鉄道を通じて絶え間なくモスクワへ流れ込む一方で、ソ連の工業専門家たちは「五カ年計画」の貴重な経験を惜しみなく伝えてくれる。幾億もの労働者の汗の中で、壮大な工場が次々と建ち上がり、轟音とともに稼働を始める。この瞬間、鋼鉄と理想は一つとなり、共産主義の最終的勝利は目前に迫っている。"
 JAP_rework_national_defense_state:0 "国防体制"
 JAP_rework_national_defense_state_desc:0 "[ROOT.GetLeader]は「新体制」の実施を宣言し、日本を「国防国家」へと転換して、祖国防衛のために国民を総動員する。国家総動員法に基づき、政府は全国のあらゆる資源を掌握する。この体制により、帝国は永世にわたり存続するだろう！"
 JAP_comintern_mutual_trade:0 "§Rコミンテルン相互貿易協定§!"
 JAP_comintern_mutual_trade_desc:0 "極東革命の勝利により、日本共産党は列島の生産力を解放しただけでなく、中国の同志と肩を並べて戦い、アジア大陸の各地に赤旗を打ち立てた。もはや我々は海外に孤立した工業の孤島ではない。『コミンテルン相互貿易協定』を通じて、ソビエトの奔流のごとき石油、中国から絶え間なく供給されるタングステン鉱、日本の最高水準の精密技術は、帝国主義の鎖を打ち砕く奔流へと合流する。ソ連の同志たちの重戦車には日本製の精密光学照準器が搭載され、レニングラードの労働者は大阪の織機で縫われた暖かい綿服を身にまとうだろう。急速な工業化を遂げた中国は、国防工業を支える戦略鉱物を提供するだけでなく、その広大な農地と日本の先進的な農業機械が結びつくことで、陣営全体の枯れることなき赤い糧倉となる。我々は資本主義市場から完全に独立した赤色内循環体制を築き上げ、一トンの戦略資源、一粒の食糧に至るまで、無産階級政権を守る鋼鉄の衛士へと正確に転化していく！"
 JAP_vanguard_of_the_proletariat:0 "§Rプロレタリア前衛隊§!"
 JAP_vanguard_of_the_proletariat_desc:0 "膨大な人口基盤を有する我々は、もはや盲目的な数の動員を追求しない。代わりに、階級的自覚が最も高く、戦闘意志が最も固いプロレタリア精鋭による前衛部隊を築き上げる。理想と信念に満ちた若者たちは軍の要職を担い、徹底した訓練を受ける一方で、利己的で死を恐れる寄生虫どもは§Y徹底的に清算§!される。こうして生まれる前衛隊は比類なき組織規律と戦略遂行能力を備え、我々は絶対的な質的優位によって、あらゆる反動勢力の抵抗を§Y粉砕§!する。"
 JAP_kodoha_yamato_spirit_conscription:0 "§Y大和魂§!"
 JAP_kodoha_yamato_spirit_conscription_desc:0 "大和魂は神社、学校、兵営の訓示の中に留まるべきものではなく、国を挙げて一つとなる戦時秩序へと化さねばならない。青年、地方名望家、労働者、農民は皆、皇国精神に鼓舞されて国土防衛と従軍の責を担い、帝国は危難の時にあっても堅忍なる民心と不屈の戦線を維持できるだろう。"
 JAP_rework_lecture_group_compliance_law:0 "§R土豪を打倒し、土地を分配せよ§!"
 JAP_rework_lecture_group_compliance_law_desc:0 "占領地の旧秩序を、そのまま残しておくことなど決して許されない。土豪劣紳とあらゆる反動支配勢力を§R徹底的に打倒§!し、土地と生計を労働人民の手に取り戻してこそ、真に大衆を動員し、獲得することができる。そうして初めて、新生の赤色政権は郷村に根を下ろし、抵抗の土壌を失わせ、人民大衆に革命政権を心から支持させることができる。"
 JAP_rework_lecture_group_infrastructure_law:0 "§Rインフラ大躍進§!"
 JAP_rework_lecture_group_infrastructure_law_desc:0 "§R革命§!は旧世界を破壊するだけでなく、新たな世界を建設しなければならない。道路を築き、鉄道を通し、港湾を整え、倉庫を建設するのだ。分散し閉ざされた地域を結び、人力と物資を迅速に組織する、轟々たる建設運動を巻き起こしてこそ、占領地は真に革命事業の堅固な後方となる。"
 JAP_rework_lecture_group_industrial_construction_law:0 "§R赤色工業化§!"
 JAP_rework_lecture_group_industrial_construction_law_desc:0 "我々が掌握する土地は、搾取されるままの植民地ではなく、社会主義建設へ組み込まれるべき§R革命根拠地§!である。統一計画によって工場・鉱山の建設、施設の拡充、労働力の配分を統括し、赤色政権の組織力によって工業化を迅速に推し進めなければならない。この土地を旧帝国主義の従属物から、革命戦争と新社会建設を支える工業基地へと転換するのだ。"
 JAP_rework_lecture_group_output_law:0 "§R袖をまくって懸命に働こう§!"
 JAP_rework_lecture_group_output_law_desc:0 "政権がすでに樹立された以上、生産の手を緩めることは決して許されない。工場は全力で稼働し、鉱山は潜在力を掘り起こし、地方幹部と労働大衆は皆気力を奮い起こし、あらゆる力を組織しなければならない。統一指導の下で増産の熱潮を巻き起こしてこそ、この土地の生産潜力を十分に発揮し、前線をよりよく支援し、建設に奉仕し、§R革命政権§!を固めることができる。"
 JAP_rework_kaguya_industrial_extraction_law:0 "§g地上人よ、私にすべてを捧げよ§!"
 JAP_axis_economic_integration:0 "§1枢軸国経済貿易統合§!"
 JAP_axis_economic_integration_desc:0 "今や世界の旧秩序は日増しに崩壊しつつあり、英米本位の経済体制はすでに腐朽無能にして、東亜と世界の新生を支えるには到底足りぬ。今後の帝国は、戦場において友邦と協力して奮戦するのみならず、経済・工業・技術・輸送・資源統制の諸領域において、枢軸諸国とより堅固にして不可分の共同体を結成せねばならない。独伊の技術と経験、皇国の組織と精神、南方の物資と生産力は、すべて同一の大目的の下に統合されるべきであり、三国協力を欧亜を貫き世界を揺るがす偉力へと化すのである。これは一時の便宜策ではなく、新秩序を建設し、共栄圏を切り拓き、皇国万世の基業を定めるための必由の大道である。枢軸諸国を経済貿易の上で一体化してこそ、不抜の意志と無尽の生産をもって、帝国が担う歴史的使命を完遂できるのだ。"
