 JAP_soviet_economic_exchange:0 "ソビエト経済協力"
 JAP_soviet_economic_exchange_desc:0 "我々はコミンテルン加盟国との経済協力を強化し、農産物と工業原材料を提供することで、重工業面の支援を得るべきである。"
 JAP_soviet_economic_exchange_tt:0 "陣営内の他の加盟国は毎月、我が国の民需産業の一部に基づく経済的な生産余剰を受け取る。"
 JAP_dominate_comintern:0 "コミンテルンを主導"
 JAP_dominate_comintern_desc:0 "コミンテルン内での我々の地位が高まるにつれ、我々は徐々にその事実上の指導者となりつつある。そろそろ友邦ソ連に、いくつかの要求を突きつけてもよい頃だろう。革命の最高利益のため、我々の責任範囲を再配分する必要がある。"

 jap_comintern.1.t:0 "東方からの要求"
 jap_comintern.1.d:0 "日本が我々に要求を突きつけてきた。より良い協力のため、彼らは我々のシベリア領土を日本へ移譲することを望んでいる。その見返りとして、日本は我々のヨーロッパ全域に対する請求権を承認するという。これは我々の地政学的構図を根底から変えるだろう。"
 jap_comintern.1.a:0 "より大きな利益のため、同意しよう。"
 jap_comintern.1.b:0 "これは恐喝だ！断じて認められない！"

