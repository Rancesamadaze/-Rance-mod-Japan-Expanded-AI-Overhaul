 # Japan Rework focus tooltip overrides
 JAP_rework_reduce_zaibatsu_focus_cost_tt:0 "§Y$JAP_sea_guide_the_zaibatsus$§!または§Y$JAP_democratic_work_with_the_zaibatsus$§!を選択すると、この国家方針の所要日数が§G21§!日に短縮される。"
 JAP_rework_ship_management_committee_tt:0 "§Y$convoy_1$§!：\n   £production_cost 生産コスト：§G-15.00%§!\n   艦船生産コスト：§G-7.50%§!"
 JAP_rework_naval_armaments_program_tt:0 "§Y$JAP_focus_on_aircraft_carriers$§!を完了すると：空母の§Y派生型§!を作成し、§Y翔鶴型§!建造用の§Y生産ライン4本§!を開設する。\n§Y$JAP_balanced_naval_approach$§!を完了すると：空母と超重戦艦の§Y派生型§!を作成し、§Y翔鶴型§!および§Y大和型§!建造用の§Y生産ライン2本§!をそれぞれ開設する。\n§Y$JAP_sea_battleship_initiative$§!を完了すると：超重戦艦の§Y派生型§!を作成し、§Y大和型§!建造用の§Y生産ライン4本§!を開設する。\nさらに、選択した国家方針に応じた§Y装備コスト削減§!を得る。"
