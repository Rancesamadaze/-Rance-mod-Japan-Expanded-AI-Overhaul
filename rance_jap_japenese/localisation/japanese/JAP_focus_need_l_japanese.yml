 JAP_rework_learn_from_maoism:0 "毛沢東思想を学ぶ"
 JAP_rework_learn_from_maoism_desc:0 "日本共産党と中国共産党の合流、そして東アジア地域の統一により、毛沢東同志は我らの連合国家の最高指導者となった。革命の成果を固め、未来への道を示すため、党・軍・社会の全域で毛沢東思想を深く持続的に学ぶ運動を開始しなければならない。理論によって武装することで、すべての革命戦士が大衆路線と持久戦の真髄を理解し、東アジアの赤い力を盤石なものとする。"
 JAP_mao_guerrilla_tactic:0 "毛沢東式現代遊撃戦術"
 JAP_mao_guerrilla_tactic_ult:0 "§R火と鋼§!"
 JAP_mao_guerrilla_tactic_ult_desc:0 "世界革命は今や白熱の段階に入った。帝国主義との戦争で優位を得るため、毛沢東の遊撃戦理論を先進的な作戦方式と結びつける必要がある。そうすれば、必ずや赤旗を世界中に掲げられるだろう！"
 JAP_mao_guerrilla_tactic_ult_cus_tt:0 "[GetJmgtuabc]"
 JAP_mao_guerrilla_tactic_ult_act_tt:0 "§C毛沢東式現代遊撃戦術§!：\n§Y全ての歩兵系大隊：§!\n 主導性：§G+10.0%§!\n 装備鹵獲率：§G+10.0%§!"
 JAP_eternal_long_march:0 "§R永遠の長征§!"
 JAP_eternal_long_march_desc:0 "これはもはや普通の帝国主義でも、普通の資本主義でもない。旧世界の反動機械は全力で回転し、人民が未来へ進む道を押し潰そうとしている。このような敵を前にして、我々は本気で殴り返さねばならない！\n[ROOT.GetNameDef]の人民がなお革命の行く末を案じていたその時、銀髪赤眼のAI少女が彼らの前に現れた。彼女は八雲紫に連れられてきた、未来から来た超人工知能だと名乗った。\n「征ちゃんと呼んでくれればいいよ」少女はそう言った。「ここからは、あなたたちの革命を手伝わせてもらうね」"
 JAP_eternal_long_march_tt:0 "§R征ちゃん§!が国家指導者として登場する。\n§YこれはPHANTASM難易度でのみ利用できる強力な隠し国家方針である。§!"

