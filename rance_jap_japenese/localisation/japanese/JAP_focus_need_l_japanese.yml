 # 南アジア諸国の解放
 JAP_liberate_south_asia_target:0 "§Y[FROM.GetNameDef]§!の武装解放を支援"
 JAP_liberate_south_asia_target_desc:0 "我が党の全面的な支援と秘密工作により、新たな§R赤色政権§!が§Y[FROM.GetNameDef]§!に堂々と立ち上がり、革命の星火は燎原の火となった。だが頑迷な帝国主義反動派は、なお一部の領土にしがみつき、死に物狂いの抵抗を続けている。今こそ決定的な時である。我々はさらに多くの勇敢な義勇兵と軍事顧問を派遣し、先進装備を携えて現地の同志の総攻撃を支援しなければならない。雷霆の手段をもって、傲慢な侵略者どもを完全に掃き出し、正義の赤旗を南アジアの空に翻らせるのだ！"
 JAP_expel_colonial_powers_from_south_asia:0 "§Y[FROM.GetNameDef]§!の南アジア植民地独立を扇動"
 JAP_expel_colonial_powers_from_south_asia_desc:0 "我が党の秘密資金と指導の下、§Y[FROM.GetNameDef]§!の南アジア植民地各地では、すでに暗流が渦巻いている。我々は秘密無線で自由の火種を撒き、先進的な理論と精良な武器を現地の抵抗勢力へ密輸している。機は熟した。最後のひと押しさえ与えれば、革命の烈火は燃え上がり、腐朽した植民地支配を打倒し、労農階級の赤色政権を打ち立てるだろう。彼らを助け、この貪欲な帝国主義者どもを歴史の塵へ徹底的に掃き込もう！"

 # 西アジア諸国の解放
 JAP_liberate_middle_east_target:0 "§Y[FROM.GetNameDef]§!の武装解放を支援"
 JAP_liberate_middle_east_target_desc:0 "我が党の全面的な支援と秘密工作により、新たな§R赤色政権§!が§Y[FROM.GetNameDef]§!に堂々と立ち上がり、革命の星火は果てしない黄砂を席巻している。だが頑迷な帝国主義反動派は、なお油田とオアシスにしがみつき、死に物狂いの抵抗を続けている。今こそ決定的な時である。我々はさらに多くの勇敢な義勇兵と軍事顧問を派遣し、先進装備を携えて現地の同志の総攻撃を支援しなければならない。雷霆の手段をもって、傲慢な侵略者どもを完全に掃き出し、正義の赤旗を西アジアの広大な大地に翻らせるのだ！"
 JAP_expel_colonial_powers_from_middle_east:0 "§Y[FROM.GetNameDef]§!の西アジア植民地独立を扇動"
 JAP_expel_colonial_powers_from_middle_east_desc:0 "我が党の秘密資金と指導の下、§Y[FROM.GetNameDef]§!の西アジア植民地各地では、すでに暗流が渦巻いている。我々は秘密無線で自由の火種を撒き、先進的な理論と精良な武器を砂漠の抵抗勢力へ密輸している。機は熟した。最後のひと押しさえ与えれば、革命の烈火は石油盆地に燃え上がり、腐朽した植民地支配を打倒し、労農階級の赤色政権を打ち立てるだろう。彼らを助け、この貪欲な帝国主義者どもを歴史の塵へ徹底的に掃き込もう！"
 JAP_commu_free_the_world:0 "§Y[FROM.GetNameDef]§!の解放を宣言"
 JAP_commu_free_the_world_desc:0 "世界革命は白熱の段階に入ったが、§Y[FROM.GetNameDef]§!の人民はいまだ反動派の恐怖支配の下にある。彼らを解放する時だ。"

 Rance_JAP_sway_disillusioned_young_officers:0 "§Y注意：この国家方針は、大半の将軍を我が方に忠実にできる。§!"

# =========================================
# KAGUYA
# =========================================
 JAP_kaguya_princess:0 "幻想郷一の姫君"
 JAP_kaguya_princess_desc:0 "億を超える歳月を過ごした姫であっても、退屈を覚えることはある。\nとりわけ永遠亭がいつも通り静かで、宴会も異変も、妹紅との決闘もない日々であれば、輝夜が新しい楽しみを探したくなるのも当然だった。\n\nそんなある日、妖怪の賢者・八雲紫から届いた手紙が、穏やかな日常を破った。"
 JAP_kaguya_eientei:0 "永遠亭の面々を集める"
 JAP_kaguya_eientei_desc:0 "NEET生活に慣れた輝夜にとって、一国の主を務めるのはやはり少し荷が重い。\n輝夜は永琳と兎たちも一緒に連れてくることにした。"
 JAP_kaguya_dragon:0 "難題「龍の頸の玉 -五色の弾丸-」"
 JAP_kaguya_dragon_desc:0 "『竹取物語』において、かぐや姫が出した五つの難題の一つ。かぐや姫は求婚者の大伴御行に、龍の頸で五色に輝く玉を取ってくるよう命じた。大伴御行はまず家臣に探させたが成果はなく、ついには自ら船で海へ出て龍を討とうとした。だが暴風雨に遭い、危うく命を落としかける。神に詫びてどうにか帰還したものの、疲労で重病となり、笑いものになった。"
 JAP_kaguya_bowl:0 "難題「仏の御石の鉢 -砕けぬ意志-」"
 JAP_kaguya_bowl_desc:0 "『竹取物語』において、かぐや姫が出した五つの難題の一つ。かぐや姫は求婚者の石作皇子に、天竺へ赴き仏の石鉢を探すよう求めた。天竺への道の遠さに困った石作皇子は、山寺で煤けた石鉢を見つけ、言葉巧みに仏の鉢だと偽ろうとした。しかしその鉢は光を帯びず、すぐ偽物と見抜かれ、石作皇子は鉢を捨ててすごすごと去るしかなかった。"
 JAP_kaguya_robe:0 "難題「火鼠の皮衣 -焦れぬ心-」"
 JAP_kaguya_robe_desc:0 "『竹取物語』において、かぐや姫が出した五つの難題の一つ。かぐや姫は求婚者の阿倍右大臣に、燃えない火鼠の皮衣を探すよう命じた。阿倍右大臣は人を中国へ遣わし、高価で華美な皮衣を買い求めた。彼はそれをかぐや姫に献上したが、火に入れると皮衣は灰となり、阿倍右大臣も何も得られず引き下がった。"
 JAP_kaguya_shell:0 "難題「燕の子安貝 -永命線-」"
 JAP_kaguya_shell_desc:0 "『竹取物語』において、かぐや姫が出した五つの難題の一つ。かぐや姫は求婚者の石上麻呂足に、燕の子安貝を探すよう命じた。石上麻呂足は自ら高所の燕の巣を探したが何も見つからず、誤って落ちて重傷を負った。失意の彼は病床に伏し、かぐや姫はその境遇を哀れんで見舞いの手紙を送った。返事を書いたのち、彼は世を去った。"
 JAP_kaguya_branch:0 "難題「蓬莱の玉の枝 -夢色の郷-」"
 JAP_kaguya_branch_desc:0 "『竹取物語』において、かぐや姫が出した五つの難題の一つ。かぐや姫は求婚者の車持皇子に、蓬莱山へ赴き「蓬莱の玉の枝」を得るよう求めた。車持皇子は名工たちを雇い、三年をかけて密かに偽物の玉枝を作らせた。かぐや姫は危うく信じかけたが、職人たちが賃金を求めて現れたことで、皇子の企ては露見した。"
 JAP_kaguya_eternity:0 "永遠と須臾の罪人"
 JAP_kaguya_eternity_desc:0 "輝夜は永遠と須臾を操る能力を持つ。永遠とは歴史がなく、未来永劫に未来が訪れない世界である。その中では、活動していても時間が止まっているのと同じだ。もう一つの力である須臾は、永遠とは逆に一瞬の時間であり、人間には感知できない一瞬を集めて行動に用いることができる。この時間を利用すれば、複数の異なる歴史を作り出せる。どちらの能力も時間を操る力であり、普通の人間にはあまりにも強大である。"
 JAP_kaguya_eternity_time_cycle_tt:0 "§Y輝夜§!は毎月の前半に、§Y「永遠」§!と§Y「須臾」§!の力を交互に発動し、我が国へ強力なボーナスを与える。"
 JAP_kaguya_burial:0 "秘術「天文密葬法」"
 JAP_kaguya_burial_desc:0 "天文密葬法は、永琳最大の秘術の一つである。\n月を偽りの月に置き換え、何の理由もなく空を弄び、地上と月のつながりを断つことができる。\n永琳が用意した偽りの月は、本物の月よりもなお豪奢である。"
 JAP_kaguya_burial_night_attack_debuff_tt:0 "§Y八意永琳§!が§B月の賢者の秘術§!を施す。§R偽りの月§!の影響により、敵は§Y夜間戦闘§!で§Rより厳しい状況§!に置かれる。§0桜花爛漫の程度（PHANTASM）§!では、この秘術はさらに強化される。"
 JAP_kaguya_return:0 "「永夜返し -世明け-」"
 JAP_kaguya_return_desc:0 "よかった、みんなとても嬉しそうだ。彼女たちはそれぞれ自分だけの力を持っていて、遊ぶにも実に爽快だ。\n結局、幻想郷のほかの人々は、あの尽きない夜に悩まされていたのだけれど。"
 JAP_kaguya_return_decision_tt:0 "§Y$JAP_hakko_ichiu$§!および§Y$JAP_the_jeweled_spear_has_struck$§!でアンロックされるディシジョンの§Y一部制限§!を解除する。"
 JAP_kaguya_return_expel_barbarians_tt:0 "この後に§Y尊王攘夷§!を完了した場合、付与される§Y$JAP_expel_the_barbarians$§!は§Y永続効果§!になる。"
 JAP_kaguya_return_hard_claim_tt:0 "§YLUNATIC§!以上の難易度では、§Y全世界のすべての州§!への請求権を獲得する。"
 JAP_kaguya_return_normal_claim_tt:0 "§YHARD§!以下の難易度では、§Yアジア§!、§Y中東§!、§Yオーストラリア§!地域への請求権を獲得する。"
