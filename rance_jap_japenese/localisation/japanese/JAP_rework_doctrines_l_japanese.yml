 jap_rance_air_sea_joint_assault_landing_air_cover_coordination:0 "上陸航空掩護調整"
 jap_rance_air_sea_joint_assault_marine_raider_elements:0 "特戦突撃分隊"
 jap_rance_air_sea_joint_assault_amphibious_mechanized_reserve:0 "水陸両用機動予備隊"
 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT:0 "山林浸透作戦"
 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT_DESC:0 "日本海軍特戦隊は、山岳部隊とレンジャーの訓練経験を取り入れ、高地登攀、森林浸透、小隊単位の独立作戦を海軍特戦編制へ組み込むことで、複雑な地形でも攻撃のリズムを維持できる。"
 jap_rance_mountain_ranger_assault_add_mastery_bonus_effect_tooltip:0 "§Y山林浸透作戦§!学説の熟練度獲得ボーナスを得る。"
