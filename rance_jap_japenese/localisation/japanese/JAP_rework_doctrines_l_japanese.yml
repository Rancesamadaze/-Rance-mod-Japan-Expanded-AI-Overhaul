 # --- project doctrine keys ---
 ##学说相关
 RANCE_GRAND_DOCTRINE_FURINKAZAN:0 "風林火山"
 RANCE_GRAND_DOCTRINE_FURINKAZAN_DESC:0 "疾きこと風の如く、徐かなること林の如く、侵掠すること火の如く、動かざること山の如し。風林火山の学説は、迅速な機動、堅実な前進、猛烈な突破、粘り強い防御を一つの陸軍作戦体系へ統合し、部隊が戦況に応じて攻守のリズムを切り替え、常に主導権を保てるようにする。"
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN:0 "艦隊決戦"
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN_DESC:0 "一戦をもって制海権を決する。艦隊決戦の学説は、遠洋索敵、航空先制、夜戦雷撃、主力艦砲戦を同一の決戦構想へ組み込み、敵艦隊を不利な時機に会戦へ引きずり出し、連続打撃の中で制海能力を失わせる。"
 tactic_rance_swift_as_wind:0 "其疾如風"
 tactic_rance_steady_as_forest:0 "其徐如林"
 tactic_rance_raiding_as_fire:0 "侵掠如火"
 tactic_rance_immovable_as_mountain:0 "不動如山"
 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT:0 "海空統合強襲"
 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT_DESC:0 "日本海軍特戦隊は、水陸両用強襲、空挺支援、艦隊火力の調整を一つの作戦手順へ統合する。専門訓練を受けた突撃隊はより速く海岸堡を確保し、制空権と艦砲射撃の支援下で攻勢を持続できる。"
 jap_rance_air_sea_joint_assault_add_mastery_bonus_effect_tooltip:0 "§Y海空統合強襲§!学説の熟練度獲得ボーナスを得る。"
 JAP_rance_improved_amphibious_designs_idea:0 "改良型水陸両用設計"
 JAP_rance_advanced_amphibious_designs_idea:0 "統合型水陸両用設計"
