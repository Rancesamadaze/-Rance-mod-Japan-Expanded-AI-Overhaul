 JAP_war_readiness_northern_guangdong_hunan_supply_network_desc:"战备建设局将自§Y广东§!北部向§Y湖南§!南部整修短线铁路，并在湖南前进节点设立补给中心，使华南通往湖南内陆的补给线能够沿最短路径推进。"
