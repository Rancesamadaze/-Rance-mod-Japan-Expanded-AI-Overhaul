 JAP_intelligence_agency_decisions_tokko:0 "特高课"
 JAP_intelligence_agency_decisions_tokko_desc:0 "特高课负责统合国内治安、反间谍与思想警察事务。无论其隶属于内务系统还是同军部协作，它都将追踪、审查并清除帝国内部的颠覆威胁。"
 JAP_intelligence_agency_decisions_naimubu:0 "内务部"
 JAP_intelligence_agency_decisions_naimubu_desc:0 "内务部负责统合革命政权的国内安全、反间谍与政治保卫工作。敌对势力、地下组织与反革命破坏都将在这里被记录、审查并处理。"
 JAP_intelligence_agency_decisions_public_security:0 "公安厅"
 JAP_intelligence_agency_decisions_public_security_desc:0 "公安厅负责统合民主政府下的公共安全、反间谍与国内情报工作。它以法律与文官监督为名，在战时维护国家安全秩序。"
