 JAP_war_readiness_ningbo_wenzhou_all_segments_completed.tt:0 "宁波至温州海陆补给线的分段工程已全部完成。"
 JAP_war_readiness_fujian_coastal_inland_supply_network:"整备福建沿海与内陆补给网"
 JAP_war_readiness_fujian_coastal_inland_supply_network_desc:"战备建设局将沿§Y温州§!、§Y福州§!、§Y厦门§!与§Y赣州§!方向分段整备铁路、港湾与内陆补给节点，扩充福建沿海军港泊地，并把浙江南部与江西南部的交通支点接入福建前进补给网。"
