 JAP_imperial_headquarters_scripted_landing_anatolia_to_dalmatia_raid_tt:"§R本次行动将立即发动奇袭登陆。§!\n选择该决议时，将立即以§C安纳托利亚支点§!为作战支点，对§R达尔马提亚§!发动小规模奇袭登陆，打乱当地守军部署，并造成较大战斗损失。奇袭完成后，行动仍会占用相应登陆整备能力，需等待§O30日§!整备结束后才能再次调度。"
 JAP_imperial_headquarters_scripted_landing_anatolia_to_montenegro:"§C安纳托利亚支点方向登陆黑山§!"
 JAP_imperial_headquarters_scripted_landing_anatolia_to_montenegro_desc:"大本营将以§C安纳托利亚支点§!为作战支点，调集登陆兵力，组织海上运输，并在海空掩护下准备打开§R黑山§!方向的进攻通道。若敌军防线已在连续牵制下暴露破绽，本次行动将改为立即发动的奇袭登陆。"
 JAP_imperial_headquarters_scripted_landing_anatolia_to_montenegro_plan_tt:"还需成功实施§O[?JAP_scripted_landing_raid_remaining|0]§!次登陆行动，方可发动奇袭。\n本次行动为§O常规登陆§!：将向§R黑山§!守军发出登陆预警。§O30日§!后，若§C安纳托利亚支点§!仍可作为作战支点，且§R黑山§!仍由敌方控制，将在黑山发动小规模登陆，打乱当地守军部署，并造成一定战斗损失。"
 JAP_imperial_headquarters_scripted_landing_anatolia_to_montenegro_raid_tt:"§R本次行动将立即发动奇袭登陆。§!\n选择该决议时，将立即以§C安纳托利亚支点§!为作战支点，对§R黑山§!发动小规模奇袭登陆，打乱当地守军部署，并造成较大战斗损失。奇袭完成后，行动仍会占用相应登陆整备能力，需等待§O30日§!整备结束后才能再次调度。"
 JAP_imperial_headquarters_events.1.t:"日本要求移交亚洲领地"
 JAP_imperial_headquarters_events.1.desc:"[FROM.GetNameDefCap]大本营已递交最后通牒，要求[ROOT.GetNameDef]立即移交位于亚洲的全部领地。东京方面宣称，这些据点将被纳入其南方战略防线；若我们拒绝，日本将把争端转为军事行动。"
 JAP_imperial_headquarters_events.1.a:"接受最后通牒"
 JAP_imperial_headquarters_events.1.b:"拒绝他们的威胁"
 JAP_imperial_headquarters_events.2.t:"葡萄牙交出亚洲领地"
 JAP_imperial_headquarters_events.2.desc:"[FROM.GetNameDefCap]已接受我方最后通牒，移交其位于亚洲的全部领地。大本营可以将这些据点纳入南方作战体系。"
 JAP_imperial_headquarters_events.2.a:"正合我意"
 JAP_imperial_headquarters_events.3.t:"葡萄牙拒绝最后通牒"
 JAP_imperial_headquarters_events.3.desc:"[FROM.GetNameDefCap]拒绝撤出亚洲领地，并试图以外交拖延维持其殖民据点。大本营已经准备好以武力夺取这些目标。"
 JAP_imperial_headquarters_events.3.a:"准备夺取这些据点"
 JAP_imperial_headquarters_events.4.t:"侦测到日军登陆企图"
 JAP_imperial_headquarters_events.4.desc:"海岸警戒部队与情报部门报告，日军正在§C[JAP_scripted_landing_origin_state.GetName]§!方向集结兵力，海上运输与掩护活动明显增强，目标可能直指§R[JAP_scripted_landing_target_state.GetName]§!。当地沿岸防务必须立即进入戒备状态。"
 JAP_imperial_headquarters_events.4.a:"确认"
 JAP_imperial_headquarters_events.5.t:"遭受日军奇袭"
 JAP_imperial_headquarters_events.5.desc:"日军突然从§C[JAP_scripted_landing_origin_state.GetName]§!方向发动登陆，先头部队已对§R[JAP_scripted_landing_target_state.GetName]§!沿岸防线造成冲击。通讯与指挥一度陷入混乱，当地守军必须立即稳住阵地。"
 JAP_imperial_headquarters_events.5.a:"确认"
 JAP_rework_equipment_designs:"军需省——装备管理局"
 JAP_rework_equipment_designs_desc:"装备管理局隶属军需省，负责统筹§Y[ROOT.GetName]§!陆海空诸兵器之设计、试制、制式整备与量产衔接，综理战车、舰艇、航空器及其衍生装备之研发事务，并协调军方需求、装备序列与兵装适配，以强化§Y[ROOT.GetName]§!整体军备更新与持续作战能力。"
 JAP_unlock_equipment_design_decisions_tt: "解锁决议组：§Y军需省——装备管理局§!"
 JAP_rework_war_readiness_construction_decisions:"军需省——战备建设局"
 JAP_rework_war_readiness_construction_decisions_desc:"战备建设局隶属军需省，负责统筹战时军需生产所需之后方设施、厂区扩建、储备仓库与要地整备，协调工业建设、军需调拨与军事部署需求，以提升§Y[ROOT.GetName]§!持续动员、装备补充与战场支援能力。"
 JAP_unlock_war_readiness_construction_decisions_tt: "解锁决议组：§Y军需省——战备建设局§!"
 JAP_war_readiness_expand_lushun_naval_base:"扩建旅顺海军基地"
 JAP_war_readiness_expand_lushun_naval_base_desc:"战备建设局将组织工程队整修§Y旅顺§!军港泊地、油弹仓储与修造设施，增强§Y大连§!地区的舰队停泊、补给与维修能力。"
 JAP_war_readiness_lushun_naval_base_completed: "已完成决议：§Y$JAP_war_readiness_expand_lushun_naval_base$§!"
 JAP_war_readiness_manchurian_soviet_border_supply_network:"整备满苏边境补给网"
 JAP_war_readiness_manchurian_soviet_border_supply_network_desc:"战备建设局将沿§Y吉林§!、§Y呼伦贝尔§!、§Y黑龙江§!、§Y松江§!与§Y辽宁§!方向展开边境后勤工程，整修边境铁路、统合仓储转运站与前线补给中心，并扩充航空保障设施，使满苏边境补给点接入既有补给网络。"
 JAP_war_readiness_manchurian_soviet_border_supply_network_completed: "已完成决议：§Y$JAP_war_readiness_manchurian_soviet_border_supply_network$§!"
 JAP_war_readiness_manchurian_soviet_forward_supply_links:"接驳满苏边境前进补给线"
 JAP_war_readiness_manchurian_soviet_forward_supply_links_desc:"在攻占苏军边境补给站后，战备建设局将组织工程队自满苏边境既有补给网向前铺设联络铁路，把新夺取的前进补给节点接入我军后勤体系。"
 JAP_war_readiness_manchurian_soviet_forward_supply_links_completed: "已完成决议：§Y$JAP_war_readiness_manchurian_soviet_forward_supply_links$§!"
 JAP_war_readiness_vladivostok_naval_railway_base:"整备符拉迪沃斯托克海军基地"
 JAP_war_readiness_vladivostok_naval_railway_base_desc:"战备建设局将在夺取§Y符拉迪沃斯托克§!港区后扩建前进海军基地；待§Y符拉迪沃斯托克§!全境受控后，工程队将继续整修港区与既有补给节点之间的铁路联络线。"
 JAP_war_readiness_vladivostok_naval_railway_base_completed: "已完成决议：§Y$JAP_war_readiness_vladivostok_naval_railway_base$§!"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases:"整备哈巴罗夫斯克沿海基地"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases_desc:"战备建设局将在夺取§Y哈巴罗夫斯克§!沿海港区后扩建前进海军基地；待该地区全境受控后，工程队将自既有补给节点向沿海港区铺设联络铁路，把新港区接入满苏边境前进补给网络。"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases_completed: "已完成决议：§Y$JAP_war_readiness_khabarovsk_coastal_naval_railway_bases$§!"
 JAP_war_readiness_jidong_air_naval_base:"整备冀东海空前进基地"
 JAP_war_readiness_jidong_air_naval_base_desc:"战备建设局将在§Y冀东§!展开海空基地整备，扩充沿海泊地、航空场站、油弹仓储与铁路联络线，使入关部队获得更稳定的沿海补给与航空支援。"
 JAP_war_readiness_jidong_air_naval_base_completed: "已完成决议：§Y$JAP_war_readiness_jidong_air_naval_base$§!"
 JAP_war_readiness_bailingmiao_jidong_railway:"整备百灵庙至冀东联络铁路"
 JAP_war_readiness_bailingmiao_jidong_railway_desc:"战备建设局将沿§Y百灵庙§!、§Y察哈尔§!、§Y热河§!与§Y冀东§!方向整修铁路联络线，并扩充草原通道沿线的航空保障设施，把西侧草原通道接入入关后的冀东补给网，为侧翼推进与后续治安驻防提供更稳定的运输条件。"
 JAP_war_readiness_bailingmiao_jidong_railway_completed: "已完成决议：§Y$JAP_war_readiness_bailingmiao_jidong_railway$§!"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network:"整备百灵庙至绥远补给网"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network_desc:"战备建设局将自§Y百灵庙§!向§Y绥远§!方向展开铁路与仓储整备，并接入§Y察哈尔§!一线的既有交通节点，使草原西段的前进补给所能够支撑侧翼推进、机动集结与后续驻防。"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network_completed: "已完成决议：§Y$JAP_war_readiness_bailingmiao_suiyuan_supply_network$§!"
 JAP_war_readiness_jidong_hebei_railway_corridor:"整备冀东至河北入关铁路"
 JAP_war_readiness_jidong_hebei_railway_corridor_desc:"战备建设局将沿§Y冀东§!、§Y北平§!与§Y河北§!方向整修入关铁路走廊，把沿海补给入口接入华北腹地的交通干线，为后续南下与西进提供更可靠的陆上运输条件。"
 JAP_war_readiness_jidong_hebei_railway_corridor_completed: "已完成决议：§Y$JAP_war_readiness_jidong_hebei_railway_corridor$§!"
 JAP_war_readiness_shimen_henan_supply_network:"整备石门至河南补给线"
 JAP_war_readiness_shimen_henan_supply_network_desc:"战备建设局将自§Y石门§!沿既有铁路南下，穿越§Y河北§!并接入§Y河南§!北部前进节点，同时设立补给中心；待§Y河南§!全境受控后，工程队将继续整修通往中原腹地的铁路，使华北内陆向中原方向的推进获得更稳定的铁路补给。"
 JAP_war_readiness_shimen_henan_supply_network_completed: "已完成决议：§Y$JAP_war_readiness_shimen_henan_supply_network$§!"
 JAP_war_readiness_henan_hubei_supply_network:"整备河南至湖北补给线"
 JAP_war_readiness_henan_hubei_supply_network_desc:"战备建设局将自§Y河南§!南部补给节点向§Y湖北§!方向整修铁路，并在湖北前进节点设立补给中心，使中原南下作战部队获得更稳定的后勤支撑。"
 JAP_war_readiness_henan_hubei_supply_network_completed: "已完成决议：§Y$JAP_war_readiness_henan_hubei_supply_network$§!"
 JAP_war_readiness_beiping_jinan_coastal_supply_network:"整备北平至济南沿海补给线"
 JAP_war_readiness_beiping_jinan_coastal_supply_network_desc:"战备建设局将以§Y北平§!一线的交通支点为起点，随战线推进分段整修通往§Y济南§!沿海与内陆的运输线路，并扩充前进港口的泊地、仓储与装卸设施，使山东北岸逐步纳入华北补给网。"
 JAP_war_readiness_beiping_jinan_coastal_supply_network_completed: "已完成决议：§Y$JAP_war_readiness_beiping_jinan_coastal_supply_network$§!"
