 JAP_war_readiness_shanghai_air_naval_base:"整备上海海空基地"
 JAP_war_readiness_shanghai_air_naval_base_desc:"战备建设局将在§Y上海§!组织港湾、机场与油弹仓储扩建工程，强化长江口方向的舰队停泊、航空保障与前进补给能力。"
