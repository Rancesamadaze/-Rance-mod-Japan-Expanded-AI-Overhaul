 JAP_war_readiness_shanghai_suzhou_nanjing_railway_desc:"战备建设局将沿§Y上海§!、§Y苏州§!与§Y南京§!方向整修沪宁铁路联络线，把长江口港区、苏州交通节点与南京方面的前进补给线连为一体。"
 JAP_war_readiness_shanghai_suzhou_nanjing_railway_completed: "已完成决议：§Y$JAP_war_readiness_shanghai_suzhou_nanjing_railway$§!"
 JAP_war_readiness_ningbo_wenzhou_coastal_supply_network:"整备宁波至温州海陆补给线"
 JAP_war_readiness_ningbo_wenzhou_coastal_supply_network_desc:"战备建设局将沿§Y宁波§!至§Y温州§!方向整修浙江沿海铁路，并扩建温州前进泊地与军需装卸设施，使浙江南部沿海能够承担更大规模的舰队补给与登陆保障任务。"
