 JAP_war_readiness_suiyuan_shanxi_hebei_railway_desc:"战备建设局将沿§Y绥远§!、§Y山西§!与§Y河北§!方向整修横贯华北西翼的铁路联络线，并扩充山西航空保障设施，使草原通道、山西战线与河北交通网能够彼此接续。"
