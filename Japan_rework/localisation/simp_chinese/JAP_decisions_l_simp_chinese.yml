 JAP_rai_normal_general:"AI陆军将领强化：§6EN§!档"
 JAP_rai_normal_general_desc:"当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家处于§YEN§!档时，为所有陆军将领补至不低于§Y4§!级，并追加基础作战特质；同时为当前陆军元帅追加后勤奇才、全面规划者与知人善任。新获得的陆军将领和新晋陆军元帅也会自动按当前档位补强。"
 JAP_rai_hard_general:"AI陆军将领强化：§4HL§!档"
 JAP_rai_hard_general_desc:"当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家处于§YHL§!档时，为所有陆军将领补至不低于§Y7§!级，并追加基础、山地、丘陵、装甲作战与巧变专家等特质；同时为当前陆军元帅在EN档基础上追加凌厉的攻击者与防守大师。新获得的陆军将领和新晋陆军元帅也会自动按当前档位补强。"
 JAP_rai_lunatic_general:"AI陆军将领强化：§OEXPH§!档"
 JAP_rai_lunatic_general_desc:"当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家处于§YEXPH§!档时，为所有陆军将领补至不低于§Y9§!级，并补全特战、登陆、多地形、要塞、伏击与游击作战特质；同时为当前陆军元帅在HL档基础上追加魅力非凡与组织至上。新获得的陆军将领和新晋陆军元帅也会自动按当前档位补强。"
 JAP_rai_normal_admiral:"AI海军将领强化：§6EN§!档"
 JAP_rai_normal_admiral_desc:"当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家处于§YEN§!档时，为所有海军将领补至不低于§Y4§!级，并追加基础舰队作战特质。新获得的海军将领也会自动按当前档位补强。"
 JAP_rai_hard_admiral:"AI海军将领强化：§4HL§!档"
 JAP_rai_hard_admiral_desc:"当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家处于§YHL§!档时，为所有海军将领补至不低于§Y7§!级，并追加匿踪专家、深海利矛、鱼雷专家、驱逐舰督、巡洋舰督与飞行甲板管控者等特质。新获得的海军将领也会自动按当前档位补强。"
 JAP_rai_lunatic_admiral:"AI海军将领强化：§OEXPH§!档"
 JAP_rai_lunatic_admiral_desc:"当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家处于§YEXPH§!档时，为所有海军将领补至不低于§Y9§!级，并补全决战、护航、航母、鱼雷与近海/远洋作战特质。新获得的海军将领也会自动按当前档位补强。"
