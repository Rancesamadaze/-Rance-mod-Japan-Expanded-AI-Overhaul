 JAP_ministry_of_colonial_affairs_decisions:"拓殖省"
 JAP_ministry_of_colonial_affairs_decisions_desc:"拓殖省负责统筹帝国外地之开发、移殖与产业经营，综理朝鲜、台湾、满洲及南洋诸地相关事务，并推动交通、资源与生产之整备，以期强化帝国整体之统制与供给能力。"
 JAP_greater_east_asia_ministry_decisions:"大东亚省"
 JAP_greater_east_asia_ministry_decisions_desc:"大东亚省负责统筹§Y大东亚共荣圈§!下各保护国、合作政府、协从政权与直辖辖地的设立、整备、资源调配和军事协同，作为日本处理特殊属国体系的中央机关。"
