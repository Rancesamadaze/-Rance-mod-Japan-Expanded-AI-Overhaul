 JAP_war_readiness_qingdao_jiangsu_coastal_supply_network:"整备青岛至江苏沿海补给线"
 JAP_war_readiness_qingdao_jiangsu_coastal_supply_network_desc:"战备建设局将沿§Y青岛§!、§Y山东§!与§Y江苏§!方向分段展开沿海后勤整备，扩充§Y东海§!与江苏南部沿海泊地，并铺设通往东海方向的短线铁路，使山东南岸与江苏沿海逐步接入前进补给网。"
