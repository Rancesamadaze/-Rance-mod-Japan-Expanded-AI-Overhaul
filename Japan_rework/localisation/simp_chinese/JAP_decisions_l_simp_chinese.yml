 JAP_war_readiness_nanlu_nanning_coastal_railway_desc:"战备建设局将在§Y南路§!沿海扩建前进军港，并视南宁方向的控制条件整修通往§Y南宁§!的铁路联络线，使华南西段的登陆保障与内陆推进能够彼此接续。"
