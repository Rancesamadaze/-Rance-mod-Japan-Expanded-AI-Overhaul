 JAP_imperial_headquarters_decisions:"大本营"
 JAP_imperial_headquarters_decisions_desc:"大本营负责统筹§Y[ROOT.GetName]§!陆海军作战、国土防卫与总动员计划，协调参谋本部、军令部与政府各机关，以贯彻§Y[JAP_the_imperial_defense_plan_key]§!下的战略部署。"
 JAP_imperial_headquarters_landing_operations_decisions:"大本营——登陆作战指令"
 JAP_imperial_headquarters_landing_operations_decisions_desc:"大本营将各方向登陆作战、奇袭行动与远洋整备另列为独立指令，以便统筹登陆容量、出发支点、预警与奇袭节奏。"
 JAP_unlock_imperial_headquarters_decisions_tt: "解锁决议组：§Y大本营§!与§Y大本营——登陆作战指令§!"
 JAP_imperial_headquarters_forge_chinese_claims:"伪造中国宣称"
 JAP_imperial_headquarters_forge_chinese_claims_desc:"大本营将整理华北事变以来的军政档案，编成足以支撑对中国全境提出领土要求的宣称文件，为后续军事行动提供名义。"
 JAP_imperial_headquarters_subjugate_chinese_remnant:"荡平[FROM.GetNameDef]"
 JAP_imperial_headquarters_subjugate_chinese_remnant_desc:"随着国民政府与中共主力政权相继崩解，大本营将对[FROM.GetNameDef]提出最后通牒，并为后续军事行动准备完整的领土宣称与吞并战争借口。"
 JAP_imperial_headquarters_declare_victory_in_china:"宣告对华战争胜利"
 JAP_imperial_headquarters_declare_victory_in_china_desc:"随着国民政府与中共政权相继消亡，大本营将正式宣告对华战争的主要阶段已经结束，并把中国战场纳入§Y大亚洲战争§!的总动员体系。"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system:"建立亚太补给体系"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system_desc:"烂地消失吧消失吧（对敌我都生效）"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system_tt:"为§Y亚洲§!、§Y中东§!和§Y澳洲§!地区添加§Y大亚洲战争§!地块修正，不区分控制者，对敌我双方都生效。"
 JAP_imperial_headquarters_prepare_us_mainland_invasion:"筹备美国本土登陆"
 JAP_imperial_headquarters_prepare_us_mainland_invasion_desc:"夏威夷已经成为横跨太平洋的前进支点。大本营将整备远洋航路、登陆舰队与美洲战区补给体系，为最终踏上美国本土铺平道路。"
 JAP_imperial_headquarters_prepare_us_mainland_invasion_tt:"获得§Y180日§!的§Y美国本土登陆准备§!，并为§Y北美洲§!和§Y南美洲§!所有地区添加美洲战区补给/作战修正：补给对敌我双方都生效，攻击与防御只加成§Y日本§!部队。"
 JAP_imperial_headquarters_force_war_on_siam:"批准对暹罗作战"
 JAP_imperial_headquarters_force_war_on_siam_desc:"暹罗横亘在印度支那与马来亚之间，是南方作战绕不开的陆上要道。若曼谷仍游离于各大阵营之外且尚未屈服，大本营可以下达最后作战命令，打通通往马来亚的陆路门户。"
 JAP_imperial_headquarters_force_war_on_siam_tt:"§R立即对暹罗宣战。§!"
 JAP_imperial_headquarters_demand_portuguese_asian_territories:"要求葡萄牙交出亚洲领地"
 JAP_imperial_headquarters_demand_portuguese_asian_territories_desc:"§Y南进论§!已经成为帝国的战略方针，大本营将向[POR.GetNameDef]递交最后通牒，要求其交出位于亚洲的全部殖民领地。若里斯本拒绝撤离，我们将取得夺取这些据点的战争目标。"
 JAP_imperial_headquarters_authorize_delayed_pacific_war:"批准太平洋作战"
 JAP_imperial_headquarters_authorize_delayed_pacific_war_desc:"东南亚与东印度-澳新方向的作战已进入预期阶段，大本营将启动为期30日的美菲方向作战准备，并同步放开珍珠港独立突袭机制的相关限制；准备完成后，此前暂缓的太平洋战争目标将正式放行。"
 JAP_scripted_landing_naval_strength_available_tt:"满足根据所选难度动态调整的海军力量门槛"
 JAP_scripted_landing_capacity_available_tt:"仍有可用登陆计划容量"
 JAP_scripted_landing_eia_plan_slot_available_tt:"东印度-澳新方向仍有可调度的登陆整备名额"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam:"§C海南方向登陆暹罗§!"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_desc:"大本营将以§C海南§!为作战支点，调集登陆兵力，组织海上运输，并在海空掩护下准备打开§R暹罗§!方向的进攻通道。若敌军防线已在连续牵制下暴露破绽，本次行动将改为立即发动的奇袭登陆。"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_plan_tt:"还需成功实施§O[?JAP_scripted_landing_raid_remaining|0]§!次登陆行动，方可发动奇袭。\n本次行动为§O常规登陆§!：将向§R暹罗§!守军发出登陆预警。§O30日§!后，若§C海南§!仍可作为作战支点，且§R暹罗§!仍由敌方控制，将在暹罗发动中等规模登陆，打乱当地守军部署，并造成一定战斗损失。"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_raid_tt:"§R本次行动将立即发动奇袭登陆。§!\n选择该决议时，将立即以§C海南§!为作战支点，对§R暹罗§!发动中等规模奇袭登陆，打乱当地守军部署，并造成较大战斗损失。奇袭完成后，行动仍会占用相应登陆整备能力，需等待§O30日§!整备结束后才能再次调度。"
