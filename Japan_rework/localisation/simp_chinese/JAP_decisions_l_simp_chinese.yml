 JAP_greater_east_asia_co_prosperity_sphere_decisions_desc:0 "作为§Y日本§!特殊属国体系的一环，本国将在大东亚共荣圈框架下承担生产、资源、军事与地方整备事务。"
 JAP_convert_MAN_to_imperial_governor_generalship:0 "设立满洲总督府"
 JAP_convert_MAN_to_imperial_governor_generalship_desc:0 "满洲既为帝国大陆政策的枢轴，亦是共荣圈北方经营的根基。大东亚省将重新厘定满洲国的政治地位，使其以§Y满洲总督府§!之名纳入更严密的帝国统合秩序。"
 JAP_claim_bhutan_after_tibet_decision:0 "确立对不丹的宣称"
 JAP_claim_bhutan_after_tibet_decision_desc:0 "西藏局势已定，通往喜马拉雅南麓的道路已经打开。我们将确立对[BHU.GetNameDef]的宣称，并准备必要的军事行动。"
