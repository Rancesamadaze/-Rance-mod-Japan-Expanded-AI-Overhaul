 JAP_ai_extra_equipment_grant_loop_start: "启动陆空动态补给循环"
 JAP_ai_extra_equipment_grant_loop_start_desc: "当日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家拥有超过§Y100§!座军用工厂时，可启动陆空动态装备补给循环。装备数量、种类和所选难度有关，同时受动态倍率影响，系统会立即尝试结算首轮陆军与空军额外装备，并在之后每§Y60§!天自动轮转。玩家若想享用该系统，需要先选择Rance难度，并通过决议创建对应编制与装备设计。"
 JAP_ai_extra_equipment_grant_loop_start_tt: "立即按当前动态倍率尝试结算一轮§Y陆空额外装备补给§!，并启动每§Y60§!天一次的循环。\n若开局规则§Y$RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY$§!为§R否§!，本轮不会实际发放装备。"
 JAP_ai_extra_equipment_grant_cycle_mission: "陆空动态补给轮转"
 JAP_ai_extra_equipment_grant_cycle_mission_desc: "陆空动态装备补给已经启动。每§Y60§!天，系统会重新检查日本AI辅助状态、陆空动态补给规则与当前难度，并按当前动态倍率尝试发放陆军与空军额外装备。玩家若想享用，需要先选择Rance难度，并通过决议创建对应编制与装备设计。"
 JAP_ai_extra_equipment_grant_cycle_mission_tt: "本轮结束时，若仍满足§Y日本AI辅助判定§!且开局规则§Y$RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY$§!为§Y是§!，将按当前动态倍率结算§Y陆空额外装备补给§!。\n随后重新启动下一轮§Y60§!天计时。"
 JAP_ai_navy_ship_grant_loop_start: "启动半年度舰艇动态补给"
 JAP_ai_navy_ship_grant_loop_start_desc: "自§Y1939年6月1日§!起，日本AI或开局规则§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!为§Y是§!的日本玩家可启动海军舰艇动态补给循环。系统会立即尝试结算首轮舰艇补给，并在之后每§Y180§!天自动轮转。玩家若想享用，需要先选择Rance难度，并通过决议创建舰船设计；舰船型号名称会被脚本用来定位目标设计，创建后自行改名可能导致舰艇补给失效。"
 JAP_ai_navy_ship_grant_loop_start_tt: "立即按当前动态倍率尝试结算一轮§Y海军舰艇补给§!，并启动每§Y180§!天一次的循环。\n若开局规则§Y$RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY$§!为§R否§!，本轮不会实际发放舰艇。\n玩家请先选择Rance难度并通过决议创建舰船设计；若自行更改舰船型号名称，舰艇补给可能失效。"
 JAP_ai_navy_ship_grant_cycle_mission: "半年度舰艇动态补给轮转"
 JAP_ai_navy_ship_grant_cycle_mission_desc: "海军舰艇动态补给已经启动。每§Y180§!天，系统会重新检查日本AI辅助状态、海军动态补给规则与当前难度，并按动态倍率尝试发放对应舰艇包。玩家若想享用，需要先选择Rance难度，并通过决议创建舰船设计；创建后自行更改舰船型号名称可能导致舰艇补给失效。"
 JAP_ai_navy_ship_grant_cycle_mission_tt: "本轮结束时，若仍满足§Y日本AI辅助判定§!且开局规则§Y$RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY$§!为§Y是§!，将按当前动态倍率结算§Y海军舰艇补给§!。\n随后重新启动下一轮§Y180§!天计时。"
