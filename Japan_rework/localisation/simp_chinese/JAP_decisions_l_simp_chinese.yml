 JAP_war_readiness_nanning_western_inland_supply_network_desc:"战备建设局将以§Y南宁§!为枢纽，向§Y云南§!、§Y广西§!与§Y贵州§!方向分段整修铁路，并在关键前进节点设立补给中心，使华南西翼的内陆推进获得稳定后勤支撑。"
