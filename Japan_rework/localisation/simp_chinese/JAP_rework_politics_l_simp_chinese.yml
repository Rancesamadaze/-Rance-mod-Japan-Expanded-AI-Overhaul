 JAP_rework_changzheng_military_super_ai_trait: "§C全域战场演算§!"

 # --- laws ---
 JAP_comintern_industrial_integration:0 "§R共产国际工业一体化§!"
 JAP_comintern_industrial_integration_desc:0 "我们将与苏维埃联盟及其余共产国际成员展开深度的工业协作。当东亚的农产品与轻工业制品顺着西伯利亚大铁路源源不断地涌向莫斯科，苏联的工业专家们也毫无保留地将‘五年计划’的宝贵经验倾囊相授。在亿万劳动者的辛勤汗水中，一座座巍峨的工厂拔地而起并投入轰鸣运转。这一刻，钢铁与理想融为一体，共产主义的最终胜利已近在咫尺。"
 JAP_rework_national_defense_state:0 "国家防卫体制"
 JAP_rework_national_defense_state_desc:0 "[ROOT.GetLeader]已宣布实施“新体制”，将日本转型为“国家防卫国家”，全民动员保卫祖国。根据国家动员法，政府将掌控全国一切资源。凭借此体制，帝国将永世长存！"
 JAP_comintern_mutual_trade:0 "§R共产国际互贸协定§!"
 JAP_comintern_mutual_trade_desc:0 "随着远东革命的胜利，日本共产党不仅解放了列岛的生产力，更与中国同志并肩作战，将红色的旗帜插遍了亚洲大陆。如今，我们不再是孤悬海外的工业孤岛。通过《共产国际互贸协定》，苏维埃的滚滚石油、中国源源不断的钨矿与日本顶尖的精密技术将汇聚成冲破帝国主义锁链的洪流。苏联同志的重型坦克将装上由日本研制的精密光学镜头，而列宁格勒的工人也将穿上来自大阪织机缝制的保暖棉服。快速工业化后的中国不仅提供了支撑国防工业的战略矿产，其广袤农田与日本先进农机的结合，更将成为整个阵营永不枯竭的红色粮仓。我们将建立起一套完全独立于资本主义市场的红色内循环体系，让每一吨战略资源、每一粒粮食都精准地转化为捍卫无产阶级政权的钢铁卫士！"
 JAP_vanguard_of_the_proletariat:0 "§R无产阶级先锋队§!"
 JAP_vanguard_of_the_proletariat_desc:0 "坐拥庞大的人口基数我们不再追求盲目的数量动员，而是转而构建一支由阶级觉悟最高、战斗意志最坚定的无产阶级精英组成的先锋力量。富有理想信念的年轻人将在在军队中担当要职并得到全面的训练，而自私自利，贪生怕死的蛀虫将被§Y彻底清算§!。由此诞生的先锋队将拥有无可比拟的组织纪律性与战略执行力，我们将以绝对的质量优势§Y粉碎§!一切反动势力的抵抗。"
 JAP_kodoha_yamato_spirit_conscription:0 "§Y大和魂§!"
 JAP_kodoha_yamato_spirit_conscription_desc:0 "大和魂不应只停留在神社、学校与军营的训辞之中，而应化为举国同心的战时秩序。青年、乡绅、工人和农民都将在皇国精神的感召下承担守土与从军之责，使帝国在危难时仍能维持坚忍的民心与不屈的战线。"
 JAP_rework_lecture_group_compliance_law:0 "§R打土豪，分田地§!"
 JAP_rework_lecture_group_compliance_law_desc:0 "占领区的旧秩序决不能原封不动地保留下来。只有§R彻底打倒§!土豪劣绅和一切反动统治势力，把土地与生计重新交到劳动人民手中，才能真正发动群众、争取群众，使新生的红色政权在乡里扎下根来，让反抗失去土壤，使人民群众真正拥护革命政权。"
 JAP_rework_lecture_group_infrastructure_law:0 "§R基建跃进§!"
 JAP_rework_lecture_group_infrastructure_law_desc:0 "§R革命§!不仅要破坏旧世界，更要建设新世界。道路要修，铁路要通，港口要整，仓储要建；只有掀起一场轰轰烈烈的建设运动，把分散闭塞的区域联结起来，把人力物力迅速组织起来，占领区才能真正成为革命事业的稳固后方。"
 JAP_rework_lecture_group_industrial_construction_law:0 "§R红色工业化§!"
 JAP_rework_lecture_group_industrial_construction_law_desc:0 "我们所掌握的土地不是任人盘剥的殖民地，而是必须纳入社会主义建设的§R革命根据地§!。必须以统一计划统筹厂矿兴建、设施扩充与劳动力调配，用红色政权的组织力迅速推进工业化进程，使这片土地从旧帝国主义的附庸，转变为支撑革命战争与新社会建设的工业基地。"
 JAP_rework_lecture_group_output_law:0 "§R撸起袖子加油干§!"
 JAP_rework_lecture_group_output_law_desc:0 "政权既已建立，生产就决不能松下来。工厂要开足马力，矿山要深挖潜力，地方干部和劳动群众都必须鼓足干劲，把各方面力量统统组织起来。只有在统一领导下掀起增产热潮，才能把这片土地的生产潜力充分发挥出来，更好地支援前线、服务建设、巩固§R革命政权§!。"
 JAP_rework_kaguya_industrial_extraction_law:0 "§g地上人啊，为我献出一切§!"
 JAP_axis_economic_integration:0 "§1轴心国经贸一体化§!"
 JAP_axis_economic_integration_desc:0 "今世界旧秩序日趋崩坏，英米本位之经济体制既已腐朽无能，断不足以支撑东亚与世界之新生。今后之帝国，不仅须于疆场之上与友邦协力奋战，亦当于经济、工业、技术、运输及资源统制诸领域，与轴心诸国结成更为坚实而不可分之共同体。德意之技术与经验、皇国之组织与精神、南方之物资与产能，皆应统合于同一大目的之下，使三国协力化为足以贯通欧亚、撼动世界之伟力。此非一时权宜之策，实乃建设新秩序、开拓共荣圈、奠定皇国万世基业之必由大道。惟有使轴心诸国于经贸上融为一体，方能以不拔之意志与无穷之生产，完成帝国所肩负之历史使命。"

