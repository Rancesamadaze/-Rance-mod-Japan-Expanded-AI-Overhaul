 JAP_rework_erin: "八意永琳"
 JAP_rework_erin_trait: "§2月之头脑§!"
 JAP_erin_desc: "§L月之民。也就是外星人。已在地上隐居了相当长的岁月。\n和辉夜的交往，始于很久以前辉夜还在月亮居住的时候。\n八意家，是不知从何时开始定居于月亮的天才药师家族。其中永琳的知识更是出类拔萃。她的头脑远远凌驾于人类之上，亦因此会经常说一些令人难以理解的话。\n在遥远的过去，月之公主辉夜为赎罪而被放逐至地上，刑期届满之时，她正是前去带回辉夜的使者之一。然而，她却为了某个原因与辉夜共谋，一起杀害了其他月之使者。\n为了让当时与辉夜一起居住的卑贱地上人保守秘密，永琳将特制的、装有「蓬莱之药」的药壶作为封口费交给了他。只要服下此药，就能长生不死。\n然而那个地上人似乎并未使用蓬莱之药，很快便死去了。后来才得知，那个地上人似乎是被什么人杀掉了。\n永琳是个天才。\n她的知识即使在月球的天才药师家族八意家中也显得拔群。她的头脑远远凌驾于人类之上，亦因此会经常说一些令人难以理解的话。她发明了能够凭借量子的特性判明读信人的数量的量子印，并且这种印至今也没有别人会做。\n她还拥有制作任何药物程度的能力。\n人类用的药和妖怪用的药她都能做出。即使是疑难杂症，她也能开出特效药。她做出的药世间评价是无副作用，有不错的效果。因为具有一切药物的知识，所以毒和药什么的对永琳都无效。\n比起蓬莱山辉夜，她拥有压倒性的力量，但永琳好像常常保留实力，显得不超过辉夜。§!"
 JAP_rework_reisen: "铃仙·优昙华院·因幡"
 JAP_rework_reisen_trait: "§R「幻胧月睨」§!"
 JAP_reisen_desc: "§L住在月亮上的兔子。\n红色的瞳孔中所隐含的是地上兔子几倍的疯狂。\n现在是辉夜的宠物。名字本来只唤作Reisen，为了冒充地上人而特地加上汉字，但感觉非常不自然。\n能力是操纵疯狂（波长）的能力。\n操纵疯狂实际上就是使人发狂的能力，也就是操纵寄宿在事物之上的波的能力。\n波长增长的话，即会变得轻松，什么事情都没有干劲不想去做。\n波长缩短的话，则会带来疯狂，情绪变得不稳定不理智，与人对话也做不到。\n增加振幅就是让存在变得过剩，无论多远的地方也能进行思想的交流。\n降低振幅就是让存在变得稀薄，无论多么接近也无法令声音通达。\n移动位相的话，就不会有干涉，也就无法触碰到东西。\n位相倒置的话，就会否定存在，让外形完全消失。\n使用着这样丰富的能力，来让人发狂，说不定能达到无下限和无量空处的效果（笑）§!"
 JAP_rework_tewi: "因幡帝"
 JAP_rework_tewi_trait: "§8幸运的白兔§!"
 JAP_tewi_desc: "§L能力：使人类变得幸运程度的能力\n在注意健康长久生存的过程中，掌握妖怪变化之力的兔子。\n在永远亭居住的她是兔子群的首领，但其容易冲动的性格较之妖怪来说更像是妖精。\n于竹林里迷路的人，偶然会看到她的身影。据说只要见到她就必定能够找到出路，所以人们都将她看成是迷途竹林的引路人。\n其实，把从她那里得来的幸运用于这种地方实在是浪费，不过人类是不会注意到的。因为是笨蛋嘛。§!"
 JAP_rework_mimo: "魅魔"
 JAP_rework_mimo_trait: "§G魔闪的修罗§!"
 JAP_mimo_desc: "§L森罗四神将之一。森罗全体佣兵的总负责教官，为了保持灵力始终闭着双眼。传说没有活着的人类见过她睁眼的姿态。虽然战斗从来不尽力而为，但依然有着极强的战斗力。以实力让众人折服，得意的技能是用极快的身法闪到敌方背后进行残杀，拔枪速度堪比光速，并且能从小手枪中发射出破坏力无穷的魔炮，令人震撼。Genesis的元老级人物，在Genesis建立之初就加入其中，欣赏神绮的魄力，并决定为其效忠。虽然有着自己的理性，但对被交托的任务有着绝对的服从觉悟；虽然随着时间的推移这种固执也在渐渐弱化，尤其是在收到雾雨魔理沙这样的徒弟之后。不过想要亲眼见证创世计划的完成，那一信念从未改变过。§!"

