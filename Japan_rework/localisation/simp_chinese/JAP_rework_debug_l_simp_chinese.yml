l_simp_chinese:
 # --- debug decisions and events ---
 JAP_debug_enable_yamato_spirit_conscription:0 "[DEBUG] 启用大和魂征兵法案"
 JAP_debug_enable_yamato_spirit_conscription_desc:0 "设置调试标记，使§Y大和魂§!征兵法案在法案界面中可见、可选，并立即启用该法案。此决议不会完成§Y大和魂§!国策，也不会触发该国策的其它奖励。"
 JAP_rework_debug_decisions:0 "[DEBUG] Japan Rework调试决议"
 JAP_rework_debug_decisions_desc:0 "集中放置本MOD自用的调试决议。"
 JAP_debug_dynamic_state_text_tokyo:0 "[DEBUG] 触发动态州名事件：东京"
 JAP_debug_dynamic_state_text_tokyo_desc:0 "把§Y东京§!作为事件目标传入同一个测试事件。预期事件标题与正文显示§Y东京§!。"
 JAP_debug_dynamic_state_text_hokkaido:0 "[DEBUG] 触发动态州名事件：北海道"
 JAP_debug_dynamic_state_text_hokkaido_desc:0 "把§Y北海道§!作为事件目标传入同一个测试事件。预期事件标题与正文显示§Y北海道§!。"
 JAP_debug_dynamic_state_text_direct_control:0 "[DEBUG] 直接州名解析对照"
 JAP_debug_dynamic_state_text_direct_control_desc:0 "不传事件目标，只直接显示固定州名，用来判断州名本地化调用本身是否正常。"
 JAP_debug_dynamic_state_text.1.t:0 "[DEBUG] 动态州名：[JAP_debug_dynamic_state_text_target.GetName]"
 JAP_debug_dynamic_state_text.1.desc:0 "这个固定事件读取决议传入的事件目标州：§Y[JAP_debug_dynamic_state_text_target.GetName]§!。\n\n如果点击§Y东京§!测试决议，这里应显示§Y东京§!；如果点击§Y北海道§!测试决议，这里应显示§Y北海道§!。"
 JAP_debug_dynamic_state_text.1.a:0 "确认"
 JAP_debug_dynamic_state_text.2.t:0 "[DEBUG] 直接州名解析对照"
 JAP_debug_dynamic_state_text.2.desc:0 "固定州名读取结果：§Y[671.GetName]§! / §Y[536.GetName]§!。\n\n若这里能正常显示§Y东京§!与§Y北海道§!，但动态事件显示异常，问题大概率在事件目标传递；若这里也异常，问题在州名动态本地化解析入口。"
 JAP_debug_dynamic_state_text.2.a:0 "确认"
 JAP_debug_add_military_leader_cost_factor:0 "[DEBUG] 添加指挥官花费-100%"
 JAP_debug_add_military_leader_cost_factor_desc:0 "添加一个仅包含§Y$MODIFIER_MILITARY_LEADER_COST_FACTOR$§!§G-100%§!的测试民族精神，用于观察招募陆军将领或海军将领时的指挥点花费是否变化。"
 JAP_debug_remove_military_leader_cost_factor:0 "[DEBUG] 移除指挥官花费-100%"
 JAP_debug_remove_military_leader_cost_factor_desc:0 "移除§Y$JAP_debug_military_leader_cost_factor$§!，用于恢复对照。"
 JAP_debug_military_leader_cost_factor:0 "[DEBUG] 指挥官花费-100%"
 JAP_debug_military_leader_cost_factor_desc:0 "仅用于测试§Y$MODIFIER_MILITARY_LEADER_COST_FACTOR$§!的实际效果。"
 JAP_debug_complete_ultimate_tank_and_grant_land_equipment_designs:0 "[DEBUG] 完成终极坦克并授予陆军装备设计"
 JAP_debug_complete_ultimate_tank_and_grant_land_equipment_designs_desc:0 "一次性完成§Y$JAP_the_ultimate_tank$§!，补齐陆军装备设计所需科技，并触发本MOD中陆军装备设计相关的所有§YJAP_cr_*§!脚本效果。"
 JAP_debug_complete_ultimate_tank_and_grant_land_equipment_designs_tt:0 "完成§Y$JAP_the_ultimate_tank$§!，补齐陆军装备设计所需科技，并触发所有陆军装备设计脚本效果。"
 JAP_debug_complete_new_order_in_east_asia:0 "[DEBUG] 完成东亚新秩序"
 JAP_debug_complete_new_order_in_east_asia_desc:0 "直接完成§Y$JAP_new_order_in_east_asia$§!，用于快速解锁§Y大东亚省§!决议组及该国策的其它完成奖励。"
 JAP_debug_show_military_factory_count:0 "[DEBUG] 当前军工：[?ROOT.num_of_military_factories|0]（缓存：[?JAP_debug_cached_military_factories|0]）"
 JAP_debug_show_military_factory_count_desc:0 "所有国家可见、可用、可重复。点击后把当前国家的§Ynum_of_military_factories§!写入本国变量§YJAP_debug_cached_military_factories§!，用于对照标题里的动态数值。"
 JAP_debug_show_factory_donation_counts:0 "[DEBUG] 工厂捐赠读数：民[?ROOT.num_of_civilian_factories|0] / 可用[?ROOT.num_of_civilian_factories_available_for_projects|0] / 船[?ROOT.num_of_naval_factories|0]（缓存：民[?JAP_debug_cached_civilian_factories|0] / 可[?JAP_debug_cached_civilian_factories_available_for_projects|0] / 船[?JAP_debug_cached_naval_factories|0]）"
 JAP_debug_show_factory_donation_counts_desc:0 "所有国家可见、可用、可重复。点击后缓存当前国家的§Ynum_of_civilian_factories§!、§Ynum_of_civilian_factories_available_for_projects§!与§Ynum_of_naval_factories§!，用于对照负数捐赠测试前后的读数。"
 JAP_debug_toggle_negative_factory_donations_idea:0 "[DEBUG] 切换负数工厂捐赠：民[?ROOT.num_of_civilian_factories|0] / 可用[?ROOT.num_of_civilian_factories_available_for_projects|0] / 船[?ROOT.num_of_naval_factories|0]（缓存：民[?JAP_debug_cached_civilian_factories|0] / 可[?JAP_debug_cached_civilian_factories_available_for_projects|0] / 船[?JAP_debug_cached_naval_factories|0]）"
 JAP_debug_toggle_negative_factory_donations_idea_desc:0 "添加或移除§Y$JAP_debug_negative_factory_donations$§!，该测试精神提供§Y$MODIFIER_INDUSTRIAL_FACTORY_DONATIONS$§!§R-5§!与§Y$MODIFIER_DOCKYARD_DONATIONS$§!§R-5§!。点击后立即缓存当前读数，用于观察负数“捐赠”是否会扣减当时可用的民用工厂或海军船坞口径。"
 JAP_debug_negative_factory_donations:0 "[DEBUG] 负数工厂捐赠测试"
 JAP_debug_negative_factory_donations_desc:0 "仅用于测试§Y$MODIFIER_INDUSTRIAL_FACTORY_DONATIONS$§!§R-5§!与§Y$MODIFIER_DOCKYARD_DONATIONS$§!§R-5§!是否会影响当前国家的工厂、可用民工和船坞数量读取。"
 JAP_debug_toggle_MAN_mic_to_overlord_idea:0 "[DEBUG] 切换MAN军工上供：JAP[?JAP.num_of_military_factories|0] / MAN[?MAN.num_of_military_factories|0]"
 JAP_debug_toggle_MAN_mic_to_overlord_idea_desc:0 "在§Y满洲国§!身上添加或移除§Y$JAP_debug_MAN_mic_to_overlord_factor$§!，该精神提供§Y$MODIFIER_MIC_TO_OVERLORD_FACTOR$§!§G+100%§!。点击后同时缓存日本与满洲国当前军工数。"
 JAP_debug_MAN_mic_to_overlord_factor:0 "[DEBUG] 满洲军工上供测试"
 JAP_debug_MAN_mic_to_overlord_factor_desc:0 "仅用于测试§Y$MODIFIER_MIC_TO_OVERLORD_FACTOR$§!是否会影响§Ynum_of_military_factories§!等军工数量读取。"
 JAP_debug_MAN_spawn_10_japanese_infantry:0 "[DEBUG] MAN刷10个日本步兵师"
 JAP_debug_MAN_spawn_10_japanese_infantry_desc:0 "在§Y满洲国§!作用域下创建§Y日本步兵师§!模板（若不存在），并在新京附近刷出§Y10§!个使用该模板的陆军师。"
 JAP_debug_read_MAN_japanese_infantry_count:0 "[DEBUG] 读取MAN日本步兵师：总[?MAN.JAP_debug_MAN_total_divisions|0] / 步兵[?MAN.JAP_debug_MAN_infantry_majority_divisions|0] / 刷出[?MAN.JAP_debug_MAN_japanese_infantry_spawned|0]"
 JAP_debug_read_MAN_japanese_infantry_count_desc:0 "刷新满洲国部队统计变量。由于未找到可直接按§Y编制名称§!统计现役师数量的原生读取项，这里通过遍历实际部队统计§Y总师数§!和§Y步兵主模板§!师数，并同时显示是否存在§Y日本步兵师§!模板与刷兵按钮累计值。"
 JAP_debug_read_MAN_japanese_infantry_count_tt:0 "§Y满洲国§!总师数：§Y[?MAN.JAP_debug_MAN_total_divisions|0]§!\n§Y满洲国§!步兵主模板师数：§Y[?MAN.JAP_debug_MAN_infantry_majority_divisions|0]§!\n§Y满洲国§!是否拥有§Y日本步兵师§!模板：§Y[?MAN.JAP_debug_MAN_has_japanese_infantry_template|0]§!\n刷兵按钮累计刷出的§Y日本步兵师§!：§Y[?MAN.JAP_debug_MAN_japanese_infantry_spawned|0]§!"
 JAP_debug_MAN_has_army_size_infantry_over_100:0 "[DEBUG] MAN infantry > 100：结果[?MAN.JAP_debug_MAN_has_army_size_infantry_over_100_result|0]"
 JAP_debug_MAN_has_army_size_infantry_over_100_desc:0 "在§Y满洲国§!作用域用§Yhas_army_size = { size > 100 type = infantry }§!测试步兵类师数量是否大于100，并把结果缓存为§Y1§!或§Y0§!。"
 JAP_debug_MAN_has_army_size_infantry_over_100_tt:0 "本次测试：§Yhas_army_size = { size > 100 type = infantry }§!。\n上次缓存结果：§Y[?MAN.JAP_debug_MAN_has_army_size_infantry_over_100_result|0]§!（1=通过，0=未通过）。"
 JAP_debug_init_global_variable_test:0 "[DEBUG] 初始化全局变量：当前[?global.JAP_debug_global_variable_test|0]"
 JAP_debug_init_global_variable_test_desc:0 "把§Yglobal.JAP_debug_global_variable_test§!设置为§Y0§!。所有国家可见、可用、可重复，用于测试§Yglobal.§!变量是否跨国家共享。"
 JAP_debug_add_10_global_variable_test:0 "[DEBUG] 全局变量+10：当前[?global.JAP_debug_global_variable_test|0]"
 JAP_debug_add_10_global_variable_test_desc:0 "让§Yglobal.JAP_debug_global_variable_test§!增加§Y10§!。切换国家后观察标题数值是否同步，用于确认该变量是否真的处于全局作用域。"
 JAP_debug_MAN_create_japanese_nagato_class_ship:0 "[DEBUG] MAN作用域创建JAP长门级战列舰"
 JAP_debug_MAN_create_japanese_nagato_class_ship_desc:0 "在§Y满洲国§!作用域执行§Ycreate_ship§!，使用本MOD开局海军的§Yship_hull_heavy_2§!、§Y长门级§!，并设置§Ycreator = JAP§!。用于观察船会进入满洲国预备舰队还是日本舰队。"
 JAP_debug_MAN_grant_500_xp:0 "[DEBUG] MAN三军经验+500"
 JAP_debug_MAN_grant_500_xp_desc:0 "给§Y满洲国§!添加§Y500§!陆军经验、§Y500§!海军经验和§Y500§!空军经验，用于测试学说选择、编制编辑和装备设计，不需要再通过控制台补经验。"
 JAP_debug_MAN_set_doctrine_replacement_baseline:0 "[DEBUG] MAN设置学说替换对照态"
 JAP_debug_MAN_set_doctrine_replacement_baseline_desc:0 "把§Y满洲国§!设置为§Ynew_mobile_warfare§!主学说，并写入一组非目标陆军子学说：§Ymobile_infantry§!、§Yfire_concentration§!、§Yarmored_spearhead/armored_spearhead_no_lar§!、§Ymission_type_tactics§!。用于测试后续§Yset_grand_doctrine§!与§Yset_sub_doctrine§!是否会替换既有学说。"
 JAP_debug_MAN_apply_japanese_doctrine_replacement:0 "[DEBUG] MAN执行目标学说替换"
 JAP_debug_MAN_apply_japanese_doctrine_replacement_desc:0 "在§Y满洲国§!作用域执行目标学说替换：陆军主学说按返峰规则设置§Yrance_furinkazan§!或§Ygrand_battleplan§!；陆军子学说改为§Ycommandos§!、§Yfield_engineering§!、§Ystreamlined_deployment§!、§Ydefensive_postures§!；海军改为§Ynew_convoy_raiding§!、§Ypatrol_boats§!、§Ylight_task_forces§!、§Ybattleship_antiair_screen§!；空军改为§Ynew_operational_integrity§!，子学说完全按日本倾向设置为§Yair_subdoctrine_fighter_central_field§!、§Yair_subdoctrine_naval_torpedo_tactics§!、§Yair_subdoctrine_long_range_escort§!、§Yair_subdoctrine_flying_fortresses§!；特种学说用§Yspecial_forces_quality§!，并把两个日式特种分支分别写入第0/第1槽。目标子学说各授予§Y1000§!精通度。"
 JAP_debug_read_MAN_doctrine_replacement_result:0 "[DEBUG] 读取MAN学说替换：陆[?MAN.JAP_debug_MAN_has_grand_battleplan|0]/[?MAN.JAP_debug_MAN_has_rance_furinkazan|0] 海[?MAN.JAP_debug_MAN_has_new_convoy_raiding|0] 空[?MAN.JAP_debug_MAN_has_new_operational_integrity|0] 特[?MAN.JAP_debug_MAN_has_special_forces_quality|0]"
 JAP_debug_read_MAN_doctrine_replacement_result_desc:0 "刷新并显示§Y满洲国§!当前主学说与子学说检测变量。推荐顺序：先点击§Y$JAP_debug_MAN_set_doctrine_replacement_baseline$§!，再点击§Y$JAP_debug_MAN_apply_japanese_doctrine_replacement$§!，最后点击本决议刷新读数；刷新后重新查看本决议标题和提示。"
 JAP_debug_read_MAN_doctrine_replacement_result_tt:0 "陆军主学说：旧§Ynew_mobile_warfare§!=[?MAN.JAP_debug_MAN_has_new_mobile_warfare|0]；目标§Ygrand_battleplan§!=[?MAN.JAP_debug_MAN_has_grand_battleplan|0]；目标§Yrance_furinkazan§!=[?MAN.JAP_debug_MAN_has_rance_furinkazan|0]\n陆军子学说：§Ycommandos§!=[?MAN.JAP_debug_MAN_has_commandos|0]；§Yfield_engineering§!=[?MAN.JAP_debug_MAN_has_field_engineering|0]；§Ystreamlined_deployment§!=[?MAN.JAP_debug_MAN_has_streamlined_deployment|0]；§Ydefensive_postures§!=[?MAN.JAP_debug_MAN_has_defensive_postures|0]；排除项§Yair_cavalry§!=[?MAN.JAP_debug_MAN_has_air_cavalry|0]；排除项§Yinfiltration_tactics§!=[?MAN.JAP_debug_MAN_has_infiltration_tactics|0]\n海军：旧§Ynew_base_strike§!=[?MAN.JAP_debug_MAN_has_new_base_strike|0]；目标§Ynew_convoy_raiding§!=[?MAN.JAP_debug_MAN_has_new_convoy_raiding|0]；§Ypatrol_boats§!=[?MAN.JAP_debug_MAN_has_patrol_boats|0]；§Ylight_task_forces§!=[?MAN.JAP_debug_MAN_has_light_task_forces|0]；§Ybattleship_antiair_screen§!=[?MAN.JAP_debug_MAN_has_battleship_antiair_screen|0]\n空军：§Ynew_operational_integrity§!=[?MAN.JAP_debug_MAN_has_new_operational_integrity|0]；§Yair_subdoctrine_fighter_central_field§!=[?MAN.JAP_debug_MAN_has_air_subdoctrine_fighter_central_field|0]；§Yair_subdoctrine_naval_torpedo_tactics§!=[?MAN.JAP_debug_MAN_has_air_subdoctrine_naval_torpedo_tactics|0]；§Yair_subdoctrine_long_range_escort§!=[?MAN.JAP_debug_MAN_has_air_subdoctrine_long_range_escort|0]；§Yair_subdoctrine_flying_fortresses§!=[?MAN.JAP_debug_MAN_has_air_subdoctrine_flying_fortresses|0]\n特种：§Yspecial_forces_quality§!=[?MAN.JAP_debug_MAN_has_special_forces_quality|0]；第0槽§Yjap_rance_air_sea_joint_assault§!=[?MAN.JAP_debug_MAN_has_jap_rance_air_sea_joint_assault|0]；第1槽§Yjap_rance_mountain_ranger_assault§!=[?MAN.JAP_debug_MAN_has_jap_rance_mountain_ranger_assault|0]\n读数为§Y1§!表示当前拥有该学说，§Y0§!表示没有。若旧主学说或排除项仍为§Y1§!，说明替换可能没有清干净；若目标项为§Y0§!，说明对应设置可能失败或受可见性/DLC条件影响。"
