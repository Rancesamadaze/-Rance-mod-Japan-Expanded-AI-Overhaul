 JAP_jcp_join_the_comintern_desc:0 "如今的世界受到帝国主义者，法西斯主义者与贪婪的资本家们的威胁，尽管我们与苏联的道路不完全一致，我们也应该放下分歧。只有团结一致，才能让红星照耀世界"
