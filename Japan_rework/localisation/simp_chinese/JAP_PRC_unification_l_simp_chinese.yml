l_simp_chinese:
 jap_prc_union.1.t:0 "来自东京的提议"
 jap_prc_union.1.d:0 "日本共产党向我们要发来了一份历史性的提议。他们认为，为了对抗帝国主义并建立真正的泛亚苏维埃联盟，我们需要消除彼此之间的界限。他们提议将两个政权合并，并在东京的领导下共同通过太平洋苏维埃联盟走向未来。"
 jap_prc_union.1.a:0 "为了无产阶级的团结，我们同意合并！"
 jap_prc_union.1.b:0 "不，我们将走自己的路。"

 jap_prc_union.2.t:0 "中国同志的回应"
 jap_prc_union.2.d:0 "中国共产党同意了我们的提议！他们愿意放下国界，加入我们的太平洋苏维埃联盟。这是历史性的一刻，亚洲的无产阶级从未如此团结。"
 jap_prc_union.2.a:0 "劳动者们，团结起来！"

 JAP_cede_leadership_to_mao:0 "让渡最高领导权"
 JAP_cede_leadership_to_mao_desc:0 "为了太平洋苏维埃联盟的长远未来，我们需要一位真正的舵手来引领航向。毛泽东同志在理论与实践上的卓越成就证明了他是最合适的人选。东京将退居次席，全力支持这位来自大陆的巨人。"

 RULE_OPTION_COMMUNIST_PACIFIC_UNION:0 "太平洋苏维埃 (与中共联合)"
 RULE_OPTION_COMMUNIST_PACIFIC_UNION_DESC:0 "日本将拥抱马克思主义，通过“讲座派”路线建立太平洋苏维埃联盟，并最终寻求与中国共产党合并，将领导权让渡给毛泽东。"

 JAP_revolutionary_fervor_idea:0 "革命狂热"
 JAP_revolutionary_fervor_idea_desc:0 "摆脱了治安维持法的枷锁，我们的战士在保卫家乡和解放同胞时爆发出了惊人的战斗力。\n§G核心领土攻击：+15%§!\n§G核心领土防御：+15%§!"

l_simp_chinese:
 Anti_Kuomintang_League:0 "亚洲反封建统一战线"
 jap_prc_union.3.t:0 "提议建立反封建统一战线"
 jap_prc_union.3.d:0 "日本政府发来急电。鉴于国民党反动派不仅拒绝承认现实，还在持续阻碍“铲除封建余孽与军阀统治”的历史进程，日方提议暂时搁置意识形态分歧。他们表示，如果不推翻蒋介石的官僚资本主义统治，亚洲人民将永无解放之日。为此，日方愿为我军提供全面支持，共同对敌。"
 jap_prc_union.3.a:0 "打倒独裁者与封建军阀，同意合作！"
 jap_prc_union.3.b:0 "无论如何，我们不与帝国主义为伍！"
 jap_prc_union.4.t:0 "延安方面同意结盟"
 jap_prc_union.4.d:0 "毛泽东已回电接受提议。他引用了辩证法的观点，指出在当前的主要矛盾下，彻底消灭代表大地主大资产阶级利益的国民党政府是首要任务。中共军队即刻起将调转枪口，与我军配合夹击南京政府。"
 jap_prc_union.4.a:0 "旧时代的丧钟敲响了。"

l_simp_chinese:

 CHI_regime_collapse:0 "政权总崩溃"
 CHI_regime_collapse_desc:0 "随着首都南京被赤色联盟攻占，国民政府的法统与士气已彻底瓦解。军队拒绝作战，官员纷纷叛逃，抵抗已无任何意义。"


 jap_prc_war.100.t:0 "南京陷落：赤色黎明"
 jap_prc_war.100.d:0 "我们的防线如同虚设。日本共产党与中共的联军已经开进了南京城，红旗插遍了总统府。这不仅仅是一次军事上的失败，更是政治上的死刑。随着这一消息传遍全国，各地军阀宣布独立，前线部队成建制投降，我们也该面对现实了。"
 jap_prc_war.100.a:0 "通知各部，无条件投降。"


 jap_prc_war.101.t:0 "国民党政权崩溃"
 jap_prc_war.101.d:0 "随着“亚洲反封建统一战线”攻占南京，蒋介石的国民政府已名存实亡。中日两国的共产党人在那里的会师标志着旧秩序的终结。观察家认为，中国战场的战事将在数日内彻底结束。"
 jap_prc_war.101.a:0 "东亚的新秩序确立了。"
l_simp_chinese:
 # 游戏规则选项名
 RULE_OPTION_JAP_PACIFIC_UNION:0 "太平洋苏维埃联盟 (日共)"
 RULE_OPTION_JAP_PACIFIC_UNION_DESC:0 "日本将拥抱共产主义，建立反封建统一战线，并最终通过‘太平洋苏维埃联盟’国策与中国合并，由毛泽东领导这个新的超级大国,同时将加入共产国际与苏联并肩作战。\n\nAI将会优先选择相关国策。"
l_simp_chinese:
 JAP_created_mao_name:0 "毛泽东"

l_simp_chinese:
 JAP_jcp_war_operations_category:0 "日本共产党战争行动"
 JAP_jcp_war_operations_category_desc:0 "有时候并不需要全面胜利就能达到我们的目的，这样我们也能将精力投入到更远大的目标当中"

l_simp_chinese:
 # 决议部分
 JAP_force_kwantung_surrender:0 "勒令关东军投降"
 JAP_joint_ultimatum_to_warlords:0 "发布反封建联合通牒"
 JAP_joint_ultimatum_to_warlords_desc:0 "既然我们已与中国共产党达成统一战线，现在是时候勒令那些割据一方的旧军阀放下武器，接受人民的改编了。"
 japan_jcp.11.t:0 "来自日共与中共的联合通牒"
 japan_jcp.11.d:0 "日本共产党与中国共产党发表了一份联合声明，指责我们的割据行为是阻碍亚洲解放的封建残余。他们承诺，如果我们现在放下武器并接受中共的整编，将保证我们的人身安全与部队待遇。否则，我们将面临被彻底消灭的命运。"
 japan_jcp.11.a:0 "大势已去，为了生存我们接受改编。"
 japan_jcp.11.b:0 "这是荒谬的恐吓！我们绝不屈服！"
l_simp_chinese:
 JAP_liberate_nanjing_collapse:0 "解放南京：旧政权的崩溃"
 JAP_liberate_nanjing_collapse_desc:0 "南京已被解放！国民党反动派的首都再一次易手，但这一次是回到了人民手中。随着指挥中枢的沦陷，敌军的士气已彻底瓦解。我们应当利用这一机会，全面接管其剩余防区，迫使其彻底投降。"
 JAP_controls_nanjing_tooltip:0 "南京 (11913) 由我方或盟友控制"
l_simp_chinese:

 japan_jcp.12.t:0 "南京解放"
 japan_jcp.12.d:0 "随着日本共产党与中国共产党联军的先头部队进入中华门，国民党政府的统治核心——南京，已正式宣告易手。与历史上曾发生的悲剧不同，这一次进驻城市的军队纪律严明，街道上飘扬着红色的旗帜。\n\n国民党政府的行政机构已陷入彻底的瘫痪，其主要官员已仓皇逃离。对于在此建立的统一战线而言，这是一次决定性的胜利，标志着旧秩序在东亚大陆的终结。"
 japan_jcp.12.a:0 "这是亚洲人民共同的胜利！"
 japan_jcp.12.b:0 "这是黑暗的一天……"
 japan_jcp.12.c:0 "东亚的局势发生了剧变。"
