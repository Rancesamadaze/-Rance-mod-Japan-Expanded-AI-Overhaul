 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT_DESC: "日本海军特战队吸收山地部队与游骑兵的训练经验，将高地攀登、林地穿插和小队独立作战整合进海军特战编制，使部队能在复杂地形中保持进攻节奏。"
