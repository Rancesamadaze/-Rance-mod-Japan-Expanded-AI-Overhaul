 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT_DESC: "日本海军特战队将两栖突击、空降支援与舰队火力协调纳入同一套作战流程。经过专门训练的突击队能够更快完成抢滩部署，并在制空权与岸炮压制下维持持续进攻。"
