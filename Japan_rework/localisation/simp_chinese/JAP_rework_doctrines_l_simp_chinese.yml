 ##学说相关
 RANCE_GRAND_DOCTRINE_FURINKAZAN: "風林火山"
 RANCE_GRAND_DOCTRINE_FURINKAZAN_DESC: "其疾如风，其徐如林，侵掠如火，不动如山——風林火山学说强调将快速机动、稳健推进、猛烈突破与坚韧防御统合为一套陆军作战体系，使部队能随战局变化转换攻守节奏并始终保持主动。"
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN: "艦隊決戦"
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN_DESC: "以一战定海权——艦隊決戦学说将远洋索敌、航空先制、夜战雷击与主力舰炮战纳入同一套决战构想，迫使敌舰队在不利时刻投入会战，并在连续打击中失去制海能力。"
