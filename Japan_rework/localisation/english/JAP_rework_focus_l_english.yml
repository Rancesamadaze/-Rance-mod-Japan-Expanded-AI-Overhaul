 # Liberate South Asian countries
 JAP_liberate_south_asia_target:0 "Support the Armed Liberation of §Y[FROM.GetNameDef]§!"
 JAP_liberate_south_asia_target_desc:0 "With our party's full support and covert work, a new §Rred regime§! has risen proudly in §Y[FROM.GetNameDef]§!, and the spark of revolution has become a prairie fire. Yet stubborn imperialist reactionaries still cling to parts of the territory in their death throes. Now is the decisive moment: we must send more brave volunteers and military advisers, carrying advanced equipment, to help local comrades launch the final offensive. With thunderous force, we will sweep those arrogant invaders out for good and let the righteous red flag fly over South Asia!"
 JAP_expel_colonial_powers_from_south_asia:0 "Agitate for Independence in §Y[FROM.GetNameDef]§!'s South Asian Colonies"
 JAP_expel_colonial_powers_from_south_asia_desc:0 "With our party's secret funding and guidance, undercurrents are already stirring within §Y[FROM.GetNameDef]§!'s South Asian colonies. Through clandestine radio stations, we spread the spark of freedom, while advanced theory and fine weapons are smuggled to the local resistance. The time is ripe. One final push from us will ignite the flames of revolution, overthrow rotten colonial rule and establish a red regime of workers and peasants. Let us help them sweep these greedy imperialists into the dust of history!"

 # Liberate Middle Eastern countries
 JAP_liberate_middle_east_target:0 "Support the Armed Liberation of §Y[FROM.GetNameDef]§!"
 JAP_liberate_middle_east_target_desc:0 "With our party's full support and covert work, a new §Rred regime§! has risen proudly in §Y[FROM.GetNameDef]§!, and the spark of revolution is sweeping across the endless sands. Yet stubborn imperialist reactionaries still cling to the oilfields and oases in their death throes. Now is the decisive moment: we must send more brave volunteers and military advisers, carrying advanced equipment, to help local comrades launch the final offensive. With thunderous force, we will sweep those arrogant invaders out for good and let the righteous red flag fly over the vast lands of the Middle East!"
 JAP_expel_colonial_powers_from_middle_east:0 "Agitate for Independence in §Y[FROM.GetNameDef]§!'s Middle Eastern Colonies"
 JAP_expel_colonial_powers_from_middle_east_desc:0 "With our party's secret funding and guidance, undercurrents are already stirring within §Y[FROM.GetNameDef]§!'s Middle Eastern colonies. Through clandestine radio stations, we spread the spark of freedom, while advanced theory and fine weapons are smuggled to resistance forces in the desert. The time is ripe. One final push from us will make the flames of revolution roar across the oil basins, overthrow rotten colonial rule and establish a red regime of workers and peasants. Let us help them sweep these greedy imperialists into the dust of history!"
 JAP_commu_free_the_world:0 "Proclaim the Liberation of §Y[FROM.GetNameDef]§!"
 JAP_commu_free_the_world_desc:0 "The world revolution has reached a white-hot stage, while the people of §Y[FROM.GetNameDef]§! still live under reactionary terror. It is time to liberate them."

 Rance_JAP_sway_disillusioned_young_officers:0 "§YNote: this focus can now make most generals loyal to us.§!"

 # =========================================
 # KAGUYA
 # =========================================
 JAP_kaguya_princess:0 "Gensokyo's Finest Princess"
 JAP_kaguya_princess_desc:0 "Even a princess who has lived through hundreds of millions of years can still grow bored.\nEspecially on days when Eientei is as quiet as ever, with no banquets, no incidents and no duels with Mokou, Kaguya naturally begins looking for some new amusement.\n\nOn one such day, a letter from the youkai sage Yukari Yakumo broke the calm."
 JAP_kaguya_eientei:0 "Gather the People of Eientei"
 JAP_kaguya_eientei_desc:0 "For Kaguya, who is used to a NEET life, serving as the ruler of a country may still be too much work.\nKaguya decides to bring Eirin and the rabbits along with her."
 JAP_kaguya_dragon:0 "Impossible Request: The Dragon's Neck Jewel - Five-Colored Bullets -"
 JAP_kaguya_dragon_desc:0 "One of the five impossible requests from The Tale of the Bamboo Cutter. Kaguya-hime set this task for her suitor Otomo no Miyuki, demanding that he obtain the jewel shining with five colors from a dragon's neck. Otomo first ordered his retainers to search for it, but when they found nothing, he sailed out himself to hunt the dragon. He was caught in a storm and nearly lost his life. After apologizing to the gods he returned safely, but exhaustion left him gravely ill and made him a laughingstock."
 JAP_kaguya_bowl:0 "Impossible Request: The Buddha's Stone Bowl - Unbreakable Will -"
 JAP_kaguya_bowl_desc:0 "One of the five impossible requests from The Tale of the Bamboo Cutter. Kaguya-hime set this task for her suitor Prince Ishitsukuri, demanding that he travel to India and obtain the Buddha's stone bowl. Troubled by the distant journey, Prince Ishitsukuri found a soot-blackened stone bowl in a mountain temple and tried to pass it off as the Buddha's bowl with flowery words. But the bowl gave off no light, so Kaguya-hime saw through the deception at once, and he could only abandon it and leave in disgrace."
 JAP_kaguya_robe:0 "Impossible Request: The Fire Rat's Robe - Unscorched Heart -"
 JAP_kaguya_robe_desc:0 "One of the five impossible requests from The Tale of the Bamboo Cutter. Kaguya-hime set this task for her suitor Abe no Udaijin, demanding that he obtain the fire rat's robe, a fur garment that would not burn. Abe sent men to China and finally bought an ornate robe at great cost. He presented it to Kaguya-hime, but when it was placed in the flames, the robe burned to ash, and Abe returned empty-handed."
 JAP_kaguya_shell:0 "Impossible Request: The Swallow's Cowrie Shell - Lifeline -"
 JAP_kaguya_shell_desc:0 "One of the five impossible requests from The Tale of the Bamboo Cutter. Kaguya-hime set this task for her suitor Isonokami no Marotari, demanding that he obtain the cowrie shell said to be kept by swallows. Isonokami climbed up to search the swallows' nests himself, but found nothing and fell, suffering serious injuries. Crushed by failure, he became bedridden. Kaguya-hime pitied his plight and sent a letter of comfort; after writing his reply, Isonokami passed away."
 JAP_kaguya_branch:0 "Impossible Request: Jeweled Branch of Hourai - Dreamlike Paradise -"
 JAP_kaguya_branch_desc:0 "One of the five impossible requests from The Tale of the Bamboo Cutter. Kaguya-hime set this task for her suitor Prince Kuramochi, demanding that he travel to Mount Hourai and obtain the jeweled branch of Hourai. Prince Kuramochi hired skilled craftsmen and spent three years secretly forging a false branch. Kaguya-hime nearly believed him, but when the craftsmen came to demand their wages, the prince's scheme was exposed."
 JAP_kaguya_eternity:0 "Sinner of Eternity and the Instantaneous"
 JAP_kaguya_eternity_desc:0 "Kaguya has the ability to manipulate eternity and the instantaneous. Eternity is a world without history, where the future will never arrive. Even activity within such a world is like time standing still. Her other power, the instantaneous, is the opposite of eternity: a single moment in time. She can gather moments that humans cannot perceive and use them to act. By using that time, she can create multiple different histories. Both powers manipulate time, and both are far too powerful for ordinary humans."
 JAP_kaguya_eternity_time_cycle_tt:0 "During the first part of each month, §YKaguya§! will alternately invoke the powers of §YEternity§! and §Ythe Instantaneous§!, granting our country powerful bonuses."
 JAP_kaguya_burial:0 "Esoterica: Astronomical Entombing"
 JAP_kaguya_burial_desc:0 "Astronomical Entombing is one of Eirin's greatest esoteric arts.\nBy replacing the moon with a false moon, she toys with the sky for no particular reason and can sever the connection between the Earth and the Moon.\nThe false moon prepared by Eirin is even more splendid than the real one."
 JAP_kaguya_burial_night_attack_debuff_tt:0 "§YEirin Yagokoro§! will perform the §Bsecret art of the Lunar Sage§!. Under the influence of the §Rfalse moon§!, enemies will face §Rharsher conditions§! when fighting at §Ynight§!; at §0Cherry Blossoms in Full Bloom (PHANTASM)§! difficulty, the secret art will be further strengthened."
 JAP_kaguya_return:0 "Imperishable Night's Return - Daybreak -"
 JAP_kaguya_return_desc:0 "How nice. Everyone is so happy. They each have their own power, and playing with those powers is wonderfully exhilarating.\nIn the end, though, the other people of Gensokyo had once been troubled by that endless night."
 JAP_kaguya_return_decision_tt:0 "Remove §Ysome restrictions§! from the decisions unlocked by §Y$JAP_hakko_ichiu$§! and §Y$JAP_the_jeweled_spear_has_struck$§!."
 JAP_kaguya_return_expel_barbarians_tt:0 "If §YRevere the Emperor, Expel the Barbarians§! is completed after this, the granted §Y$JAP_expel_the_barbarians$§! will become §Ypermanent§!."
 JAP_kaguya_return_hard_claim_tt:0 "At §YLUNATIC§! difficulty or above, gain claims on §Yall states in the world§!."
 JAP_kaguya_return_normal_claim_tt:0 "At §YHARD§! difficulty or below, gain claims on the §YAsia§!, §YMiddle East§! and §YAustralia§! regions."
