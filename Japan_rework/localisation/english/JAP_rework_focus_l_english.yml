l_english:
 JAP_rework_co_prosperity_sphere_start:0 "The Greater East Asia Co-Prosperity Sphere"
 JAP_rework_co_prosperity_sphere_start_desc:0 "We must form a union in Asia in order to ensure economic self-sufficiency and cooperation among the member states, along with resisting the influence of Western imperialism and Soviet communism. Of course however, this is an effective propaganda tool to enforce our hegemony over the continent."
 JAP_rework_ministry_of_greater_east_asia:0 "TODO translation: Greater East Asia Ministry"
 JAP_rework_ministry_of_greater_east_asia_desc:0 "TODO translation: The Greater East Asia Co-Prosperity Sphere needs a central institution able to handle subject administration, maintain order, coordinate legislation, liaise with intelligence offices, and carry out the overlord's directives. The Greater East Asia Ministry will turn political control of the sphere from temporary orders into a durable administrative system."
 JAP_rework_joint_general_headquarters:0 "TODO translation: Joint General Headquarters"
 JAP_rework_joint_general_headquarters_desc:0 "TODO translation: The Joint General Headquarters brings the army, navy, air force, and the military-political offices of Japan's special subjects into one command conference, allowing member states to expand their armaments through Japan's industrial and design system and assemble forces in designated theaters under a shared operational plan."
 JAP_rework_co_prosperity_army:0 "TODO translation: Co-Prosperity Army"
 JAP_rework_co_prosperity_army_desc:0 "TODO translation: After the Joint General Headquarters is established, army cooperation within the Co-Prosperity Sphere must move beyond temporary troop transfers and become a shared military system. Japan and each special subject will divide responsibilities under one army plan: Japan provides the standard doctrine, training experience, and operational direction, while the subjects retain their local manpower and defense needs and gradually enter a unified Co-Prosperity Army system."
 JAP_rework_co_prosperity_navy:0 "TODO translation: Co-Prosperity Navy"
 JAP_rework_co_prosperity_navy_desc:0 "TODO translation: After the Joint General Headquarters is established, naval cooperation within the Co-Prosperity Sphere will move from scattered escorts toward a shared maritime defense system. Japan will use advisors, training, and fleet regulations to help each special subject organize coastal defense and connect key ports to a common operational network."
 JAP_rework_co_prosperity_airforce:0 "TODO translation: Co-Prosperity Air Force"
 JAP_rework_co_prosperity_airforce_desc:0 "TODO translation: After the Joint General Headquarters is established, air cooperation within the Co-Prosperity Sphere will move from scattered support toward a unified system for air defense, air superiority, and aerial strikes. Japan will use flight training, airfield coordination, and operational regulations to help each special subject organize its air arm and connect key air zones to a shared command network."
 JAP_rework_co_prosperity_army_dm:0 "TODO translation: Co-Prosperity Army"
 JAP_rework_co_prosperity_army_dm_desc:0 "TODO translation: The Joint General Headquarters brings subject armies into a shared system of training, advisors, and operations."
 JAP_rework_co_prosperity_navy_dm:0 "TODO translation: Co-Prosperity Navy"
 JAP_rework_co_prosperity_navy_dm_desc:0 "TODO translation: The Joint General Headquarters brings subject navies into a shared system of training, advisors, and maritime defense."
 JAP_rework_co_prosperity_airforce_dm:0 "TODO translation: Co-Prosperity Air Force"
 JAP_rework_co_prosperity_airforce_dm_desc:0 "TODO translation: The Joint General Headquarters brings subject air forces into a shared system of training, advisors, and air defense."
 JAP_rework_co_prosperity_governance_dm:0 "TODO translation: Co-Prosperity Governance"
