 JAP_dominate_comintern:0 "Dominate the Comintern"
 JAP_dominate_comintern_desc:0 "As our standing in the Comintern rises, we are gradually becoming its de facto leader. Perhaps it is time to make a few requests of our Soviet friends. For the highest interests of the revolution, our spheres of responsibility must be redistributed."

 jap_comintern.1.t:0 "Demands from the East"
 jap_comintern.1.d:0 "Japan has made demands of us. In the name of closer cooperation, they want us to transfer our Siberian territories to them. In return, they will recognize our claims over all of Europe. This would fundamentally alter our geopolitical position."
 jap_comintern.1.a:0 "For the greater good, we agree."
