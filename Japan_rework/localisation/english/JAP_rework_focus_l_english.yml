 JAP_rework_naval_armaments_program_tt:0 "When §Y$JAP_focus_on_aircraft_carriers$§! is completed: create a carrier §Yvariant§! and open §Y4 production lines§! to build the §YShokaku-class§!.\nWhen §Y$JAP_balanced_naval_approach$§! is completed: create carrier and super battleship §Yvariants§!, and open §Y2 production lines§! each to build the §YShokaku-class§! and §YYamato-class§!.\nWhen §Y$JAP_sea_battleship_initiative$§! is completed: create a super battleship §Yvariant§! and open §Y4 production lines§! to build the §YYamato-class§!.\nAlso grants the corresponding §YEquipment Cost Reduction§! according to the selected focus."

