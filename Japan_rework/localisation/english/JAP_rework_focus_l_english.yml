 JAP_rework_learn_from_maoism:0 "Study Mao Zedong Thought"
 JAP_rework_learn_from_maoism_desc:0 "With the merger of the Japanese Communist Party and the Chinese Communist Party and the unification of East Asia, Comrade Mao Zedong has formally become the supreme leader of our united nation. To consolidate the achievements of the revolution and guide the road ahead, we must launch a deep and lasting campaign to study Mao Zedong Thought throughout the party, the army and society. Armed with theory, every revolutionary fighter will grasp the true meaning of the mass line and protracted war, making East Asia's red strength unshakable."
 JAP_mao_guerrilla_tactic:0 "Maoist Modern Guerrilla Tactics"
 JAP_mao_guerrilla_tactic_ult:0 "§RFire and Steel§!"
 JAP_mao_guerrilla_tactic_ult_desc:0 "The world revolution has now entered its white-hot stage. To gain the advantage in the war against imperialism, we must combine Mao Zedong's theory of guerrilla warfare with advanced methods of operation. Then we shall surely plant the red flag across the world!"
 JAP_mao_guerrilla_tactic_ult_cus_tt:0 "[GetJmgtuabc]"
 JAP_mao_guerrilla_tactic_ult_act_tt:0 "§CMaoist Modern Guerrilla Tactics§!:\n§YAll infantry-type battalions:§!\n Initiative: §G+10.0%§!\n Equipment Capture Ratio: §G+10.0%§!"
 JAP_eternal_long_march:0 "§REternal Long March§!"
 JAP_eternal_long_march_desc:0 "This is no ordinary imperialism, and no ordinary capitalism. The reactionary machine of the old world is running at full power, trying to crush the people's road to the future. Against an enemy like this, we must strike hard!\nJust as the people of [ROOT.GetNameDef] still worried over the revolution's future, a silver-haired, red-eyed AI girl appeared before them. She called herself a super artificial intelligence from the future, brought here by Yukari Yakumo.\n\"Just call me Zheng-chan,\" the girl said. \"From here on, let me lend your revolution a hand.\""
 JAP_eternal_long_march_tt:0 "§RZheng-chan§! will take office as the national leader.\n§YThis is a powerful easter egg focus available only on PHANTASM difficulty.§!"

 JAP_rework_rana_tt:0 "If the Chinese Communist Party and Japanese Communist Party fail to merge successfully, Rāna Kaname will become the leader."
