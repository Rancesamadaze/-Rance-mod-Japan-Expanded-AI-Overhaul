l_english:
 # --- Rance events ---
 Rance_jap_event.1.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (Page 1)"
 Rance_jap_event.1.d:0 "Welcome to this mod. Click an option to view the difficulty explanation page. The first three difficulty tiers are listed below. Note that even the easiest setting is not recommended under vanilla balance values; enable it together with other country-strengthening mods."
 Rance_jap_event.1.d.a:0 "§7A Degree of Falling White Snow (EASY)§!"
 Rance_jap_event.1.d.b:0 "§6A Degree of Wind and Frost (NORMAL)§!"
 Rance_jap_event.1.d.c:0 "§4A Degree of Sun-Blocking Blizzard (HARD)§!"
 Rance_jap_event.1.d.d:0 "Too easy. Give me something harder."
 Rance_jap_event.2.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (Page 2)"
 Rance_jap_event.2.d:0 "The first three tiers were not enough? The last three difficulty tiers are listed below. Note that even the hardest setting probably still cannot hang in the heaven-tier slugfests between ultra-buffed mods."
 Rance_jap_event.2.d.a:0 "§OA Degree of Savage Snow and Wind (LUNATIC)§!"
 Rance_jap_event.2.d.b:0 "§RA Degree of Treacherous Waves and Clouds (EXTRA)§!"
 Rance_jap_event.2.d.c:0 "§0A Degree of Cherry Blossoms in Full Bloom (PHANTASM)§!§R(Unfinished)§!"
 Rance_jap_event.2.d.d:0 "I got scared. Give me something easier."
 Rance_jap_nandu_event.1.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (EASY)"
 Rance_jap_nandu_event.1.d:0 "EASY difficulty: a beginner-facing challenge. The AI's main army templates are infantry-tank divisions and special infantry-tank divisions. The AI receives basic difficulty buffs, mainly to smooth its dynamic production adjustments (players may copy them). After its main divisions are ready, the AI also receives dynamic extra equipment supplies based on difficulty (this can be disabled, but is not recommended)."
 Rance_jap_nandu_event.1.d.a:0 "§7Umasou na yuki ga fuuhari fuwari kana§!"
 Rance_jap_nandu_event.r:0 "Return to Difficulty Settings Page 1"
 Rance_jap_nandu_event.2.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (NORMAL)"
 Rance_jap_nandu_event.2.d:0 "NORMAL difficulty: the AI's main army templates are special infantry-tank divisions and mechanized-tank divisions. The AI receives basic difficulty buffs, mainly to smooth its dynamic production adjustments (players may copy them). After its main divisions are ready, the AI also receives dynamic extra equipment supplies based on difficulty (this can be disabled, but is not recommended)."
 Rance_jap_nandu_event.2.d.a:0 "§6Sarasara to take ni oto ari yoru no yuki§!"
 Rance_jap_nandu_event.3.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (HARD)"
 Rance_jap_nandu_event.3.d:0 "HARD difficulty: adds amphibious mechanized-tank divisions on top of the NORMAL main templates. The AI receives basic difficulty buffs, mainly to smooth its dynamic production adjustments (players may copy them). After its main divisions are ready, the AI also receives dynamic extra equipment supplies based on difficulty (this can be disabled, but is not recommended)."
 Rance_jap_nandu_event.3.d.a:0 "§4Ouou to iedo tataku ya yuki no mon§!"
 Rance_jap_nandu_event.4.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (LUNATIC)"
 Rance_jap_nandu_event.4.d:0 "LUNATIC difficulty: adds heavy amphibious mechanized-tank divisions and heavy mechanized-tank divisions on top of the previous tier. The AI receives basic difficulty buffs, mainly to smooth its dynamic production adjustments (players may copy them). After its main divisions are ready, the AI also receives dynamic extra equipment supplies based on difficulty (this can be disabled, but is not recommended)."
 Rance_jap_nandu_event.4.d.a:0 "§OYukima yori usu-murasaki no me-udo kana§!"
 Rance_jap_nandu_event.5.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (EXTRA)"
 Rance_jap_nandu_event.5.d:0 "EXTRA difficulty: adds land cruiser divisions on top of the previous tier. The AI receives basic difficulty buffs, mainly to smooth its dynamic production adjustments (players may copy them). After its main divisions are ready, the AI also receives dynamic extra equipment supplies based on difficulty (this can be disabled, but is not recommended)."
 Rance_jap_nandu_event.5.d.a:0 "§RHebi o kitta iwa to kikeba fuchi samushi§!"
 Rance_jap_nandu_event.6.t:0 "Vanilla Japan Expanded and AI Enhancement Difficulty Settings (PHANTASM)"
 Rance_jap_nandu_event.6.d:0 "PHANTASM difficulty: not recommended under any circumstances. The AI receives different unique bonuses based on its current route; at present, only the Lecture route has a special leader, and the extra mechanics have not yet been written. The AI receives basic difficulty buffs, mainly to smooth its dynamic production adjustments (players may copy them). After its main divisions are ready, the AI also receives dynamic extra equipment supplies based on difficulty (this can be disabled, but is not recommended). Balancing the highest difficulty settings of different mods against the powerful assist tools players bring is usually a mess: most games will either have the player steamroll the AI or get steamrolled by it. Still, if you played the content I wrote, it was worth it. Nah, I'd win."
 Rance_jap_nandu_event.6.d.a:0 "§0Hito no yo no mono to wa mienu sakura no hana§!"

 # --- Kaguya events ---
 JAP_kaguya_events.1.t:0 "A Letter from Yukari Yakumo"
 JAP_kaguya_events.1.d:0 "According to the letter from Yukari Yakumo, she had no particular interest in the current Kodoha easter-egg leader, and wished to invite Kaguya to rule Japan instead.\n\nKaguya was, to begin with, fond of grand strategy games. Besides, if she was merely going to sit around Eientei and spend that slightly excessive amount of time she had on hand, she might as well go and experience the pleasures of conquering the world. Once her HoI4 skills had improved, she could come back and invite Mokou over for a round of PvP. That would be a worthwhile trip in itself.\n\nAnd so Kaguya accepted the proposal with hardly any hesitation.\nAfter all, a princess acting on a passing whim now and then is perfectly normal."
 JAP_kaguya_events.1.a:0 "LINK START!"

 # --- Kodoha events ---
 JAP_kodoha_events.1.t:0 "A Choice of Administrative Efficiency"
 JAP_kodoha_events.1.d:0 "Although our regime has yet to fully stabilize, the world now stands at a decisive turning point. If we cling to old procedures, we may fall behind in the coming war. Should we reorganize our administrative apparatus for greater efficiency, even if doing so carries a cost?"
 JAP_kodoha_events.1.a:0 "Straighten the Machinery, Make It Swift"
 JAP_kodoha_events.1.b:0 "Keep the Old System, Keep It Steady"
 JAP_kodoha_events.1.c:0 "I Want It All"
 JAP_kodoha_events.1.a.tt:0 "§GReduces§! the time required for each subsequent key Kodoha focus by §G14§! days.\n§RThe cost is§! that some focus rewards will be weakened."
 JAP_kodoha_events.1.c.tt:0 "§GReduces§! the time required for each subsequent key Kodoha focus by §G14§! days.\n§GWill not§! weaken subsequent focus rewards."
 JAP_kodoha_admin_efficiency_penalty_flag:0 "Administrative Efficiency First Policy Adopted"

 # --- SEA Japan foreign-policy event ---
 SEA_japan_foreign_policy.4.c:0 "The war in Indochina is not yet over"
 SEA_japan_foreign_policy.4.c_tt:0 "Japan will demand that we join its faction again in §Y181 days§!."
