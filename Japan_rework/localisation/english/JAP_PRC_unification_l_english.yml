l_english:
 jap_prc_union.1.t:0 "A Proposal from Tokyo"
 jap_prc_union.1.d:0 "The Japanese Communist Party has sent us a historic proposal. They argue that, to resist imperialism and build a true Pan-Asian Soviet Union, we must erase the boundaries between us. They propose merging our two regimes and, under Tokyo's leadership, marching together into the future through the Pacific Soviet Union."
 jap_prc_union.1.a:0 "For proletarian unity, we agree to merge!"
 jap_prc_union.1.b:0 "No, we will walk our own path."
 jap_prc_union.2.t:0 "The Chinese Comrades' Response"
 jap_prc_union.2.d:0 "The Chinese Communist Party has accepted our proposal! They are willing to set aside national borders and join our Pacific Soviet Union. This is a historic moment. Asia's proletariat has never been so united."
 jap_prc_union.2.a:0 "Workers, unite!"
 JAP_cede_leadership_to_mao:0 "Cede Supreme Leadership"
 JAP_cede_leadership_to_mao_desc:0 "For the long-term future of the Pacific Soviet Union, we need a true helmsman to guide our course. Comrade Mao Zedong's outstanding achievements in theory and practice prove that he is the most suitable candidate. Tokyo will step back and give its full support to this giant from the continent."
 RULE_OPTION_COMMUNIST_PACIFIC_UNION:0 "Pacific Soviet Union (CCP Merger)"
 RULE_OPTION_COMMUNIST_PACIFIC_UNION_DESC:0 "Japan will embrace Marxism, establish the Pacific Soviet Union through the \"Lecture Group\" route, and ultimately seek a merger with the Chinese Communist Party, ceding leadership to Mao Zedong."
 JAP_revolutionary_fervor_idea:0 "Revolutionary Fervor"
 JAP_revolutionary_fervor_idea_desc:0 "Freed from the shackles of the Peace Preservation Law, our fighters have unleashed astonishing combat power while defending their homes and liberating their comrades.\n§GAttack on core territory: +15%§!\n§GDefense on core territory: +15%§!"
 Anti_Kuomintang_League:0 "Asian Anti-Feudal United Front"
 jap_prc_union.3.t:0 "Proposal to Establish an Anti-Feudal United Front"
 jap_prc_union.3.d:0 "An urgent telegram has arrived from the Japanese government. Since the Kuomintang reactionaries not only refuse to recognize reality, but continue to obstruct the historic process of \"eradicating feudal remnants and warlord rule,\" Japan proposes that we temporarily set aside ideological differences. They state that unless Chiang Kai-shek's bureaucratic-capitalist rule is overthrown, the peoples of Asia will never see liberation. To that end, Japan is willing to provide our army with full support and fight the enemy together."
 jap_prc_union.3.a:0 "Down with the dictator and feudal warlords. We agree to cooperate!"
 jap_prc_union.3.b:0 "No matter what, we will not stand with imperialists!"
 jap_prc_union.4.t:0 "Yan'an Agrees to the Alliance"
 jap_prc_union.4.d:0 "Mao Zedong has replied and accepted the proposal. Citing dialectics, he pointed out that under the current principal contradiction, the foremost task is to completely eliminate the Kuomintang government that represents the interests of the great landlords and big bourgeoisie. The Chinese Communist forces will immediately turn their guns and coordinate with our army to strike the Nanjing government from both sides."
 jap_prc_union.4.a:0 "The old age's death knell has sounded."
 CHI_regime_collapse:0 "Total Regime Collapse"
 CHI_regime_collapse_desc:0 "With the capital at Nanjing seized by the red alliance, the National Government's legitimacy and morale have utterly collapsed. The army refuses to fight, officials are defecting in droves, and resistance has lost all meaning."
 jap_prc_war.100.t:0 "Fall of Nanjing: Red Dawn"
 jap_prc_war.100.d:0 "Our defenses may as well not have existed. The allied forces of the Japanese Communist Party and the Chinese Communist Party have marched into Nanjing, and red flags now fly across the Presidential Palace. This is not merely a military defeat, but a political death sentence. As the news spreads across the country, warlords everywhere declare independence, front-line units surrender en masse, and we too must face reality."
 jap_prc_war.100.a:0 "Notify all units: unconditional surrender."
 jap_prc_war.101.t:0 "Collapse of the Kuomintang Regime"
 jap_prc_war.101.d:0 "With the \"Asian Anti-Feudal United Front\" taking Nanjing, Chiang Kai-shek's National Government now exists in name only. The meeting of Chinese and Japanese communists there marks the end of the old order. Observers believe that the fighting on the Chinese front will end completely within days."
 jap_prc_war.101.a:0 "A new order in East Asia has been established."
 RULE_OPTION_JAP_PACIFIC_UNION:0 "Pacific Soviet Union (JCP)"
 RULE_OPTION_JAP_PACIFIC_UNION_DESC:0 "Japan will embrace communism, establish the Anti-Feudal United Front, and ultimately merge with China through the \"Pacific Union of Soviet Socialist Republics\" focus, with Mao Zedong leading this new superpower. It will also join the Comintern and fight alongside the Soviet Union.\n\nThe AI will prioritize the relevant focuses."
 JAP_created_mao_name:0 "Mao Zedong"
 JAP_jcp_war_operations_category:0 "Japanese Communist Party War Operations"
 JAP_jcp_war_operations_category_desc:0 "Sometimes total victory is not necessary to achieve our aims. That way, we can devote our strength to still greater objectives."
 JAP_force_kwantung_surrender:0 "Order the Kwantung Army to Surrender"
 JAP_joint_ultimatum_to_warlords:0 "Issue Joint Anti-Feudal Ultimatum"
 JAP_joint_ultimatum_to_warlords_desc:0 "Since we have formed a united front with the Chinese Communist Party, it is time to order those old warlords entrenched in their own domains to lay down their arms and accept reorganization by the people."
 japan_jcp.11.t:0 "Joint Ultimatum from the JCP and CCP"
 japan_jcp.11.d:0 "The Japanese Communist Party and the Chinese Communist Party have issued a joint statement, denouncing our separatist rule as a feudal remnant obstructing the liberation of Asia. They promise that if we lay down our arms now and accept reorganization by the Chinese Communist Party, our personal safety and the treatment of our troops will be guaranteed. Otherwise, we will face complete destruction."
 japan_jcp.11.a:0 "The tide has turned. To survive, we accept reorganization."
 japan_jcp.11.b:0 "This is absurd intimidation! We will never submit!"
 JAP_liberate_nanjing_collapse:0 "Liberate Nanjing: Collapse of the Old Regime"
 JAP_liberate_nanjing_collapse_desc:0 "Nanjing has been liberated! The capital of the Kuomintang reactionaries has changed hands once again, but this time it has returned to the people. With their command center fallen, enemy morale has utterly collapsed. We should use this opportunity to take over their remaining defense zones and force their final surrender."
 JAP_controls_nanjing_tooltip:0 "Nanjing (11913) is controlled by us or an ally"
 japan_jcp.12.t:0 "Liberation of Nanjing"
 japan_jcp.12.d:0 "As the vanguard of the allied forces of the Japanese Communist Party and the Chinese Communist Party enters Zhonghua Gate, Nanjing, the core of Kuomintang rule, has officially changed hands. Unlike the tragedies that once took place in history, the troops entering the city this time are disciplined, and red flags fly above the streets.\n\nThe Kuomintang government's administrative apparatus has fallen into total paralysis, and its leading officials have fled in panic. For the united front established here, this is a decisive victory, marking the end of the old order on the East Asian continent."
 japan_jcp.12.a:0 "This is a shared victory for the peoples of Asia!"
 japan_jcp.12.b:0 "This is a dark day..."
 japan_jcp.12.c:0 "The situation in East Asia has changed dramatically."
 JAP_PRC_union:0 "Union of Pacific Soviet Socialist Republics"
 JAP_PRC_union_DEF:0 "the Union of Pacific Soviet Socialist Republics"
 JAP_PRC_union_ADJ:0 "Asian"
 JAP_jcp_join_the_comintern:0 "Join the Comintern"
 JAP_jcp_join_the_comintern_desc:0 "The world today is threatened by imperialists, fascists and greedy capitalists. Although our path is not entirely the same as the Soviet Union's, we should set aside our differences. Only by standing together can we make the red star shine over the world."
 JAP_soviet_research_exchange:0 "Japan-Soviet Research Exchange"
 JAP_soviet_research_exchange_desc:0 "After joining the Comintern, the Japanese Communist Party and the Soviet Union have begun deep research exchanges. By sharing our advanced technologies in different fields, the defense industries of both countries will advance to a new level together."
 JAP_artillery_tech_bonus:0 "Japan-Soviet Research Exchange: Artillery Bonus"
 JAP_tank_tech_bonus:0 "Japan-Soviet Research Exchange: Tank Bonus"
 SOV_naval_tech_bonus:0 "Japan-Soviet Research Exchange: Ship Bonus"
 SOV_air_tech_bonus:0 "Japan-Soviet Research Exchange: Aircraft Bonus"
 JAP_help_prc_against_chi:0 "Emergency Intervention in China"
