 jap_rance_air_sea_joint_assault_amphibious_armor_breakthrough:0 "Amphibious Armor Breakthrough"
 jap_rance_air_sea_joint_assault_landing_air_cover_coordination:0 "Landing Air Cover Coordination"
 jap_rance_air_sea_joint_assault_marine_raider_elements:0 "Naval Special Assault Elements"
 jap_rance_air_sea_joint_assault_amphibious_mechanized_reserve:0 "Amphibious Mechanized Reserve"
 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT:0 "Mountain Ranger Assault"
 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT_DESC:0 "Japan's naval special forces absorb mountaineer and ranger training, folding highland climbing, forest infiltration, and independent small-unit action into their organization so they can keep up the attack in difficult terrain."
 jap_rance_mountain_ranger_assault_add_mastery_bonus_effect_tooltip:0 "Gain a §YMountain Ranger Assault§! doctrine mastery gain bonus."
