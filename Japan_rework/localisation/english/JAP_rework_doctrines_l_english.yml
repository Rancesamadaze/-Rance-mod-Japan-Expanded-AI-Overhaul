 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT:0 "Air-Sea Joint Assault"
 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT_DESC:0 "Japan's naval special forces integrate amphibious assault, airborne support, and fleet fire coordination into one operational flow. Purpose-trained assault teams can establish beachheads faster and sustain attacks under air superiority and naval gunfire."
 jap_rance_air_sea_joint_assault_add_mastery_bonus_effect_tooltip:0 "Gain a §YAir-Sea Joint Assault§! doctrine mastery gain bonus."
