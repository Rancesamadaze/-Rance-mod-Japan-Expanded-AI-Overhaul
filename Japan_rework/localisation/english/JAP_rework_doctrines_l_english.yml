## Doctrine-related
 RANCE_GRAND_DOCTRINE_FURINKAZAN:0 "Furinkazan"
 RANCE_GRAND_DOCTRINE_FURINKAZAN_DESC:0 "Swift as the wind, steady as the forest, ravaging as fire, immovable as the mountain. The Furinkazan doctrine unifies rapid maneuver, deliberate advance, violent breakthrough, and stubborn defense into a single army operational system, allowing units to shift their offensive and defensive tempo with the battle while keeping the initiative."
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN:0 "Kantai Kessen"
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN_DESC:0 "Decide sea control in a single battle. The Kantai Kessen doctrine binds ocean scouting, carrier first strikes, night torpedo attacks, and capital-ship gunnery into one decisive battle concept, forcing the enemy fleet to commit at the wrong moment and lose command of the sea under successive blows."
