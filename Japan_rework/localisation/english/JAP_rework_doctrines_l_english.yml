 # --- project doctrine keys ---
 ## Doctrine-related
 RANCE_GRAND_DOCTRINE_FURINKAZAN:0 "Furinkazan"
 RANCE_GRAND_DOCTRINE_FURINKAZAN_DESC:0 "Swift as the wind, steady as the forest, ravaging as fire, immovable as the mountain. The Furinkazan doctrine unifies rapid maneuver, deliberate advance, violent breakthrough, and stubborn defense into a single army operational system, allowing units to shift their offensive and defensive tempo with the battle while keeping the initiative."
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN:0 "Kantai Kessen"
 RANCE_GRAND_DOCTRINE_KANTAI_KESSEN_DESC:0 "Decide sea control in a single battle. The Kantai Kessen doctrine binds ocean scouting, carrier first strikes, night torpedo attacks, and capital-ship gunnery into one decisive battle concept, forcing the enemy fleet to commit at the wrong moment and lose command of the sea under successive blows."
 tactic_rance_swift_as_wind:0 "Swift as the Wind"
 tactic_rance_steady_as_forest:0 "Steady as the Forest"
 tactic_rance_raiding_as_fire:0 "Ravaging as Fire"
 tactic_rance_immovable_as_mountain:0 "Immovable as the Mountain"
 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT:0 "Air-Sea Joint Assault"
 SUBDOCTRINE_JAP_RANCE_AIR_SEA_JOINT_ASSAULT_DESC:0 "Japan's naval special forces integrate amphibious assault, airborne support, and fleet fire coordination into one operational flow. Purpose-trained assault teams can establish beachheads faster and sustain attacks under air superiority and naval gunfire."
 jap_rance_air_sea_joint_assault_add_mastery_bonus_effect_tooltip:0 "Gain a §YAir-Sea Joint Assault§! doctrine mastery gain bonus."
 JAP_rance_improved_amphibious_designs_idea:0 "Improved Amphibious Designs"
