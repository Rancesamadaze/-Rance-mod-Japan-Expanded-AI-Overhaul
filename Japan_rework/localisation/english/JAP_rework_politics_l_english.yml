 JAP_rework_kaguya_hourai_jewel_branch_trait:0 "Divine Treasure \"Jeweled Branch of Hourai -Dreamlike Paradise-\""
 JAP_rework_erin:0 "Eirin Yagokoro"
 JAP_rework_erin_trait:0 "§2Brain of the Moon§!"
 JAP_erin_desc:0 "§LA Lunarian. In other words, an alien. She has lived hidden away on Earth for a very long time.\nHer relationship with Kaguya began long ago, back when Kaguya still lived on the Moon.\nThe Yagokoro family is a family of genius pharmacists that settled on the Moon at some unknown point in the past. Even among them, Eirin's knowledge is outstanding. Her intellect far surpasses that of humans, and as a result she often says things that are difficult to understand.\nIn the distant past, when the lunar princess Kaguya was exiled to Earth to atone for her crime, Eirin was one of the emissaries sent to bring her back when her sentence ended. Yet for some reason, she conspired with Kaguya and killed the other lunar emissaries.\nTo keep the lowly earthling who had been living with Kaguya at the time from revealing their secret, Eirin gave him a specially made medicine pot containing the Hourai Elixir as hush money. Anyone who drinks it will gain eternal youth and immortality.\nHowever, that earthling apparently never used the Hourai Elixir, and soon died. Only later did they learn that he seemed to have been killed by someone.\nEirin is a genius.\nHer knowledge stands out even within the Yagokoro family, the genius pharmacist clan of the Moon. Her intellect far surpasses that of humans, and as a result she often says things that are difficult to understand. She invented a quantum seal capable of determining the number of recipients by means of quantum properties, and even now no one else can make such a seal.\nShe also has the ability to make any medicine.\nShe can make medicine for humans and medicine for youkai alike. Even for difficult and unusual illnesses, she can prescribe a special remedy. Her medicines are reputed to have no side effects and to work well. Because she possesses knowledge of all medicines, neither poison nor medicine has any effect on Eirin.\nShe possesses overwhelming power compared to Kaguya Houraisan, but Eirin often seems to hold back, keeping herself from appearing stronger than Kaguya.§!"
 JAP_rework_reisen:0 "Reisen Udongein Inaba"
 JAP_rework_reisen_trait:0 "§R\"Lunatic Red Eyes\"§!"
 JAP_reisen_desc:0 "§LA rabbit who lived on the Moon.\nHidden within her red eyes is a madness several times greater than that of earth rabbits.\nShe is now Kaguya's pet. Her name was originally simply Reisen; she added kanji to disguise herself as an earthling, but it feels extremely unnatural.\nHer ability is the power to manipulate madness, or wavelengths.\nManipulating madness is in effect the ability to drive people mad, the ability to manipulate the waves that dwell within things.\nIf the wavelength grows longer, one becomes relaxed and loses the will to do anything at all.\nIf the wavelength grows shorter, madness follows: emotions become unstable and irrational, and even conversation becomes impossible.\nIncreasing the amplitude makes existence excessive, allowing thoughts to be communicated no matter how far away the other party is.\nDecreasing the amplitude makes existence thin, preventing voices from reaching others no matter how close they are.\nIf the phase is shifted, there is no interference, and things cannot be touched.\nIf the phase is inverted, existence is negated, making the form vanish completely.\nUsing such a rich array of powers to drive people mad might even achieve the effect of Limitless and Unlimited Void. (laugh)§!"
 JAP_rework_tewi:0 "Tewi Inaba"
 JAP_rework_tewi_trait:0 "§8White Rabbit of Good Fortune§!"
 JAP_tewi_desc:0 "§LAbility: the power to bring good fortune to humans\nA rabbit who acquired the power to become a youkai while taking care of her health and living for a very long time.\nShe lives in Eientei and leads the rabbit herd, but her impulsive personality makes her seem more like a fairy than a youkai.\nPeople lost in the bamboo forest sometimes catch sight of her. It is said that anyone who sees her will surely find their way out, so people regard her as a guide through the Bamboo Forest of the Lost.\nIn truth, using the good fortune received from her for something like that is a terrible waste, but humans never notice. Because they are fools.§!"
 JAP_rework_mimo:0 "Mima"
 JAP_rework_mimo_trait:0 "§GShura of the Demon Flash§!"
 JAP_mimo_desc:0 "§LOne of the Four Generals of Shinra. She is the chief instructor responsible for all Shinra mercenaries, and keeps her eyes closed at all times to preserve her spiritual power. Legend says that no living human has ever seen her with her eyes open. Although she never fights at full strength, she still possesses tremendous combat power. She has won others over through sheer ability; her specialty is flashing behind the enemy with extreme speed and slaughtering them. Her draw is said to rival the speed of light, and she can fire a magic cannon of overwhelming destructive power from a tiny pistol, a sight that leaves onlookers stunned. She is one of the founding veterans of Genesis, having joined when Genesis was first established. She admired Shinki's presence and decided to swear loyalty to her. Though she has her own reason, she is absolutely prepared to obey any task entrusted to her. Over time, that stubbornness has gradually softened, especially after she took on pupils such as Marisa Kirisame. Yet her desire to witness the completion of the Genesis Plan has never changed.§!"
