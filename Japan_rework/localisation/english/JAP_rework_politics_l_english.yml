 JAP_rework_rana:0 "Rāna Kaname"
 JAP_rework_kaguya:0 "Kaguya Houraisan"
 JAP_rework_kaguya_desc:0 "§LKaguya is one of the Lunarians, raised with great care as a princess of the Moon. Spoiled and pampered, she was extremely willful; on a passing whim she had Eirin make the forbidden medicine known as the Hourai Elixir, and even took part in its creation herself.\n\nThe matter was soon exposed, and Kaguya was sentenced to death. Yet with her power of eternity, she would be reborn immediately even if killed, making it impossible for her to truly die. As punishment, she was ordered to live her next life among the lowly people of Earth. Thus she was cast down to the mortal world, where she began her earthly life under the name Kaguya.\n\nYears later, Kaguya's sentence came to an end, and she was supposed to return to the Moon. Yet she hesitated, reluctant to leave the people on Earth who had cared for her. It was then that she encountered the familiar Eirin. Burdened by intense guilt over what had happened in the past, Eirin betrayed the lunar emissaries, helped Kaguya escape, and secluded herself with her deep in the remote mountains.\n\nAfter long ages passed, the Moon sent no further messengers, and the two gradually forgot the past and lived in peace. Then one day, a fugitive moon rabbit wandered into Eientei. Her name was Reisen, and she claimed that the Moon had been invaded by humans, that someone had even planted a flag on the lunar surface and declared the Moon theirs. Only then did Kaguya remember that she too was a Lunarian.\n\nSeveral decades later, on a night of the full moon, Reisen received a message from her fellow moon rabbits: the Lunarians had decided to launch a final all-out war against the people of Earth, and would come before the next full moon to take Reisen away. After discussing the matter with Eirin, Kaguya decided to refuse to return Reisen to the Moon. Rather than continue fleeing and hiding, Kaguya wished to live openly and proudly on Earth.\n\nThus Eirin proposed a method to make the full moon vanish from Earth. Kaguya and the others hid the true Moon away and replaced the full moon in the sky with a false one, severing travel between Earth and the Moon. Their only miscalculation was that they had not expected the youkai who relied on the power of the full moon to be so strong. In the end, through the combined efforts of humans and youkai, the illusion was broken.\n\nYet from this they also learned that Gensokyo was itself a closed space, and that lunar emissaries could no longer come so easily. Now Kaguya, Eirin, and Reisen no longer need to remain in hiding, and live calm, ordinary lives in Eientei. As for the Moon's final fate, they chose to settle on Earth, and so have no way of knowing it.§!"
 JAP_rework_kaguya_lunar_princess_trait:0 "Lunar Princess"
 JAP_rework_kaguya_brilliant_dragon_bullet_trait:0 "Divine Treasure \"Brilliant Dragon Bullet\""
