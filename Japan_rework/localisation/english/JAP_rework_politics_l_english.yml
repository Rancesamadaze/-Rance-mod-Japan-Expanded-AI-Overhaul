 JAP_niten_ichiryu_army_rework_spirit_desc:0 "Uniting attack and defense in one body, this school folds decisive advance and stubborn defense into the same officer training."
 JAP_niten_ichiryu_army_rework_spirit_tt:0 "Army leaders: §G75% chance§! to gain §Y+1 Attack§! when they level up.\nArmy leaders: §G75% chance§! to gain §Y+1 Defense§! when they level up."
