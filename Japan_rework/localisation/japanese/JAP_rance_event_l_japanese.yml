l_japanese:
 Rance_jap_event.1.t:0 "バニラ日本拡張・AI強化難易度設定（1ページ目）"
 Rance_jap_event.1.d:0 "本MODへようこそ。選択肢をクリックすると難易度説明ページへ進みます。以下は前半3段階の難易度です。最も簡単な難易度でもバニラ数値のまま挑むことは推奨しません。各国強化系MODと併用して有効化してください。"
 Rance_jap_event.1.d.a:0 "§7白雪舞う程度(EASY)§!"
 Rance_jap_event.1.d.b:0 "§6風霜満つる程度(NORMAL)§!"
 Rance_jap_event.1.d.c:0 "§4吹雪が日を覆う程度(HARD)§!"
 Rance_jap_event.1.d.d:0 "簡単すぎる。もっと高い難易度を。"
 Rance_jap_event.2.t:0 "バニラ日本拡張・AI強化難易度設定（2ページ目）"
 Rance_jap_event.2.d:0 "前半3段階では物足りませんか？以下は後半3段階の難易度です。なお、最難関でも超高数値MOD同士が殴り合ういわゆる天上決戦には参加できないでしょう（たぶん）。"
 Rance_jap_event.2.d.a:0 "§O雪風荒ぶ程度(LUNATIC)§!"
 Rance_jap_event.2.d.b:0 "§R波乱雲湧く程度(EXTRA)§!"
 Rance_jap_event.2.d.c:0 "§0桜花爛漫の程度(PHANTASM)§!§R（未完成）§!"
 Rance_jap_event.2.d.d:0 "怖くなった。もう少し簡単なのを。"
 Rance_jap_nandu_event.1.t:0 "バニラ日本拡張・AI強化難易度設定(EASY)"
 Rance_jap_nandu_event.1.d:0 "EASY難易度：初心者向けの挑戦難易度。AIの主力陸軍編制は歩兵戦車師団と特殊歩兵戦車師団です。AIは難易度に応じて基礎バフを受け、主に動的な生産調整を円滑にします（プレイヤーもコピー可）。主力師団編制が整った後、AIは難易度に応じた動的な追加装備補給も受けます（無効化可能ですが非推奨）。"
 Rance_jap_nandu_event.1.d.a:0 "§7うまさうな雪がふうはりふわりかな§!"
 Rance_jap_nandu_event.r:0 "難易度設定1ページ目に戻る"
 Rance_jap_nandu_event.2.t:0 "バニラ日本拡張・AI強化難易度設定(NORMAL)"
 Rance_jap_nandu_event.2.d:0 "NORMAL難易度：AIの主力陸軍編制は特殊歩兵戦車師団と機械化戦車師団です。AIは難易度に応じて基礎バフを受け、主に動的な生産調整を円滑にします（プレイヤーもコピー可）。主力師団編制が整った後、AIは難易度に応じた動的な追加装備補給も受けます（無効化可能ですが非推奨）。"
 Rance_jap_nandu_event.2.d.a:0 "§6さらさらと竹に音あり夜の雪§!"
 Rance_jap_nandu_event.3.t:0 "バニラ日本拡張・AI強化難易度設定(HARD)"
 Rance_jap_nandu_event.3.d:0 "HARD難易度：NORMAL難易度の主力編制に加えて、水陸両用機械化戦車師団が追加されます。AIは難易度に応じて基礎バフを受け、主に動的な生産調整を円滑にします（プレイヤーもコピー可）。主力師団編制が整った後、AIは難易度に応じた動的な追加装備補給も受けます（無効化可能ですが非推奨）。"
 Rance_jap_nandu_event.3.d.a:0 "§4応々といへど敲くや雪の門§!"
 Rance_jap_nandu_event.4.t:0 "バニラ日本拡張・AI強化難易度設定(LUNATIC)"
 Rance_jap_nandu_event.4.d:0 "LUNATIC難易度：前段階に加えて、水陸両用重機械化戦車師団と重機械化戦車師団が追加されます。AIは難易度に応じて基礎バフを受け、主に動的な生産調整を円滑にします（プレイヤーもコピー可）。主力師団編制が整った後、AIは難易度に応じた動的な追加装備補給も受けます（無効化可能ですが非推奨）。"
 Rance_jap_nandu_event.4.d.a:0 "§O雪間より薄紫の芽独活哉§!"
 Rance_jap_nandu_event.5.t:0 "バニラ日本拡張・AI強化難易度設定(EXTRA)"
 Rance_jap_nandu_event.5.d:0 "EXTRA難易度：前段階に加えて、陸上巡洋艦師団が追加されます。AIは難易度に応じて基礎バフを受け、主に動的な生産調整を円滑にします（プレイヤーもコピー可）。主力師団編制が整った後、AIは難易度に応じた動的な追加装備補給も受けます（無効化可能ですが非推奨）。"
 Rance_jap_nandu_event.5.d.a:0 "§R蛇を斬つた岩と聞けば淵寒し§!"
 Rance_jap_nandu_event.6.t:0 "バニラ日本拡張・AI強化難易度設定(PHANTASM)"
 Rance_jap_nandu_event.6.d:0 "PHANTASM難易度：どのような場合でも推奨しない難易度です。AIは現在のルートに応じて異なる独自ボーナスを受けますが、現時点では講座派ルートのみ特殊指導者が実装されており、追加メカニクスはまだ未実装です。AIは難易度に応じて基礎バフを受け、主に動的な生産調整を円滑にします（プレイヤーもコピー可）。主力師団編制が整った後、AIは難易度に応じた動的な追加装備補給も受けます（無効化可能ですが非推奨）。各MODの最高難易度と、プレイヤーが高難易度AIへ挑むための強力な補助ツールのバランスは、たいてい調整が困難です。多くの場合、プレイヤーがAIを押し潰すか、AIに押し潰されるかのどちらかでしょう。それでも、私の書いた内容を遊んでくれたなら無駄ではありません。勝つさ。"
 Rance_jap_nandu_event.6.d.a:0 "§0人の世のものとは見へぬ桜の花§!"
