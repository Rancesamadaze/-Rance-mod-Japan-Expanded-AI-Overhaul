 JAP_rai_normal_general:0 "AI陸軍指揮官強化：§6EN§!段階"
 JAP_rai_normal_general_desc:0 "日本AI、または開始時ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§YEN§!段階の場合、すべての陸軍指揮官を最低§Y4§!レベルまで補強し、基本作戦特性を追加する。同時に、現在の陸軍元帥に兵站の魔術師、徹底的な計画者、熟練委任者を追加する。新たに獲得した陸軍指揮官と新たに昇進した陸軍元帥も、現在の段階に応じて自動補強される。"
 JAP_rai_hard_general:0 "AI陸軍指揮官強化：§4HL§!段階"
 JAP_rai_hard_general_desc:0 "日本AI、または開始時ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§YHL§!段階の場合、すべての陸軍指揮官を最低§Y7§!レベルまで補強し、基本、山岳、丘陵、機甲作戦、適応能力などの特性を追加する。同時に、現在の陸軍元帥にEN段階の内容に加えて鋭い攻撃者と防御ドクトリンを追加する。新たに獲得した陸軍指揮官と新たに昇進した陸軍元帥も、現在の段階に応じて自動補強される。"
 JAP_rai_lunatic_general:0 "AI陸軍指揮官強化：§OEXPH§!段階"
 JAP_rai_lunatic_general_desc:0 "日本AI、または開始時ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§YEXPH§!段階の場合、すべての陸軍指揮官を最低§Y9§!レベルまで補強し、特殊作戦、上陸、多地形、要塞、待ち伏せ、ゲリラ作戦特性を補完する。同時に、現在の陸軍元帥にHL段階の内容に加えてカリスマと組織第一を追加する。新たに獲得した陸軍指揮官と新たに昇進した陸軍元帥も、現在の段階に応じて自動補強される。"
 JAP_rai_normal_admiral:0 "AI海軍指揮官強化：§6EN§!段階"
 JAP_rai_normal_admiral_desc:0 "日本AI、または開始時ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§YEN§!段階の場合、すべての海軍指揮官を最低§Y4§!レベルまで補強し、基本艦隊作戦特性を追加する。新たに獲得した海軍指揮官も、現在の段階に応じて自動補強される。"
 JAP_rai_hard_admiral:0 "AI海軍指揮官強化：§4HL§!段階"
 JAP_rai_hard_admiral_desc:0 "日本AI、または開始時ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§YHL§!段階の場合、すべての海軍指揮官を最低§Y7§!レベルまで補強し、隠密専門家、深海の槍、魚雷専門家、駆逐艦指揮官、巡洋艦艦長、飛行甲板管理者などの特性を追加する。新たに獲得した海軍指揮官も、現在の段階に応じて自動補強される。"
 JAP_rai_lunatic_admiral:0 "AI海軍指揮官強化：§OEXPH§!段階"
 JAP_rai_lunatic_admiral_desc:0 "日本AI、または開始時ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§YEXPH§!段階の場合、すべての海軍指揮官を最低§Y9§!レベルまで補強し、決戦、護衛、空母、魚雷、近海/遠洋作戦特性を補完する。新たに獲得した海軍指揮官も、現在の段階に応じて自動補強される。"
