 JAP_imperial_headquarters_scripted_landing_anatolia_to_central_albania_desc:0 "大本営は§Cアナトリア支点§!を基点に、上陸兵力を集結し、海上輸送を組織し、海空掩護の下で§R中央アルバニア§!方面への攻撃路を開く準備を進める。敵軍防衛線が継続的な牽制により隙を見せた場合、本作戦は即時発動の奇襲上陸に切り替わる。"
