 JAP_imperial_headquarters_scripted_landing_north_yemen_to_eastern_desert_plan_tt:0 "奇襲を発動するには、さらに§O[?JAP_scripted_landing_raid_remaining|0]§!回の上陸作戦を成功させる必要がある。\n本作戦は§O通常上陸§!である：§R東部砂漠§!守備隊に上陸警戒を通達する。§O30日§!後、§C北イエメン§!がなお作戦支点として使用可能で、§R東部砂漠§!がなお敵の支配下にある場合、そこで中規模上陸を発動し、現地守備隊の配置を乱して一定の戦闘損失を与える。"
 JAP_imperial_headquarters_scripted_landing_north_yemen_to_eastern_desert_raid_tt:0 "§R本作戦はただちに奇襲上陸を発動する。§!\nこのディシジョンを選択すると、§C北イエメン§!を作戦支点として、§R東部砂漠§!へ中規模奇襲上陸をただちに発動し、現地守備隊の配置を乱してより大きな戦闘損失を与える。奇襲完了後も、本作戦は対応する上陸整備能力を占有し、再び割り当てるには§O30日§!の整備完了を待つ必要がある。"
 JAP_imperial_headquarters_scripted_landing_suez_alexandria_to_sicily:0 "§C地中海支点方面からシチリアへ上陸§!"
 JAP_imperial_headquarters_scripted_landing_suez_alexandria_to_sicily_desc:0 "大本営は§C地中海支点§!を基点に、上陸兵力を集結し、海上輸送を組織し、海空掩護の下で§Rシチリア§!方面への攻撃路を開く準備を進める。敵軍防衛線が継続的な牽制により隙を見せた場合、本作戦は即時発動の奇襲上陸に切り替わる。"
