 JAP_imperial_headquarters_scripted_landing_kyushu_to_okinawa_plan_tt:0 "奇襲を発動するには、さらに§O[?JAP_scripted_landing_raid_remaining|0]§!回の上陸作戦を成功させる必要がある。\n本作戦は§O通常上陸§!である：§R沖縄§!守備隊に上陸警戒を通達する。§O30日§!後、§C九州§!がなお作戦支点として使用可能で、§R沖縄§!がなお敵の支配下にある場合、そこで中規模上陸を発動し、現地守備隊の配置を乱して一定の戦闘損失を与える。"
 JAP_imperial_headquarters_scripted_landing_kyushu_to_okinawa_raid_tt:0 "§R本作戦はただちに奇襲上陸を発動する。§!\nこのディシジョンを選択すると、§C九州§!を作戦支点として、§R沖縄§!へ中規模奇襲上陸をただちに発動し、現地守備隊の配置を乱してより大きな戦闘損失を与える。奇襲完了後も、本作戦は対応する上陸整備能力を占有し、再び割り当てるには§O30日§!の整備完了を待つ必要がある。"
