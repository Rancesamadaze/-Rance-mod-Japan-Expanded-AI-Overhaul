 JAP_imperial_headquarters_scripted_landing_new_guinea_to_north_queensland_raid_tt:0 "§R本作戦はただちに奇襲上陸を発動する。§!\nこのディシジョンを選択すると、§Cスラウェシ・ニューギニア§!を作戦支点として、§R北クイーンズランド§!へ中規模奇襲上陸をただちに発動し、現地守備隊の配置を乱してより大きな戦闘損失を与える。奇襲完了後も、本作戦は対応する上陸整備能力を占有し、再び割り当てるには§O30日§!の整備完了を待つ必要がある。"
 JAP_imperial_headquarters_scripted_landing_new_guinea_to_new_south_wales:0 "§Cニューギニア・豪州東岸方面からニューサウスウェールズへ上陸§!"
 JAP_imperial_headquarters_scripted_landing_new_guinea_to_new_south_wales_desc:0 "大本営は§Cニューギニア・豪州東岸§!を基点に、上陸兵力を集結し、海上輸送を組織し、海空掩護の下で§Rニューサウスウェールズ§!方面への攻撃路を開く準備を進める。敵軍防衛線が継続的な牽制により隙を見せた場合、本作戦は即時発動の奇襲上陸に切り替わる。"
