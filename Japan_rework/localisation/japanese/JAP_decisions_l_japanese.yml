# Imperial General Headquarters events
 JAP_imperial_headquarters_events.1.t:0 "日本がアジア領土の移譲を要求"
 JAP_imperial_headquarters_events.1.desc:0 "[FROM.GetNameDefCap]の大本営は最後通牒を提出し、[ROOT.GetNameDef]に対してアジアにあるすべての領土をただちに移譲するよう要求した。東京側は、これらの拠点を自国の南方戦略防衛線に組み込むと主張している。我々が拒否すれば、日本はこの紛争を軍事行動へ移すだろう。"
 JAP_imperial_headquarters_events.1.a:0 "最後通牒を受け入れる"
 JAP_imperial_headquarters_events.1.b:0 "彼らの脅しを拒む"
 JAP_imperial_headquarters_events.2.t:0 "ポルトガルがアジア領土を移譲"
 JAP_imperial_headquarters_events.2.desc:0 "[FROM.GetNameDefCap]は我々の最後通牒を受け入れ、アジアにあるすべての領土を移譲した。大本営はこれらの拠点を南方作戦体系に組み込むことができる。"
 JAP_imperial_headquarters_events.2.a:0 "望むところだ"
 JAP_imperial_headquarters_events.3.t:0 "ポルトガルが最後通牒を拒否"
 JAP_imperial_headquarters_events.3.desc:0 "[FROM.GetNameDefCap]はアジア領土からの撤退を拒み、外交的引き延ばしによって植民地拠点を維持しようとしている。大本営はこれらの目標を武力で奪取する準備を整えている。"
 JAP_imperial_headquarters_events.3.a:0 "これらの拠点の奪取を準備せよ"
 JAP_imperial_headquarters_events.4.t:0 "日本軍の上陸企図を探知"
 JAP_imperial_headquarters_events.4.desc:0 "沿岸警備部隊と情報部門は、日本軍が§C[JAP_scripted_landing_origin_state.GetName]§!方面で兵力を集結させ、海上輸送と掩護活動を明らかに強化していると報告した。目標は§R[JAP_scripted_landing_target_state.GetName]§!である可能性が高い。現地の沿岸防備はただちに警戒態勢へ移行しなければならない。"
 JAP_imperial_headquarters_events.4.a:0 "確認"
 JAP_imperial_headquarters_events.5.t:0 "日本軍の奇襲を受ける"
 JAP_imperial_headquarters_events.5.desc:0 "日本軍が§C[JAP_scripted_landing_origin_state.GetName]§!方面から突如上陸を開始し、先遣部隊はすでに§R[JAP_scripted_landing_target_state.GetName]§!沿岸防衛線へ衝撃を与えている。通信と指揮は一時混乱に陥った。現地守備隊はただちに陣地を立て直さなければならない。"
 JAP_imperial_headquarters_events.5.a:0 "確認"

# Equipment administration and war readiness
 JAP_rework_equipment_designs:0 "軍需省 - 装備管理局"
 JAP_rework_equipment_designs_desc:0 "装備管理局は軍需省に属し、§Y[ROOT.GetName]§!の陸海空兵器の設計、試作、制式整備、量産移行を統括する。戦車、艦艇、航空機およびその派生装備の開発を総理し、軍の要求、装備系列、兵装適合を調整することで、§Y[ROOT.GetName]§!全体の軍備更新と継戦能力を強化する。"
 JAP_unlock_equipment_design_decisions_tt:0 "ディシジョンカテゴリーを解禁：§Y軍需省 - 装備管理局§!"
 JAP_rework_war_readiness_construction_decisions:0 "軍需省 - 戦備建設局"
 JAP_rework_war_readiness_construction_decisions_desc:0 "戦備建設局は軍需省に属し、戦時軍需生産に必要な後方施設、工場拡張、備蓄倉庫、要地整備を統括する。工業建設、軍需配分、軍事配置の要求を調整し、§Y[ROOT.GetName]§!の継続動員、装備補充、戦場支援能力を高める。"
 JAP_unlock_war_readiness_construction_decisions_tt:0 "ディシジョンカテゴリーを解禁：§Y軍需省 - 戦備建設局§!"
 JAP_war_readiness_expand_lushun_naval_base:0 "旅順海軍基地を拡張"
 JAP_war_readiness_expand_lushun_naval_base_desc:0 "戦備建設局は工兵隊を組織し、§Y旅順§!軍港の泊地、燃料弾薬倉庫、修造施設を整備して、§Y大連§!地区における艦隊停泊、補給、整備能力を強化する。"
 JAP_war_readiness_lushun_naval_base_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_expand_lushun_naval_base$§!"
 JAP_war_readiness_manchurian_soviet_border_supply_network:0 "満ソ国境補給網を整備"
 JAP_war_readiness_manchurian_soviet_border_supply_network_desc:0 "戦備建設局は§Y吉林§!、§Yフルンボイル§!、§Y黒竜江§!、§Y松江§!、§Y遼寧§!方面で国境後方兵站工事を進め、国境鉄道、倉庫転送站、前線補給中心を整備し、航空支援施設も拡張して、満ソ国境の補給点を既存補給網へ接続する。"
 JAP_war_readiness_manchurian_soviet_border_supply_network_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_manchurian_soviet_border_supply_network$§!"
 JAP_war_readiness_manchurian_soviet_forward_supply_links:0 "満ソ国境前進補給線を接続"
 JAP_war_readiness_manchurian_soviet_forward_supply_links_desc:0 "ソ連軍国境補給站を占領した後、戦備建設局は工兵隊を組織し、満ソ国境の既存補給網から前方へ連絡鉄道を敷設して、新たに奪取した前進補給ノードを我が軍の兵站体系へ組み込む。"
 JAP_war_readiness_manchurian_soviet_forward_supply_links_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_manchurian_soviet_forward_supply_links$§!"
 JAP_war_readiness_vladivostok_naval_railway_base:0 "ウラジオストク海軍・鉄道基地を整備"
 JAP_war_readiness_vladivostok_naval_railway_base_desc:0 "§Yウラジオストク§!港区を奪取した後、戦備建設局は前進海軍基地を拡張する。§Yウラジオストク§!全域が統制下に入れば、工兵隊は港区と既存補給ノードを結ぶ鉄道連絡線の修復を続ける。"
 JAP_war_readiness_vladivostok_naval_railway_base_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_vladivostok_naval_railway_base$§!"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases:0 "ハバロフスク沿岸基地を整備"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases_desc:0 "§Yハバロフスク§!沿海港区を奪取した後、戦備建設局は前進海軍基地を拡張する。同地区全域が統制下に入れば、工兵隊は既存補給ノードから沿海港区へ連絡鉄道を敷設し、新港区を満ソ国境前進補給網へ組み込む。"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_khabarovsk_coastal_naval_railway_bases$§!"
 JAP_war_readiness_jidong_air_naval_base:0 "冀東海空前進基地を整備"
 JAP_war_readiness_jidong_air_naval_base_desc:0 "戦備建設局は§Y冀東§!で海空基地整備を実施し、沿海泊地、航空場站、燃料弾薬倉庫、鉄道連絡線を拡張して、入関部隊により安定した沿海補給と航空支援を与える。"
 JAP_war_readiness_jidong_air_naval_base_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_jidong_air_naval_base$§!"
 JAP_war_readiness_bailingmiao_jidong_railway:0 "パイリンミャオ・冀東連絡鉄道を整備"
 JAP_war_readiness_bailingmiao_jidong_railway_desc:0 "戦備建設局は§Yパイリンミャオ§!、§Yチャハル§!、§Y熱河§!、§Y冀東§!方面に沿って鉄道連絡線を修復し、草原通道沿線の航空支援施設も拡張して、西側草原通道を入関後の冀東補給網へ接続し、側翼進撃と後続治安駐屯により安定した輸送条件を提供する。"
 JAP_war_readiness_bailingmiao_jidong_railway_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_bailingmiao_jidong_railway$§!"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network:0 "パイリンミャオ・綏遠補給網を整備"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network_desc:0 "戦備建設局は§Yパイリンミャオ§!から§Y綏遠§!方面へ鉄道と倉庫の整備を進め、§Yチャハル§!一線の既存交通ノードへ接続し、草原西段の前進補給所が側翼推進、機動集結、後続駐屯を支えられるようにする。"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network_completed:0 "完了済みディシジョン：§Y$JAP_war_readiness_bailingmiao_suiyuan_supply_network$§!"
 JAP_war_readiness_jidong_hebei_railway_corridor:0 "冀東・河北入関鉄道回廊を整備"
