 JAP_ai_extra_equipment_grant_loop_start:0 "陸空動的補給サイクルを開始"
 JAP_ai_extra_equipment_grant_loop_start_desc:0 "日本AI、または開局ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーが§Y100§!以上の軍需工場を保有している場合、陸空動的装備補給サイクルを開始できる。装備の数量と種類は選択中の難度に応じ、動的倍率の影響も受ける。システムは直ちに初回の陸軍・空軍追加装備を処理し、その後は§Y60§!日ごとに自動で輪転する。プレイヤーがこのシステムを利用する場合、先にRance難度を選択し、ディシジョンで対応する編制と装備設計を作成する必要がある。"
 JAP_ai_extra_equipment_grant_loop_start_tt:0 "現在の動的倍率に基づき§Y陸空追加装備補給§!を即時に1回処理し、§Y60§!日ごとのサイクルを開始する。\n開局ルール§Y$RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY$§!が§Rいいえ§!の場合、この回では実際に装備は支給されない。"
 JAP_ai_extra_equipment_grant_cycle_mission:0 "陸空動的補給輪転"
 JAP_ai_extra_equipment_grant_cycle_mission_desc:0 "陸空動的装備補給はすでに開始されている。§Y60§!日ごとに、日本AI補助状態、陸空動的補給ルール、現在の難度を再確認し、現在の動的倍率に基づいて陸軍・空軍追加装備の支給を試みる。プレイヤーが利用する場合、先にRance難度を選択し、ディシジョンで対応する編制と装備設計を作成する必要がある。"
 JAP_ai_extra_equipment_grant_cycle_mission_tt:0 "この回の終了時、なお§Y日本AI補助判定§!を満たし、かつ開局ルール§Y$RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY$§!が§Yはい§!であれば、現在の動的倍率に基づき§Y陸空追加装備補給§!を処理する。\nその後、次の§Y60日§!タイマーを再起動する。"
 JAP_ai_navy_ship_grant_loop_start:0 "半期艦艇動的補給を開始"
 JAP_ai_navy_ship_grant_loop_start_desc:0 "§Y1939年6月1日§!以降、日本AI、または開局ルール§Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§!が§Yはい§!の日本プレイヤーは海軍艦艇動的補給サイクルを開始できる。システムは直ちに初回の艦艇補給を処理し、その後は§Y180§!日ごとに自動で輪転する。プレイヤーが利用する場合、先にRance難度を選択し、ディシジョンで艦船設計を作成する必要がある。艦級名は脚本が目標設計を探すために使うため、作成後に手動で改名すると艦艇補給が失敗する可能性がある。"
 JAP_ai_navy_ship_grant_loop_start_tt:0 "現在の動的倍率に基づき§Y海軍艦艇補給§!を即時に1回処理し、§Y180§!日ごとのサイクルを開始する。\n開局ルール§Y$RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY$§!が§Rいいえ§!の場合、この回では実際に艦艇は支給されない。\nプレイヤーは先にRance難度を選択し、ディシジョンで艦船設計を作成する必要がある。艦級名を手動で変更すると艦艇補給が失敗する可能性がある。"
 JAP_ai_navy_ship_grant_cycle_mission:0 "半期艦艇動的補給輪転"
 JAP_ai_navy_ship_grant_cycle_mission_desc:0 "海軍艦艇動的補給はすでに開始されている。§Y180§!日ごとに、日本AI補助状態、海軍動的補給ルール、現在の難度を再確認し、動的倍率に基づいて対応する艦艇パッケージの支給を試みる。プレイヤーが利用する場合、先にRance難度を選択し、ディシジョンで艦船設計を作成する必要がある。作成後に艦級名を手動で変更すると艦艇補給が失敗する可能性がある。"
 JAP_ai_navy_ship_grant_cycle_mission_tt:0 "この回の終了時、なお§Y日本AI補助判定§!を満たし、かつ開局ルール§Y$RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY$§!が§Yはい§!であれば、現在の動的倍率に基づき§Y海軍艦艇補給§!を処理する。\nその後、次の§Y180日§!タイマーを再起動する。"
