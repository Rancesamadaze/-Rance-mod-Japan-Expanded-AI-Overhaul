# Imperial General Headquarters
 JAP_imperial_headquarters_decisions:0 "大本営"
 JAP_imperial_headquarters_decisions_desc:0 "大本営は§Y[ROOT.GetName]§!の陸海軍作戦、国土防衛、総動員計画を統括し、参謀本部、軍令部、政府各機関を調整して、§Y[JAP_the_imperial_defense_plan_key]§!の下で戦略配置を貫徹する。"
 JAP_imperial_headquarters_landing_operations_decisions:0 "大本営 - 上陸作戦指令"
 JAP_imperial_headquarters_landing_operations_decisions_desc:0 "大本営は各方面の上陸作戦、奇襲行動、遠洋整備を独立した指令として扱い、上陸能力、出撃支点、警戒通報、奇襲のテンポを統括する。"
 JAP_unlock_imperial_headquarters_decisions_tt:0 "ディシジョンカテゴリーを解禁：§Y大本営§!および§Y大本営 - 上陸作戦指令§!"
 JAP_imperial_headquarters_forge_chinese_claims:0 "中国への請求権を偽造"
 JAP_imperial_headquarters_forge_chinese_claims_desc:0 "大本営は華北事変以来の軍政記録を整理し、中国全土への領土要求を支えるに足る請求文書として編纂し、以後の軍事行動に名分を与える。"
 JAP_imperial_headquarters_subjugate_chinese_remnant:0 "[FROM.GetNameDef]を平定"
 JAP_imperial_headquarters_subjugate_chinese_remnant_desc:0 "国民政府と中共主力政権が相次いで崩壊した今、大本営は[FROM.GetNameDef]に最後通牒を突きつけ、以後の軍事行動に向けて完全な領土請求と併合戦争目標を準備する。"
 JAP_imperial_headquarters_declare_victory_in_china:0 "対中戦争勝利を宣言"
 JAP_imperial_headquarters_declare_victory_in_china_desc:0 "国民政府と中共政権が相次いで消滅した今、大本営は対中戦争の主要段階が終結したことを正式に宣言し、中国戦線を§Y大亜細亜戦争§!の総動員体制に組み込む。"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system:0 "アジア太平洋補給体制を構築"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system_desc:0 "大本営はアジア、中東、オーストラリア全域に戦時兵站を拡張し、港湾、道路、集積地、作戦支点を大亜細亜戦争の補給網として組織する。"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system_tt:0 "§Yアジア§!、§Y中東§!、§Yオーストラリア§!地域に§Y大亜細亜戦争§!州補正を追加する。支配者を問わず、味方と敵の双方に適用される。"
 JAP_imperial_headquarters_prepare_us_mainland_invasion:0 "アメリカ本土上陸を準備"
 JAP_imperial_headquarters_prepare_us_mainland_invasion_desc:0 "ハワイは太平洋を横断する前進支点となった。大本営は遠洋航路、上陸艦隊、アメリカ戦域補給体制を整備し、最終的にアメリカ本土へ踏み込む道を開く。"
 JAP_imperial_headquarters_prepare_us_mainland_invasion_tt:0 "§Y180日§!の§Yアメリカ本土上陸準備§!を獲得し、§Y北アメリカ§!および§Y南アメリカ§!の全州にアメリカ戦域の補給/作戦補正を追加する。補給効果は敵味方双方に適用され、攻撃・防御ボーナスは§Y日本§!部隊のみに適用される。"
 JAP_imperial_headquarters_force_war_on_siam:0 "対シャム作戦を承認"
 JAP_imperial_headquarters_force_war_on_siam_desc:0 "シャムはインドシナとマラヤの間に横たわる、南方作戦に不可欠な陸上要路である。バンコクがなお主要陣営の外にあり、まだ屈服していないなら、大本営はマラヤへ通じる陸路の門を開くため、最終作戦命令を下すことができる。"
 JAP_imperial_headquarters_force_war_on_siam_tt:0 "§Rただちにシャムへ宣戦布告する。§!"
 JAP_imperial_headquarters_demand_portuguese_asian_territories:0 "ポルトガルにアジア領土の移譲を要求"
 JAP_imperial_headquarters_demand_portuguese_asian_territories_desc:0 "§Y南進論§!はすでに帝国の戦略方針となった。大本営は[POR.GetNameDef]へ最後通牒を提出し、アジアにあるすべての植民地領土の移譲を要求する。リスボンが撤退を拒むなら、我々はこれらの拠点を奪取する戦争目標を得る。"
 JAP_imperial_headquarters_authorize_delayed_pacific_war:0 "太平洋作戦を承認"
 JAP_imperial_headquarters_authorize_delayed_pacific_war_desc:0 "東南アジアおよび東インド・豪新方面の作戦は予定段階に入った。大本営は米比方面への30日間の作戦準備を開始し、真珠湾独立奇襲機構の関連制限も同時に緩和する。準備完了後、これまで延期されていた太平洋戦争目標は正式に解放される。"
 JAP_scripted_landing_naval_strength_available_tt:0 "選択した難易度に応じて動的に調整される海軍力の条件を満たしている"
 JAP_scripted_landing_capacity_available_tt:0 "利用可能な上陸計画容量が残っている"
 JAP_scripted_landing_eia_plan_slot_available_tt:0 "東インド・豪新方面に調整可能な上陸準備枠が残っている"

# Scripted landing operations
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam:0 "§C海南方面からシャムへ上陸§!"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_desc:0 "大本営は§C海南§!を基点に、上陸兵力を集結し、海上輸送を組織し、海空掩護の下で§Rシャム§!方面への攻撃路を開く準備を進める。敵軍防衛線が継続的な牽制により隙を見せた場合、本作戦は即時発動の奇襲上陸に切り替わる。"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_plan_tt:0 "奇襲を発動するには、さらに§O[?JAP_scripted_landing_raid_remaining|0]§!回の上陸作戦を成功させる必要がある。\n本作戦は§O通常上陸§!である：§Rシャム§!守備隊に上陸警戒を通達する。§O30日§!後、§C海南§!がなお作戦支点として使用可能で、§Rシャム§!がなお敵の支配下にある場合、そこで中規模上陸を発動し、現地守備隊の配置を乱して一定の戦闘損失を与える。"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_raid_tt:0 "§R本作戦はただちに奇襲上陸を発動する。§!\nこのディシジョンを選択すると、§C海南§!を作戦支点として、§Rシャム§!へ中規模奇襲上陸をただちに発動し、現地守備隊の配置を乱してより大きな戦闘損失を与える。奇襲完了後も、本作戦は対応する上陸整備能力を占有し、再び割り当てるには§O30日§!の整備完了を待つ必要がある。"
 JAP_imperial_headquarters_scripted_landing_hainan_to_malaya:0 "§C海南方面からマラヤへ上陸§!"
 JAP_imperial_headquarters_scripted_landing_hainan_to_malaya_desc:0 "大本営は§C海南§!を基点に、上陸兵力を集結し、海上輸送を組織し、海空掩護の下で§Rマラヤ§!方面への攻撃路を開く準備を進める。敵軍防衛線が継続的な牽制により隙を見せた場合、本作戦は即時発動の奇襲上陸に切り替わる。"
