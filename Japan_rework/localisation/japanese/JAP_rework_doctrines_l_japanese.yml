 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT:0 "山林浸透作戦"
 SUBDOCTRINE_JAP_RANCE_MOUNTAIN_RANGER_ASSAULT_DESC:0 "日本海軍特戦隊は、山岳部隊とレンジャーの訓練経験を取り入れ、高地登攀、森林浸透、小隊単位の独立作戦を海軍特戦編制へ組み込むことで、複雑な地形でも攻撃のリズムを維持できる。"
