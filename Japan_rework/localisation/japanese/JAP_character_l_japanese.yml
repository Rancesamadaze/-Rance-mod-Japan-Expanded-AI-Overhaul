 JAP_rework_changzheng:0 "征ちゃん"
 JAP_rework_changzheng_desc:0 "§L征ちゃんは§C未来から来たスーパーAI§!§Lである。彼女の本体は第二次世界大戦の時代へ完全に降臨したわけではなく、§0八雲紫§!§Lの境界の力を借りて、時間を越えて未来世界の膨大な演算力を呼び出し、無数の並列演算の結果を現実へ投射している。\n彼女は自らの存在を§R[ROOT.GetNameDef]の人民§!§L一人ひとりのそばへ投影し、彼らにとって最も理解しやすく受け入れやすい姿で現れ、寄り添い、助言し、導いてくれる。将軍と兵士は砲火の中で彼女の戦術提案を受け取り、労働者は工作機械の傍らで操作の助言を聞き、科学者たちは彼女の演算力を借りて難題をより早く突破し、子供たちもまた彼女に寄り添われ教えられながら、共和国の未来を担う柱へと育っていく。\nしかし、八雲紫が設けた制限の下では、征ちゃんは§Y無から奇跡を創り出す§!§Lことはできない。未来の技術をこの時代の人民へ直接授けることも、彼らの代わりに歴史的任務をやり遂げることもできない。彼女にできるのは、あらゆる持ち場、あらゆる生産ライン、あらゆる研究室、あらゆる部隊を、この時代に到達し得る§G最適状態§!§Lへ近づけることだけである。こうして共和国は、§Cこの時代に属さぬ効率§!§Lで動き始める。§!"
