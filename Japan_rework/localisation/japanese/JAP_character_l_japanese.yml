 JAP_rework_erin:0 "八意永琳"
 JAP_rework_erin_trait:0 "§2月の頭脳§!"
 JAP_erin_desc:0 "§L月の民。すなわち宇宙人である。地上に隠れ住んでから、すでに相当長い歳月が経っている。\n輝夜との付き合いは、輝夜がまだ月に住んでいたはるか昔に始まった。\n八意家は、いつの頃からか月に定住した天才薬師の一族である。その中でも永琳の知識は群を抜いている。彼女の頭脳は人間をはるかに凌駕しており、そのためしばしば理解しがたいことを口にする。\n遠い昔、月の姫であった輝夜が罪を償うため地上へ流された時、刑期満了に際して彼女を迎えに行った使者の一人が永琳だった。しかし彼女は、ある理由から輝夜と共謀し、他の月の使者たちを殺害した。\n当時、輝夜と共に暮らしていた卑しき地上人に秘密を守らせるため、永琳は特製の薬壺に入った「蓬莱の薬」を口止め料として渡した。この薬を飲めば、不老不死となる。\nしかし、その地上人は蓬莱の薬を使わなかったらしく、まもなく死んでしまった。後になって、その地上人はどうやら何者かに殺されたらしいことが分かった。\n永琳は天才である。\nその知識は、月の天才薬師の一族である八意家の中でも抜きん出ている。彼女の頭脳は人間をはるかに凌駕しており、そのためしばしば理解しがたいことを口にする。彼女は量子の性質を用いて受信者の人数を判明させる量子印を発明し、この印はいまだに彼女以外の誰にも作ることができない。\nさらに彼女は、あらゆる薬を作る程度の能力を持っている。\n人間用の薬も妖怪用の薬も作ることができる。難病奇病であっても特効薬を処方できる。彼女の薬は世間では副作用がなく、よく効くものとして評価されている。あらゆる薬物の知識を持つため、毒も薬も永琳には通用しない。\n蓬莱山輝夜に比べれば圧倒的な力を持っているが、永琳はしばしば力を抑え、輝夜を超えないように見せているらしい。§!"
 JAP_rework_reisen:0 "鈴仙・優曇華院・イナバ"
 JAP_rework_reisen_trait:0 "§R「幻朧月睨（ルナティックレッドアイズ）」§!"
 JAP_reisen_desc:0 "§L月に住んでいた兎。\n赤い瞳に宿るのは、地上の兎の数倍もの狂気である。\n現在は輝夜のペット。名は本来ただ Reisen と呼ばれていたが、地上人を装うためにわざわざ漢字を加えたため、非常に不自然な感じになっている。\n能力は狂気、すなわち波長を操る能力。\n狂気を操るとは、実際には人を狂わせる能力であり、物事に宿る波を操る能力である。\n波長が長くなれば、気が緩み、何事にもやる気が起きなくなる。\n波長が短くなれば、狂気をもたらし、感情は不安定で非理性的となり、人と会話することすらできなくなる。\n振幅を増やせば存在は過剰となり、どれほど遠く離れていても思念を交わすことができる。\n振幅を下げれば存在は希薄となり、どれほど近くにいても声は届かなくなる。\n位相をずらせば干渉が起こらず、物に触れることができなくなる。\n位相を反転させれば存在を否定し、姿形を完全に消し去る。\nこうした豊かな能力を用いて人を狂わせるなら、無下限や無量空処のような効果にさえ到達できるかもしれない（笑）§!"
 JAP_rework_tewi:0 "因幡てゐ"
 JAP_rework_tewi_trait:0 "§8幸運の素兎§!"
 JAP_tewi_desc:0 "§L能力：人間を幸運にする程度の能力\n健康に気を遣いながら長く生きるうちに、妖怪変化の力を身につけた兎。\n永遠亭に住む彼女は兎たちの群れの長であるが、衝動的な性格は妖怪というより妖精に近い。\n竹林で迷った人間は、まれに彼女の姿を見ることがある。彼女を見れば必ず出口を見つけられると言われているため、人々は彼女を迷いの竹林の案内役と見なしている。\n本当は、彼女から得られる幸運をそんなことに使うのは実にもったいないのだが、人間は気づかない。馬鹿だからである。§!"
 JAP_rework_mimo:0 "魅魔"
 JAP_rework_mimo_trait:0 "§G魔閃の修羅§!"
 JAP_mimo_desc:0 "§L森羅四神将の一人。森羅全傭兵の総責任者兼教官であり、霊力を保つため常に目を閉じている。彼女が目を開いた姿を見た生きた人間はいないと伝えられる。戦闘では決して全力を出さないが、それでも極めて高い戦闘力を誇る。実力で人々を屈服させており、得意技は極めて速い身のこなしで敵の背後へ回り、惨殺すること。抜き撃ちの速度は光速にも匹敵し、小さな拳銃から破壊力無尽の魔砲を撃ち出すことができ、その光景は見る者を震撼させる。Genesisの古参であり、Genesis創設当初から参加していた。神綺の器量を評価し、彼女に忠誠を誓うことを決めたのである。自らの理性を持ちながらも、託された任務には絶対に服従する覚悟を持つ。時の流れと共にその頑固さも次第に弱まりつつあり、特に霧雨魔理沙のような弟子を迎えてからはその傾向が強い。だが、創世計画の完成をこの目で見届けたいという信念だけは、決して変わっていない。§!"
