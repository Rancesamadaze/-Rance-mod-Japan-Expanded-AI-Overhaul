l_japanese:
 RULE_GROUP_RANCE_JAPAN_REWORK:0 "RA日本特殊設定"
 RULE_OPTION_RANCE_NO:0 "いいえ"
 RULE_OPTION_RANCE_YES:0 "はい"
 RANCE_JAPAN_RETURN_TO_PEAK:0 "全盛期へ戻る"
 RANCE_JAPAN_RETURN_TO_PEAK_DISABLED_DESC:0 "日本の総合的な強さは弱体化版となり、バニラ数値をやや上回る。"
 RANCE_JAPAN_RETURN_TO_PEAK_ENABLED_DESC:0 "日本の総合的な強さは弱体化前の標準版となる。嵐に備えよ。"
 Rance_jap_return_to_peak_standard.tt:0 "開始時ルール§Y全盛期へ戻る§!が§Yはい§!に設定されている。"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD:0 "公平な勝負？"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD_DISABLED_DESC:0 "バニラ大隊に追加の数値補正を与えない。日本の特殊部隊はバニラ部隊より強くなる。"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD_ENABLED_DESC:0 "開始時にすべての既存国家へ隠し技術を付与し、バニラの関連大隊を日本特殊部隊に近い水準まで強化する。ただし、この強化は数値が古くなっている可能性があり、バニラ大隊の数値を変更しているMODには適していない。"
 RANCE_JAPAN_STARTING_OOB:0 "日本の開始時部隊"
 RULE_OPTION_RANCE_JAPAN_STARTING_OOB_MOD:0 "強化版開始時部隊"
 RANCE_JAPAN_STARTING_OOB_MOD_DESC:0 "デフォルト設定。本MODの強化版開始時陸軍、海軍、空軍を読み込む。日本をAIが操作する場合、または完全なAI進行に挑みたい場合はこちらを推奨する。"
 RULE_OPTION_RANCE_JAPAN_STARTING_OOB_VANILLA:0 "バニラ開始時部隊"
 RANCE_JAPAN_STARTING_OOB_VANILLA_DESC:0 "バニラに近い1936年の日本陸軍、海軍、空軍を読み込み、さらに本MODの開始時編制設計も提供する。一から立ち上げたいプレイヤー向け。"
 RANCE_JAPAN_AI_DIFFICULTY:0 "日本AI難易度プリセット"
 RULE_OPTION_RANCE_AI_DIFFICULTY_IN_GAME:0 "ゲーム内で選択"
 RANCE_JAPAN_AI_DIFFICULTY_DEFAULT_DESC:0 "開始時初期化では難易度を書き込まず、従来のゲーム内難易度選択フローを使用する。"
 RULE_OPTION_RANCE_AI_DIFFICULTY_EASY:0 "§7白雪が舞う程度（EASY）§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_NORMAL:0 "§6風雪が満ちる程度（NORMAL）§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_HARD:0 "§4吹雪が日を覆う程度（HARD）§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_LUNATIC:0 "§O雪風が荒れ狂う程度（LUNATIC）§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_EXTRA:0 "§R波乱に満ちる程度（EXTRA）§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_PHANTASM:0 "§0桜が咲き乱れる程度（PHANTASM）§! §R（未完成）§!"
 RANCE_JAPAN_SCRIPTED_LANDING:0 "スクリプト上陸"
 RANCE_JAPAN_SCRIPTED_LANDING_ENABLED_DESC:0 "デフォルト設定。海軍力が許す場合、スクリプト上陸を実行する。上陸30日前にプレイヤーへイベント警告が送られ、出発地を事前に奪取すれば上陸を阻止できる。また、難易度に応じて異なる頻度で警告なしの奇襲も発生する。経路は通常のスクリプト上陸と同じである。スクリプト上陸も上陸容量を使用する。"
 RANCE_JAPAN_SCRIPTED_LANDING_DISABLED_DESC:0 "プレイヤーとAIはいずれもスクリプト上陸を使用できなくなる。AIの上陸作戦は遅くなり、AIがアメリカへ上陸することも難しくなる。"
 RANCE_JAPAN_AI_BOSS_MODE:0 "日本AIボスモード"
 RANCE_JAPAN_AI_BOSS_MODE_DISABLED_DESC:0 "デフォルト設定。日本AIは平時、戦時、降伏進捗に応じてのみ動的補給倍率を更新する。"
 RANCE_JAPAN_AI_BOSS_MODE_ENABLED_DESC:0 "日本AIは敵対プレイヤーまたは主要国AIと交戦している場合にのみ、ボス追加倍率を得る。直面する敵が多いほど、追加装備倍率は高くなる。"
 RANCE_JAPAN_PLAYER_AI_CHEATS:0 "日本プレイヤー用AI補助を有効化"
 RANCE_JAPAN_PLAYER_AI_CHEATS_DISABLED_DESC:0 "日本プレイヤーは日本AI専用の補助機能を使用できない。"
 RANCE_JAPAN_PLAYER_AI_CHEATS_ENABLED_DESC:0 "日本プレイヤーはAI専用の補助機能を使用できる。"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY:0 "日本AI陸空軍動的補給を有効化"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY_ENABLED_DESC:0 "デフォルト設定。60日ごとの陸空動的補給を維持する。強く推奨。無効化すると、日本AIは選択した難易度の想定強度に到達しにくくなる（それでも弱くはない）。"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY_DISABLED_DESC:0 "60日ごとの陸空動的補給を無効化する。追加装備なしの日本AIを専門的にテストしている場合を除き、非推奨。無効化後、AI強度は難易度の想定を大きく下回る可能性が高い（それでも弱くはない）。"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY:0 "日本AI海軍動的補給を有効化"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY_ENABLED_DESC:0 "デフォルト設定。半年度ごとの艦艇動的補給を維持する。強く推奨。無効化すると、日本AI海軍は本MODが想定する遠洋圧力を維持しにくくなる（それでも弱くはない）。"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY_DISABLED_DESC:0 "半年度ごとの艦艇動的補給を無効化する。追加艦艇なしの日本AIを専門的にテストしている場合を除き、非推奨。無効化後、AI海軍の強度は難易度の想定を大きく下回る可能性が高い（それでも弱くはない）。"
