 JAP_ministry_of_commerce_and_industry_decisions:"商工省"
 JAP_ministry_of_commerce_and_industry_decisions_desc:"商工省负责统筹§Y[ROOT.GetName]§!工商业政策、产业整备与生产统制，协调民用工业、资源调配与企业经营事务，以期强化国家经济动员与工业发展能力。"
 JAP_shoko_special_charter:"商工省特许"
 JAP_shoko_special_charter_desc:"由§Y商工省§!向特定地区发放的建设特许。获准地区将在工程推进期间得到额外的行政协调与资源倾斜，以提升当地整体建设效率。"
 JAP_unlock_ministry_of_commerce_and_industry_decisions_tt: "§Y政局趋于稳定§!后，解锁决议组：§Y商工省§!"
 JAP_shoko_develop_kanto:"开发关东"
 JAP_shoko_develop_kanto_desc:"§Y关东§!通常指日本本州东部以§Y东京§!为中心的一大片地区，是日本§Y政治、经济、文化和交通§!最发达的区域之一。关东地方一般包括§Y东京§!、§Y神奈川§!、§Y埼玉§!、§Y千叶§!、§Y茨城§!、§Y栃木§!和§Y群马§!七个都县。\n\n这里既有§Y现代化大都市§!的繁华景象，也有自然风光与传统人文并存的独特魅力。§Y东京§!作为日本首都，是§Y国际金融、商业和时尚中心§!；§Y横滨§!港口风貌鲜明；§Y镰仓§!则保留着浓厚的历史气息。\n\n与此同时，§Y关东地区§!交通网络完善，生活便利，§Y教育、科技和产业资源§!高度集中，因此不仅吸引了大量国内人口，也深受海外游客欢迎。"
 JAP_shoko_develop_kanto_mission:"关东开发计划"
 JAP_shoko_develop_kanto_mission_desc:"§Y商工省§!正会同有关机关推进§Y关东地区整备计划§!，以充实§Y首都圈§!各项机能，适应§Y战时体制§!下日益增长之§Y行政、交通与产业需求§!，并同步完善当地之§Y电力输送§!能力。\n\n有关工程现仍在实施之中，其§Y进展与成果§!，将作为后续§Y投资与扩建方针§!之重要依据。"
 JAP_shoko_develop_tokaido:"开发东海道"
 JAP_shoko_develop_tokaido_desc:"§Y东海道§!地处本州太平洋沿岸，自古以来便是连接§Y东京§!与§Y关西§!的交通与产业走廊。区内港湾、铁路与城市网络密集，兼具重工业、商业流通与人口集聚优势，是§Y[ROOT.GetName]§!本土最具潜力的经济动脉之一。"
 JAP_shoko_develop_tokaido_mission:"东海道开发计划"
 JAP_shoko_develop_tokaido_mission_desc:"§Y商工省§!正推进§Y东海道§!地区整备，以强化沿线之§Y工业生产§!、§Y交通统筹§!、§Y电力输送§!与§Y航空研究能力§!。若能在既定期限内完成基础设施与工厂扩充，则可进一步充实该地作为§Y[ROOT.GetName]§!经济干线之机能。"
 JAP_shoko_develop_kansai:"开发关西"
 JAP_shoko_develop_kansai_desc:"§Y关西§!是日本传统政治与工商业重镇之一，涵盖§Y大阪§!、§Y京都§!、§Y神户§!等重要都市。该地区既是§Y[ROOT.GetName]§!本土重要的工业基地，也是连接内海航运、铁路干线与都市消费市场的核心区域。"
 JAP_shoko_develop_kansai_mission:"关西开发计划"
 JAP_shoko_develop_kansai_mission_desc:"§Y商工省§!正协调有关机关推进§Y关西§!地区整备，以增强其§Y工业承载§!、§Y交通统筹§!与§Y电力输送§!能力。若能在期限内完成基础设施与军工扩充，则可进一步巩固该地作为§Y[ROOT.GetName]§!西部工业中枢的地位。"
 JAP_shoko_develop_sanyo:"开发山阳"
 JAP_shoko_develop_sanyo_desc:"§Y山阳§!沿濑户内海展开，拥有多处港湾、工业城市与交通节点，是本州西部重要的工商业地带。若能进一步整备基础设施并扩充民用工业，可望强化其作为§Y[ROOT.GetName]§!内海经济走廊的综合机能。"
 JAP_shoko_develop_sanyo_mission:"山阳开发计划"
 JAP_shoko_develop_sanyo_mission_desc:"§Y商工省§!正推进§Y山阳§!地区整备，以增强其§Y工业生产§!、§Y港湾交通§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步提升该地对§Y[ROOT.GetName]§!本土工业体系之支撑作用。"
 JAP_shoko_develop_north_kyushu:"开发北九州"
 JAP_shoko_develop_north_kyushu_desc:"§Y北九州§!地处日本西端，兼具煤铁资源、港湾条件与工业基础，是§Y[ROOT.GetName]§!本土重要的重工业与海运节点。若能进一步整备基础设施并扩充民用工业，可望强化其作为西部工业与物流核心的地位。"
 JAP_shoko_develop_north_kyushu_mission:"北九州开发计划"
 JAP_shoko_develop_north_kyushu_mission_desc:"§Y商工省§!正推进§Y北九州§!地区整备，以增强其§Y工业生产§!、§Y港湾交通§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步提升该地对§Y[ROOT.GetName]§!西部工业体系之支撑作用。"
 JAP_shoko_develop_hokuriku:"开发北陆"
 JAP_shoko_develop_hokuriku_desc:"§Y北陆§!面向日本海，兼具港湾、山地交通与地方工业基础，是本州中北部重要的区域支点。若能继续改善基础设施并扩充民用工业，可进一步增强其对§Y[ROOT.GetName]§!北部经济与后方工业的承载能力。"
 JAP_shoko_develop_hokuriku_mission:"北陆开发计划"
 JAP_shoko_develop_hokuriku_mission_desc:"§Y商工省§!正推进§Y北陆§!地区整备，以增强其§Y工业生产§!、§Y交通统筹§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步强化该地对§Y[ROOT.GetName]§!北部工业体系的支撑作用。"
 JAP_shoko_develop_koshinetsu:"开发甲信越"
 JAP_shoko_develop_koshinetsu_desc:"§Y甲信越§!横贯本州中部，兼具山地资源、内陆交通与沿海港口联络，是连接日本海与内地市场的重要区域。若能进一步完善基础设施并扩充船坞建设，可显著提升其对§Y[ROOT.GetName]§!海运与后方工业体系的支撑能力。"
 JAP_shoko_develop_koshinetsu_mission:"甲信越开发计划"
 JAP_shoko_develop_koshinetsu_mission_desc:"§Y商工省§!正推进§Y甲信越§!地区整备，以增强其§Y沿海工业§!、§Y交通联络§!与§Y电力输送§!能力。若能在期限内完成基础设施与船坞扩充，则可进一步强化该地对§Y[ROOT.GetName]§!海运体系与后方工业的支撑作用。"
 JAP_shoko_develop_sanin:"开发山阴"
 JAP_shoko_develop_sanin_desc:"§Y山阴§!沿日本海展开，拥有港湾、矿产与地方工业基础，是本州西北部重要的区域支点。若能继续改善基础设施并扩充民用工业，可进一步增强其对§Y[ROOT.GetName]§!西部后方工业与沿海运输的承载能力。"
 JAP_shoko_develop_sanin_mission:"山阴开发计划"
 JAP_shoko_develop_sanin_mission_desc:"§Y商工省§!正推进§Y山阴§!地区整备，以增强其§Y工业生产§!、§Y交通联络§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步扩展当地之§Y工业承载空间§!，并为后续军需生产提供更稳定之§Y电网支撑§!。"
 JAP_shoko_develop_shikoku:"开发四国"
 JAP_shoko_develop_shikoku_desc:"§Y四国§!位于濑户内海与太平洋之间，拥有港湾、沿海交通与地方工业基础，是§Y[ROOT.GetName]§!内海航运与西日本沿岸运输的重要节点。若能继续改善基础设施并扩充民用工业，可进一步强化其对海运与后方工业的承载能力。"
 JAP_shoko_develop_shikoku_mission:"四国开发计划"
 JAP_shoko_develop_shikoku_mission_desc:"§Y商工省§!正推进§Y四国§!地区整备，以增强其§Y工业生产§!、§Y港湾交通§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步强化该地对§Y[ROOT.GetName]§!内海海运体系的支撑作用。"
 JAP_shoko_develop_south_kyushu:"开发南九州"
 JAP_shoko_develop_south_kyushu_desc:"§Y南九州§!濒临太平洋与东海，兼具港湾、沿海航运与地方工业基础，是§Y[ROOT.GetName]§!西南方向的重要海运与后方工业节点。若能继续改善基础设施并扩充民用工业，可进一步强化其对船坞建设与海运体系的支撑能力。"
 JAP_shoko_develop_south_kyushu_mission:"南九州开发计划"
 JAP_shoko_develop_south_kyushu_mission_desc:"§Y商工省§!正推进§Y南九州§!地区整备，以增强其§Y工业生产§!、§Y港湾交通§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步强化该地对§Y[ROOT.GetName]§!南部海运体系与船坞建设的支撑作用。"
 JAP_shoko_develop_tohoku:"开发东北"
 JAP_shoko_develop_tohoku_desc:"§Y东北地方§!横贯本州北部，地域辽阔，兼具农产、林业、矿产与沿海港湾条件，是§Y[ROOT.GetName]§!北方后备工业与运输体系的重要腹地。若能统筹推进§Y南东北§!与§Y北东北§!两地整备，则可进一步提升当地对工业生产、交通联络与战时后方体系之支撑能力。"
 JAP_shoko_develop_south_tohoku_mission:"南东北开发计划"
 JAP_shoko_develop_south_tohoku_mission_desc:"§Y商工省§!正推进§Y南东北§!地区整备，以增强其§Y工业生产§!、§Y交通联络§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步提升该地对§Y[ROOT.GetName]§!北方工业体系的支撑作用。"
 JAP_shoko_develop_north_tohoku_mission:"北东北开发计划"
 JAP_shoko_develop_north_tohoku_mission_desc:"§Y商工省§!正推进§Y北东北§!地区整备，以增强其§Y工业生产§!、§Y交通联络§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步巩固该地作为§Y[ROOT.GetName]§!北方后备工业与运输节点的地位。"
 JAP_shoko_develop_hokkaido:"开发北海道"
 JAP_shoko_develop_hokkaido_desc:"§Y北海道§!位处§Y[ROOT.GetName]§!北疆，地域广阔，兼具农林渔产、矿产与港湾条件，是§Y[ROOT.GetName]§!北方开发与后方工业的重要支点。若能继续改善基础设施并扩充民用工业，可进一步提升当地对军需生产、能源输送与北方交通体系的承载能力。"
 JAP_shoko_develop_hokkaido_mission:"北海道开发计划"
 JAP_shoko_develop_hokkaido_mission_desc:"§Y商工省§!正推进§Y北海道§!地区整备，以增强其§Y工业生产§!、§Y交通联络§!与§Y电力输送§!能力。若能在期限内完成基础设施与民用工业扩充，则可进一步强化该地对§Y[ROOT.GetName]§!北方军需体系之支撑，并同步推动§Y地区发展§!。"
 JAP_shoko_develop_shanghai:"开发上海"
 JAP_shoko_develop_shanghai_desc:"§Y上海§!地处长江入海口，是§Y[ROOT.GetName]§!在华中地区最重要的港口、工业与商贸枢纽之一。若能继续整备当地基础设施并扩充船坞能力，则可进一步强化其对海运、工业调度与沿海经济体系的支撑作用。"
 JAP_shoko_develop_shanghai_mission:"上海开发计划"
 JAP_shoko_develop_shanghai_mission_desc:"§Y商工省§!正推进§Y上海§!地区整备，以增强其§Y港湾运输§!、§Y工业协同§!与§Y电力输送§!能力。若能在期限内完成基础设施与船坞扩充，则可进一步巩固该地作为§Y[ROOT.GetName]§!沿海工业与海运节点的地位。"

