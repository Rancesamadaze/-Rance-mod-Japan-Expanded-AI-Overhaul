l_simp_chinese:
 JAP_kaguya_events.1.t:0 "八云紫的来信"
 JAP_kaguya_events.1.d:0 "据八云紫的信中说，因为对现在皇道派的彩蛋领导人没有兴趣，所以想邀请辉夜去统治日本。\n\n辉夜本来就是大战略游戏爱好者。何况，若只是坐在永远亭里继续消磨那多得有些过头的时间，还不如去体验一下征服世界的乐趣。等提高一番钢4水平，回来后再约妹红来上一局PVP，也算是不虚此行。\n\n于是，辉夜几乎没怎么犹豫，就接受了这个提议。\n毕竟，公主偶尔心血来潮一次，也是很正常的事。"
 JAP_kaguya_events.1.a:0 "LINK START!"
