l_simp_chinese:
 RULE_GROUP_RANCE_JAPAN_REWORK: "RA日本特殊设置"
 RULE_OPTION_RANCE_NO: "否"
 RULE_OPTION_RANCE_YES: "是"
 RANCE_JAPAN_RETURN_TO_PEAK: "重回巅峰"
 RANCE_JAPAN_RETURN_TO_PEAK_DISABLED_DESC: "日本的综合强度将采取削弱版，略高于原版数值。"
 RANCE_JAPAN_RETURN_TO_PEAK_ENABLED_DESC: "日本的综合强度将采取未被削弱时的标准版，准备迎接风暴吧。"
 Rance_jap_return_to_peak_standard.tt: "开局规则§Y重回巅峰§!已设置为§Y是§!。"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD: "公平对决？"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD_DISABLED_DESC: "不额外为原版营增加数值，日本的特殊单位会比原版单位更强。"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD_ENABLED_DESC: "所有现有国家在开局获得隐藏科技，原版相关营单位会被强化到接近日本特殊单位的水平。但是该加强可能数值过时且不适合修改过原版营数值的MOD。"
 RANCE_JAPAN_STARTING_OOB: "日本开局部队"
 RULE_OPTION_RANCE_JAPAN_STARTING_OOB_MOD: "强化版开局部队"
 RANCE_JAPAN_STARTING_OOB_MOD_DESC: "默认选项。加载本MOD强化版开局陆军、海军与空军。若日本由AI操控或希望挑战完整AI流程，建议选择此项。"
 RULE_OPTION_RANCE_JAPAN_STARTING_OOB_VANILLA: "原版开局部队"
 RANCE_JAPAN_STARTING_OOB_VANILLA_DESC: "加载类似原版的1936日本陆军、海军与空军，并额外提供本MOD开局编制设计。适合想要白手起家的玩家使用。"
 RANCE_JAPAN_AI_DIFFICULTY: "预设日本AI难度"
 RULE_OPTION_RANCE_AI_DIFFICULTY_IN_GAME: "游戏内选择"
 RANCE_JAPAN_AI_DIFFICULTY_DEFAULT_DESC: "不在开局初始化时写入难度，沿用原有游戏内难度选择流程。"
 RULE_OPTION_RANCE_AI_DIFFICULTY_EASY: "§7白雪纷飞的程度(EASY)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_NORMAL: "§6漫天风霜的程度(NORMAL)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_HARD: "§4暴雪蔽日的程度(HARD)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_LUNATIC: "§O雪虐风饕的程度(LUNATIC)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_EXTRA: "§R波谲云诡的程度(EXTRA)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_PHANTASM: "§0樱花烂漫的程度(PHANTASM)§! §R（未完成）§!"
 RANCE_JAPAN_SCRIPTED_LANDING: "脚本登陆"
 RANCE_JAPAN_SCRIPTED_LANDING_ENABLED_DESC: "默认选项，将会在海军力量允许时进行脚本登陆，在登陆前30天会给玩家发送事件预警，可以通过提前夺取出发地阻止登陆。另外根据难度不同会按照不同频率发起无预警的奇袭，路径与一般登陆相同。脚本登陆将同样占据登陆容量。"
 RANCE_JAPAN_SCRIPTED_LANDING_DISABLED_DESC: "玩家和AI将都不被允许脚本登陆，会拖慢AI的登陆作战，并让AI难以完成对美国的登陆。"
 RANCE_JAPAN_AI_BOSS_MODE: "日本AI Boss模式"
 RANCE_JAPAN_AI_BOSS_MODE_DISABLED_DESC: "默认选项。日本AI只根据和平、战争与投降进度刷新动态补给倍率。"
 RANCE_JAPAN_AI_BOSS_MODE_ENABLED_DESC: "日本AI仅在与敌方玩家或主要国家AI交战时获得Boss额外倍率，面对的敌人越多，获得额外装备的倍率越高。"
 RANCE_JAPAN_PLAYER_AI_CHEATS: "为日本玩家启用AI可用的作弊"
 RANCE_JAPAN_PLAYER_AI_CHEATS_DISABLED_DESC: "日本玩家无法使用日本AI的专属辅助功能。"
 RANCE_JAPAN_PLAYER_AI_CHEATS_ENABLED_DESC: "日本玩家可以使用AI专属的辅助功能。"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY: "启用日本AI陆、空军动态补给"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY_ENABLED_DESC: "默认选项。保留每60天一次的陆空动态补给，强烈建议开启，否则日本AI很难达到所选难度的强度预期（也不弱）。"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY_DISABLED_DESC: "关闭每60天一次的陆空动态补给。不推荐，除非你正在专门测试无额外装备的日本AI；关闭后AI强度大概率明显低于难度预期（也不弱）。"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY: "启用日本AI海军动态补给"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY_ENABLED_DESC: "默认选项。保留半年度舰艇动态补给，强烈建议开启，否则日本AI海军会更难维持本MOD预期的远洋压力（也不弱）。"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY_DISABLED_DESC: "关闭半年度舰艇动态补给。不推荐，除非你正在专门测试无额外舰艇的日本AI；关闭后AI海军强度大概率明显低于难度预期（也不弱）。"
