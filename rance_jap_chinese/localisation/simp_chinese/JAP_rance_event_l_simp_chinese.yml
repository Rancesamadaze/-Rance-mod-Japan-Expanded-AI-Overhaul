##AI难度设置
l_simp_chinese:
  # 第一页主菜单
 Rance_jap_event.1.t:0 "原版日本拓展与AI加强难度设置（第一页）"
 Rance_jap_event.1.d:0 "欢迎游玩本MOD，请点击选项进入难度说明页面，以下是前三档难度，注意，即使是最简单的难度也不建议在原版数值下挑战，请配合加强国家的各种MOD启用"
 Rance_jap_event.1.d.a:0 "§7白雪纷飞的程度(EASY)§!"
 Rance_jap_event.1.d.b:0 "§6漫天风霜的程度(NORMAL)§!"
 Rance_jap_event.1.d.c:0 "§4暴雪蔽日的程度(HARD)§!"
 Rance_jap_event.1.d.d:0 "非常简单，我想要更高难度"
#第二页主菜单
l_simp_chinese:
 Rance_jap_event.2.t:"原版日本拓展与AI加强难度设置（第二页）"
 Rance_jap_event.2.d:"前三档难度满足不了你？以下是后三档难度，注意，即使是最难的难度也不能参加天堂之战（或许）"
 Rance_jap_event.2.d.a:0 "§O雪虐风饕的程度(LUNATIC)§!"
 Rance_jap_event.2.d.b:0 "§R波谲云诡的程度(EXTRA)§!"
 Rance_jap_event.2.d.c:0 "§0樱花烂漫的程度(PHANTASM)§!§R（未完工）§!"
 Rance_jap_event.2.d.d:"吓哭了，还是来点简单的吧"
# EASY 难度详情页
l_simp_chinese:
 Rance_jap_nandu_event.1.t:0 "原版日本拓展与AI加强难度设置(EASY)"
 Rance_jap_nandu_event.1.d:0 "EASY难度：面向新手挑战的难度，AI的陆军主力编制为步坦师与特种步坦师。AI将根据难度获得一些基础BUFF，主要用于润滑AI的动态调产（玩家可复制）。AI还会根据难度，在主力师编制就绪后获得动态的额外装备补给（可以关闭，但不推荐）。"
 Rance_jap_nandu_event.1.d.a:0 "§7香甜欢品尝，飘飘白雪落地上，蓬松又绵软§!"
 Rance_jap_nandu_event.r:"返回难度设置第一页"
# NORMAL
l_simp_chinese:
 Rance_jap_nandu_event.2.t:0 "原版日本拓展与AI加强难度设置(NORMAL)"
 Rance_jap_nandu_event.2.d:0 "NORMAL难度：AI的陆军主力编制为特种步坦师与机坦师。AI将根据难度获得一些基础BUFF，主要用于润滑AI的动态调产（玩家可复制）。AI还会根据难度，在主力师编制就绪后获得动态的额外装备补给（可以关闭，但不推荐）。"
 Rance_jap_nandu_event.2.d.a:0 "§6忽闻悉索声，窗外竹影婆娑动，夜雪扰清梦§!"
# HARD
l_simp_chinese:
 Rance_jap_nandu_event.3.t:0 "原版日本拓展与AI加强难度设置(HARD)"
 Rance_jap_nandu_event.3.d:0 "HARD难度：在NORMAL难度主力编制的基础上加入两栖机坦师。AI将根据难度获得一些基础BUFF，主要用于润滑AI的动态调产（玩家可复制）。AI还会根据难度，在主力师编制就绪后获得动态的额外装备补给（可以关闭，但不推荐）。"
 Rance_jap_nandu_event.3.d.a:0 "§4客叩雪中门，不闻匆匆应答声，心焦避寒风§!"
#LUNATIC
l_simp_chinese:
 Rance_jap_nandu_event.4.t:"原版日本拓展与AI加强难度设置(LUNATIC)"
 Rance_jap_nandu_event.4.d:"LUNATIC难度：在上一个难度的基础上加入两栖重机坦师与重型机坦师。AI将根据难度获得一些基础BUFF，主要用于润滑AI的动态调产（玩家可复制）。AI还会根据难度，在主力师编制就绪后获得动态的额外装备补给（可以关闭，但不推荐）。"
 Rance_jap_nandu_event.4.d.a:0 "§O雪霁初晴日，茫茫银原掩不住，新芽初露紫§!"
#EXTRA
l_simp_chinese:
 Rance_jap_nandu_event.5.t:"原版日本拓展与AI加强难度设置(EXTRA)"
 Rance_jap_nandu_event.5.d:"EXTRA难度：在上一个难度的基础上加入陆巡师。AI将根据难度获得一些基础BUFF，主要用于润滑AI的动态调产（玩家可复制）。AI还会根据难度，在主力师编制就绪后获得动态的额外装备补给（可以关闭，但不推荐）。"
 Rance_jap_nandu_event.5.d.a:0 "§R若问深闺中，山岩锐可断蛇身，寒渊冷气涌§!"
#PHANTASM
l_simp_chinese:
 Rance_jap_nandu_event.6.t:"原版日本拓展与AI加强难度设置(PHANTASM)"
 Rance_jap_nandu_event.6.d:"PHANTASM难度：无论如何都不推荐的难度，AI会根据当前路线获得不同的独特加成；目前仅讲座路线拥有特殊领袖，额外机制尚未编写。AI将根据难度获得一些基础BUFF，主要用于润滑AI的动态调产（玩家可复制）。AI还会根据难度，在主力师编制就绪后获得动态的额外装备补给（可以关闭，但不推荐）各MOD间的最高难度和玩家的轮椅间往往难以平衡，大概率不是平推AI就是被AI平推，但是只要您玩了我写的内容就不是白费。会赢的。"
 Rance_jap_nandu_event.6.d.a:0 "§0此间盛开者，樱花缤纷胜仙境，不似人间景§!"
