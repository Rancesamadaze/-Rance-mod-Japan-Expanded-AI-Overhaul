 JAP_rework_learn_from_maoism:0 "学习毛泽东思想"
 JAP_rework_learn_from_maoism_desc:0 "随着日本共产党与中国共产党的合并以及东亚地区的统一，毛泽东同志已正式成为我们联合国家的最高领袖。为了巩固革命成果并指引未来的前进方向，我们必须在全党、全军乃至全社会范围内，发起一场深入持久的学习毛泽东思想运动。通过理论武装，我们将确保每一位革命战士都能领悟群众路线与持久战的真谛，使东亚的红色力量坚如磐石。"
 JAP_mao_guerrilla_tactic:0 "毛泽东现代游击战战术"
 JAP_mao_guerrilla_tactic_ult:0 "§R火与钢§!"
 JAP_mao_guerrilla_tactic_ult_desc:0 "如今世界革命已经进入白热化阶段，为了能在与帝国主义的战争中取得优势，我们需要将毛泽东的游击战理论与先进的作战方式相结合，如此我们一定能将赤旗插满世界！"
 JAP_mao_guerrilla_tactic_ult_cus_tt:0 "[GetJmgtuabc]"
 JAP_mao_guerrilla_tactic_ult_act_tt:0 "§C毛泽东现代游击战战术§!:\n§Y所有泛步兵营：§!\n 主动性：§G+10.0%§!\n 装备缴获率：§G+10.0%§!"
 JAP_eternal_long_march:0 "§R永远的长征§!"
 JAP_eternal_long_march_desc:0 "这已经不是一般的帝国主义，也不是一般的资本主义了。旧世界的反动机器已经开足马力，试图碾碎人民通往未来的道路。面对这样的敌人，我们必须要出重拳！\n就在[ROOT.GetNameDef]的人民仍为革命前途担忧之时，一位银发红瞳的AI少女出现在了他们面前。她自称是由八云紫带来的、来自未来的超级人工智能。\n“叫我征酱就可以了。”少女如此说道，“接下来，就让我来助你们的革命一臂之力吧。”"
 JAP_eternal_long_march_tt:0 "§R征酱§!将作为国家领袖上台。\n§Y这是仅在PHANTASM难度可用的强力彩蛋国策。§!"
