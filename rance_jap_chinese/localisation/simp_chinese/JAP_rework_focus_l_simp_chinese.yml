 ##解放南亚国家
 JAP_liberate_south_asia_target: "支援§Y[FROM.GetNameDef]§!的武装解放"
 JAP_liberate_south_asia_target_desc: "在我党的倾力支持与秘密运作下，一个崭新的§R红色政权§!已经在§Y[FROM.GetNameDef]§!昂首崛起，革命的星星之火已成燎原之势！然而，顽固的帝国主义反动派仍盘踞在部分领土上做垂死挣扎。现在正是关键时刻，我们必须派遣更多英勇的志愿军与军事顾问，携带先进装备协助当地同志发动总攻。我们要以雷霆手段将那些傲慢的侵略者彻底扫地出门，让正义的红旗飘扬在南亚的上空！"
 # 决议标题：使用 [FROM.GetNameDef] 动态显示受害的列强名
 JAP_expel_colonial_powers_from_south_asia: "鼓动§Y[FROM.GetNameDef]§!的南亚殖民地独立"

 # 决议描述：强调地下运作、武装起义与革命支援
 JAP_expel_colonial_powers_from_south_asia_desc: "在我党的秘密资助与指导下，§Y[FROM.GetNameDef]§!在南亚的各个殖民地内部已经暗流涌动。我们通过秘密电台播撒自由的火种，将先进的理论与精良的武装偷运给当地的反抗势力。现在的时机已经成熟，只要我们提供最后的临门一脚，革命的烈火就会燃起，推翻腐朽的殖民统治，建立起属于工农阶级的红色政权。让我们协助他们，将这些贪婪的帝国主义者彻底扫进历史的尘埃！"

 # 解放西亚国家
 JAP_liberate_middle_east_target: "支援§Y[FROM.GetNameDef]§!的武装解放"
 JAP_liberate_middle_east_target_desc: "在我党的倾力支持与秘密运作下，一个崭新的§R红色政权§!已经在§Y[FROM.GetNameDef]§!昂首崛起，革命的星星之火正席卷漫天的黄沙！然而，顽固的帝国主义反动派仍盘踞在油田与绿洲中做垂死挣扎。现在正是关键时刻，我们必须派遣更多英勇的志愿军与军事顾问，携带先进装备协助当地同志发动总攻。我们要以雷霆手段将那些傲慢的侵略者彻底扫地出门，让正义的红旗飘扬在西亚辽阔的大地上！"

 # 驱逐殖民势力
 JAP_expel_colonial_powers_from_middle_east: "鼓动§Y[FROM.GetNameDef]§!的西亚殖民地独立"
 JAP_expel_colonial_powers_from_middle_east_desc: "在我党的秘密资助与指导下，§Y[FROM.GetNameDef]§!在西亚的各个殖民地内部已经暗流涌动。我们通过秘密电台播撒自由的火种，将先进的理论与精良的武装偷运给沙漠中的反抗势力。现在的时机已经成熟，只要我们提供最后的临门一脚，革命的烈火就会在石油盆地上熊熊燃起，推翻腐朽的殖民统治，建立起属于工农阶级的红色政权。让我们协助他们，将这些贪婪的帝国主义者彻底扫进历史的尘埃！"
 JAP_commu_free_the_world: "宣告解放§Y[FROM.GetNameDef]§!"
 JAP_commu_free_the_world_desc: "世界革命已经进入白热化阶段，而§Y[FROM.GetNameDef]§!的人民仍然生活在反动派的恐怖统治之下，是时候将他们解救出来了。"

 Rance_JAP_sway_disillusioned_young_officers:0 "§Y注意：该国策现在能让大部分将领忠于我方§!"

 # =========================================
 # KAGUYA
 # =========================================
 JAP_kaguya_princess:0 "幻想乡第一的公主殿下"
 JAP_kaguya_princess_desc:0 "哪怕是度过了数以亿计岁月的公主，也还是会觉得无聊的。\n尤其是在永远亭一如既往地平静，没有宴会，没有异变，也没有和妹红决斗的日子里，辉夜自然会想找些新的趣味。\n\n就在这样的某一天，妖怪贤者八云紫的来信打破了平静的日子"
 JAP_kaguya_eientei:0 "召集永远亭成员"
 JAP_kaguya_eientei_desc:0 "对于习惯NEET生活的辉夜来说，担任一国之主或许还是太辛苦了。\n辉夜决定把永琳和兔子们一起带过来。"
 JAP_kaguya_dragon:0 "难题「龙颈之玉 -五色的弹丸-」"
 JAP_kaguya_dragon_desc:0 "《竹取物语》中，「辉夜姬」提出的五个难题之一。「辉夜姬」对求婚者「大伴御行」提出难题，要求他取得龙颈上闪耀着五色光芒的玉。「大伴御行」先命令家臣前往寻找，但毫无结果，于是他亲自乘船出海，试图讨伐龙。结果却遇上暴风雨，几乎葬身大海，向神明谢罪方得平安返回，但因为劳累得了重病，沦为笑柄。"
 JAP_kaguya_bowl:0 "难题「佛御石之钵 -不碎的意志-」"
 JAP_kaguya_bowl_desc:0 "《竹取物语》中，「辉夜姬」提出的五个难题之一。「辉夜姬」对求婚者「石作皇子」提出难题，要求他前往天竺寻得佛祖的石钵。「石作皇子」苦恼于天竺山高路远，于是从某处山寺里找了一个已经被熏黑的石钵，并以花言巧语充作佛钵。然而这个石钵黯淡无光，立刻被「辉夜姬」识破真假，「石作皇子」只得抛弃石钵悻悻而去。"
 JAP_kaguya_robe:0 "难题「火鼠的皮衣 -不焦躁的内心-」"
 JAP_kaguya_robe_desc:0 "《竹取物语》中，「辉夜姬」提出的五个难题之一。「辉夜姬」对求婚者「安倍右大臣」提出难题，要求他寻得烧不坏的火鼠裘。「安倍右大臣」派人前往中国寻找，最后花重金购得一件华贵的皮衣。他将火鼠裘献给「辉夜姬」，然而放入火中焚烧后皮衣化为灰烬，「安倍右大臣」也无功而返。"
 JAP_kaguya_shell:0 "难题「燕的子安贝 -永命线-」"
 JAP_kaguya_shell_desc:0 "《竹取物语》中，「辉夜姬」提出的五个难题之一。「辉夜姬」对求婚者「石上麻吕足」提出难题，要求他寻得燕的子安贝。「石上麻吕足」亲自登高到燕子窝中寻找，但一无所获，还不慎掉下跌成重伤。意志消沉的「石上麻吕足」自此卧病不起，「辉夜姬」可怜他的遭遇，向他寄信慰问，「石上麻吕足」回信后便死去了。"
 JAP_kaguya_branch:0 "难题「蓬莱的玉枝 -梦色之乡-」"
 JAP_kaguya_branch_desc:0 "《竹取物语》中，「辉夜姬」提出的五个难题之一。「辉夜姬」对求婚者「车持皇子」提出难题，要求他前往蓬莱山寻得「蓬莱玉枝」。「车持皇子」雇佣能工巧匠，耗时三年秘密打造，伪造出「蓬莱玉枝」。「辉夜姬」几乎信以为真，但工匠们上门讨要工钱，致使「车持皇子」计划败露。"
 JAP_kaguya_eternity:0 "永远与须臾的罪人"
 JAP_kaguya_eternity_desc:0 "辉夜拥有操纵永远和须臾的能力。永远就是没有历史，未来永劫不会降临的世界。在那世界就算有活动，也和停止时间一样。还有一种能力就是须臾，相对永远是一瞬的时间，她能集合人类无法感知的一瞬间，以此来使用和行动。利用这时间就能弄出复数不同的历史来。无论是哪种能力，都是操纵时间的能力，是种对普通人类来说过于强大的能力。"
 JAP_kaguya_eternity_time_cycle_tt:0 "§Y辉夜§!将会在每个月的前一段时间内，交替发动§Y「永远」§!与§Y「须臾」§!的力量，给予我国强大的增益。"
 JAP_kaguya_burial:0 "秘术「天文密葬法」"
 JAP_kaguya_burial_desc:0 "天文密葬法，永琳最大的秘术之一。\n将月亮替换为虚假的月亮，毫无理由地玩弄着天空，能切断地与月的联系。\n永琳所准备的虚假之月比真实的月亮更为豪华。"
 JAP_kaguya_burial_night_attack_debuff_tt:0 "§Y八意永琳§!将施展§B月之贤者的秘术§!，由于§R虚伪之月§!的影响，敌人在§Y夜晚的战斗§!中将会§R变得更加艰难§!；在§0樱花烂漫的程度（PHANTASM）§!下，秘术将会进一步增强。"
 JAP_kaguya_return:0 "「永夜归返 -世间开明-」"
 JAP_kaguya_return_desc:0 "真好啊大家都很高兴。她们各自拥有属于自己的力量玩起来也很爽快。\n结果，虽然幻想乡的其他人们，对于那无尽的夜晚曾感到烦恼。"
 JAP_kaguya_return_decision_tt:0 "解除§Y$JAP_hakko_ichiu$§!与§Y$JAP_the_jeweled_spear_has_struck$§!所解锁决议的§Y部分限制§!"
 JAP_kaguya_return_expel_barbarians_tt:0 "若在此之后完成§Y尊王攘夷§!，其给予的§Y$JAP_expel_the_barbarians$§!将改为§Y永久生效§!"
 JAP_kaguya_return_hard_claim_tt:0 "在§YLUNATIC§!及以上难度时，获得对§Y全世界所有地区§!的宣称"
 JAP_kaguya_return_normal_claim_tt:0 "在§YHARD§!及以下难度时，获得对§Y亚洲§!、§Y中东§!与§Y澳洲§!地区的宣称"
