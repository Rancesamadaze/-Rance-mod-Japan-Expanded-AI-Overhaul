 JAP_dominate_comintern:0 "主导共产国际"
 JAP_dominate_comintern_desc:0 "随着我们在共产国际中的地位日益提高，我们逐渐成为了共产国际实际上的领袖。也许是时候向我们的朋友苏联提出一些要求了，为了革命的最高利益，重新分配我们的责任区是必要的。"

 jap_comintern.1.t:0 "来自东方的要求"
 jap_comintern.1.d:0 "日本向我们提出要求，为了更好的合作，他们希望我们将在西伯利亚的领土转交给他们。作为回报，他们会承认我们对整个欧洲的宣称权。这将彻底改变我们的地缘政治格局。"
 jap_comintern.1.a:0 "为了更宏大的利益，我们同意。"
 jap_comintern.1.b:0 "这简直是敲诈！绝对不行！"

