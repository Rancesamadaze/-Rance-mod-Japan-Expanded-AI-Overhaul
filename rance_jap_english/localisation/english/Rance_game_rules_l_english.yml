l_english:
 RULE_GROUP_RANCE_JAPAN_REWORK:0 "RA Japan Special Settings"
 RULE_OPTION_RANCE_NO:0 "No"
 RULE_OPTION_RANCE_YES:0 "Yes"
 RANCE_JAPAN_RETURN_TO_PEAK:0 "Return to Peak"
 RANCE_JAPAN_RETURN_TO_PEAK_DISABLED_DESC:0 "Japan's overall strength uses the nerfed version, slightly above vanilla values."
 RANCE_JAPAN_RETURN_TO_PEAK_ENABLED_DESC:0 "Japan's overall strength uses the pre-nerf standard version. Prepare for the storm."
 Rance_jap_return_to_peak_standard.tt:0 "The starting rule §YReturn to Peak§! is set to §YYes§!."
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD:0 "Fair Fight?"
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD_DISABLED_DESC:0 "Does not add extra stats to vanilla battalions. Japanese special units will be stronger than vanilla units."
 RANCE_REGULAR_UNITS_TO_JAPAN_SPECIAL_STANDARD_ENABLED_DESC:0 "All existing countries receive hidden technology at game start, strengthening relevant vanilla battalions to roughly match Japanese special units. However, these values may be outdated and are not suited for mods that change vanilla battalion stats."
 RANCE_JAPAN_STARTING_OOB:0 "Japan Starting Forces"
 RULE_OPTION_RANCE_JAPAN_STARTING_OOB_MOD:0 "Enhanced Starting Forces"
 RANCE_JAPAN_STARTING_OOB_MOD_DESC:0 "Default option. Loads this mod's enhanced starting army, navy, and air force. Recommended if Japan is AI-controlled or if you want to challenge the full AI flow."
 RULE_OPTION_RANCE_JAPAN_STARTING_OOB_VANILLA:0 "Vanilla Starting Forces"
 RANCE_JAPAN_STARTING_OOB_VANILLA_DESC:0 "Loads a 1936 Japanese army, navy, and air force similar to vanilla, while also providing this mod's starting template designs. Suitable for players who want to build up from scratch."
 RANCE_JAPAN_AI_DIFFICULTY:0 "Preset Japanese AI Difficulty"
 RULE_OPTION_RANCE_AI_DIFFICULTY_IN_GAME:0 "Choose In-Game"
 RANCE_JAPAN_AI_DIFFICULTY_DEFAULT_DESC:0 "Does not write a difficulty during startup initialization, preserving the original in-game difficulty selection flow."
 RULE_OPTION_RANCE_AI_DIFFICULTY_EASY:0 "§7Degree of Falling Snow (EASY)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_NORMAL:0 "§6Degree of Wind and Frost (NORMAL)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_HARD:0 "§4Degree of Sun-Blotting Blizzard (HARD)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_LUNATIC:0 "§ODegree of Howling Snowstorm (LUNATIC)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_EXTRA:0 "§RDegree of Treacherous Clouds and Waves (EXTRA)§!"
 RULE_OPTION_RANCE_AI_DIFFICULTY_PHANTASM:0 "§0Degree of Blooming Cherry Blossoms (PHANTASM)§! §R(Unfinished)§!"
 RANCE_JAPAN_SCRIPTED_LANDING:0 "Scripted Landings"
 RANCE_JAPAN_SCRIPTED_LANDING_ENABLED_DESC:0 "Default option. Scripted landings will be launched when naval strength permits. Players receive an event warning 30 days before the landing, and can stop it by capturing the departure point in advance. Depending on difficulty, surprise attacks without warning will also be launched at different frequencies; their routes are the same as normal scripted landings. Scripted landings also use naval invasion capacity."
 RANCE_JAPAN_SCRIPTED_LANDING_DISABLED_DESC:0 "Players and AI will both be unable to use scripted landings. This will slow AI landing operations and make it difficult for the AI to land in the United States."
 RANCE_JAPAN_AI_BOSS_MODE:0 "Japanese AI Boss Mode"
 RANCE_JAPAN_AI_BOSS_MODE_DISABLED_DESC:0 "Default option. The Japanese AI refreshes its dynamic supply multiplier only according to peace, war, and surrender progress."
 RANCE_JAPAN_AI_BOSS_MODE_ENABLED_DESC:0 "The Japanese AI gains Boss extra multipliers only when fighting enemy players or major-country AIs. The more enemies it faces, the higher its extra equipment multiplier becomes."
 RANCE_JAPAN_PLAYER_AI_CHEATS:0 "Enable Japanese AI Assistance for Player Japan"
 RANCE_JAPAN_PLAYER_AI_CHEATS_DISABLED_DESC:0 "A Japanese player cannot use Japanese AI-exclusive assistance."
 RANCE_JAPAN_PLAYER_AI_CHEATS_ENABLED_DESC:0 "A Japanese player can use AI-exclusive assistance."
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY:0 "Enable Japanese AI Land and Air Dynamic Supply"
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY_ENABLED_DESC:0 "Default option. Keeps the land and air dynamic supply cycle every 60 days. Strongly recommended, otherwise the Japanese AI will struggle to reach the strength expected for the selected difficulty, though it will still not be weak."
 RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY_DISABLED_DESC:0 "Disables the land and air dynamic supply cycle every 60 days. Not recommended unless you are specifically testing the Japanese AI without extra equipment; after disabling it, AI strength will very likely fall well below the difficulty expectation, though it will still not be weak."
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY:0 "Enable Japanese AI Naval Dynamic Supply"
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY_ENABLED_DESC:0 "Default option. Keeps the semiannual dynamic ship supply. Strongly recommended, otherwise the Japanese AI navy will have a harder time maintaining the blue-water pressure expected by this mod, though it will still not be weak."
 RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY_DISABLED_DESC:0 "Disables the semiannual dynamic ship supply. Not recommended unless you are specifically testing the Japanese AI without extra ships; after disabling it, AI naval strength will very likely fall well below the difficulty expectation, though it will still not be weak."
