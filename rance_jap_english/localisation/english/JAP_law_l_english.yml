l_english:
 JAP_comintern_industrial_integration:0 "§RComintern Industrial Integration§!"
 JAP_comintern_industrial_integration_desc:0 "We will undertake deep industrial cooperation with the Soviet Union and the other members of the Comintern. As East Asia's agricultural produce and light industrial goods pour toward Moscow along the Trans-Siberian Railway, Soviet industrial specialists will spare no effort in sharing the hard-won experience of the “Five-Year Plans.” Through the sweat of hundreds of millions of workers, towering factories will rise from the ground and thunder into operation. At this moment, steel and ideals are forged as one; the final victory of communism is within reach."
 JAP_rework_national_defense_state:0 "National Defense System"
 JAP_rework_national_defense_state_desc:0 "[ROOT.GetLeader] has announced the implementation of the “New System,” transforming Japan into a “national defense state” and mobilizing the entire population to defend the homeland. Under the National Mobilization Law, the government will assume control of every resource in the nation. With this system, the Empire shall endure for all eternity!"
 JAP_comintern_mutual_trade:0 "§RComintern Mutual Trade Agreement§!"
 JAP_comintern_mutual_trade_desc:0 "With the victory of the Far Eastern Revolution, the Japanese Communist Party has not only liberated the productive forces of the home islands, but has also fought shoulder to shoulder with our Chinese comrades, planting the red banner across the Asian continent. We are no longer an isolated industrial island adrift overseas. Through the Comintern Mutual Trade Agreement, Soviet oil in its torrents, China's endless tungsten deposits, and Japan's finest precision technology will merge into a flood capable of breaking the chains of imperialism. Soviet comrades' heavy tanks will be fitted with precision optics developed in Japan, while the workers of Leningrad will wear warm cotton clothing sewn on Osaka looms. After rapid industrialization, China will not only provide the strategic minerals that sustain the defense industry; the union of its vast farmlands and Japan's advanced agricultural machinery will become the inexhaustible red granary of the entire bloc. We will establish a red internal circulation system entirely independent of capitalist markets, ensuring that every ton of strategic resources and every grain of food is precisely transformed into steel guardians of proletarian power!"
 JAP_vanguard_of_the_proletariat:0 "§RProletarian Vanguard§!"
 JAP_vanguard_of_the_proletariat_desc:0 "With our vast population base, we no longer seek blind mass mobilization. Instead, we will build a vanguard force composed of proletarian elites with the highest class consciousness and the firmest will to fight. Young people rich in ideals and conviction will assume key posts in the army and receive comprehensive training, while selfish, death-fearing parasites will be §Ythoroughly liquidated§!. The vanguard born from this process will possess unparalleled organizational discipline and strategic execution, and with absolute qualitative superiority we will §Ycrush§! all resistance from reactionary forces."
 JAP_kodoha_yamato_spirit_conscription:0 "§YYamato Spirit§!"
 JAP_kodoha_yamato_spirit_conscription_desc:0 "Yamato Spirit should not remain confined to the exhortations of shrines, schools, and barracks. It must be transformed into a wartime order embraced by the entire nation. Youths, local notables, workers, and peasants alike will, inspired by the imperial spirit, shoulder the duties of defending the land and serving in the army, allowing the Empire to maintain steadfast morale and an unbroken front even in times of peril."
 JAP_rework_lecture_group_compliance_law:0 "§ROverthrow Local Despots and Redistribute the Land§!"
 JAP_rework_lecture_group_compliance_law_desc:0 "The old order in the occupied territories must never be preserved intact. Only by §Rutterly overthrowing§! local despots, wicked gentry, and every reactionary ruling force, and by returning land and livelihood to the working people, can we truly mobilize and win over the masses. Only then can the newborn red regime take root in the villages, deprive resistance of its soil, and ensure that the people sincerely support the revolutionary government."
 JAP_rework_lecture_group_infrastructure_law:0 "§RInfrastructure Leap Forward§!"
 JAP_rework_lecture_group_infrastructure_law_desc:0 "§RRevolution§! does not only destroy the old world; it must also build a new one. Roads must be laid, railways opened, ports repaired, and warehouses constructed. Only by launching a vigorous construction movement, linking together scattered and isolated regions and rapidly organizing manpower and material resources, can the occupied territories truly become a firm rear base for the revolutionary cause."
 JAP_rework_lecture_group_industrial_construction_law:0 "§RRed Industrialization§!"
 JAP_rework_lecture_group_industrial_construction_law_desc:0 "The lands we hold are not colonies to be exploited at will, but §Rrevolutionary base areas§! that must be incorporated into socialist construction. We must use unified planning to coordinate the construction of factories and mines, the expansion of facilities, and the allocation of labor. With the organizational power of the red regime, we will rapidly advance industrialization, transforming this land from an appendage of old imperialism into an industrial base that supports the revolutionary war and the construction of a new society."
 JAP_rework_lecture_group_output_law:0 "§RRoll Up Our Sleeves and Work Hard§!"
 JAP_rework_lecture_group_output_law_desc:0 "Now that the regime has been established, production must never slacken. Factories must run at full capacity, mines must dig deep into their potential, and local cadres and working masses alike must summon all their energy and organize every available force. Only by launching a drive for increased production under unified leadership can we fully unleash this land's productive potential, better support the front, serve construction, and consolidate the §Rrevolutionary government§!."
 JAP_rework_kaguya_industrial_extraction_law:0 "§gEarthlings, Offer Me Everything§!"
 JAP_axis_economic_integration:0 "§1Axis Economic and Trade Integration§!"
 JAP_axis_economic_integration_desc:0 "The old order of the world is crumbling by the day. The Anglo-American economic system, rotten and inept, is wholly unable to sustain the rebirth of East Asia and the world. Henceforth, the Empire must not only fight alongside its friendly nations on the battlefield, but also forge with the Axis powers a firmer and inseparable community in the realms of economy, industry, technology, transportation, and resource control. German and Italian technology and experience, the organization and spirit of the Imperial Nation, and the resources and productive capacity of the Southern Regions must all be integrated under a single grand purpose, so that the cooperation of the three powers may become a mighty force spanning Eurasia and shaking the world. This is no temporary expedient, but the inevitable path to building a new order, opening the Co-Prosperity Sphere, and laying the foundation for the Empire's eternal enterprise. Only by uniting the Axis nations economically and commercially can we, with unshakable will and limitless production, fulfill the historic mission entrusted to the Empire."
