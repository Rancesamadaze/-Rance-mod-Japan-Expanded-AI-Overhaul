 JAP_imperial_headquarters_scripted_landing_anatolia_to_montenegro_raid_tt:0 "§RThis operation will launch an immediate surprise landing.§!\nWhen this decision is selected, a small-scale surprise landing will immediately be launched from §Cthe Anatolian staging point§! against §RMontenegro§!, disrupting local defensive deployments and causing heavier combat losses. After the surprise attack is complete, the operation will still occupy the corresponding landing preparation capacity and must wait §O30 days§! for reorganization before it can be assigned again."

# Imperial General Headquarters events
 JAP_imperial_headquarters_events.1.t:0 "Japan Demands the Transfer of Asian Territories"
 JAP_imperial_headquarters_events.1.desc:0 "[FROM.GetNameDefCap]'s Imperial General Headquarters has delivered an ultimatum demanding that [ROOT.GetNameDef] immediately transfer all territories in Asia. Tokyo claims these bases will be incorporated into its southern strategic perimeter; if we refuse, Japan will turn the dispute into military action."
 JAP_imperial_headquarters_events.1.a:0 "Accept the ultimatum"
 JAP_imperial_headquarters_events.1.b:0 "Reject their threats"
 JAP_imperial_headquarters_events.2.t:0 "Portugal Transfers Its Asian Territories"
 JAP_imperial_headquarters_events.2.desc:0 "[FROM.GetNameDefCap] has accepted our ultimatum and transferred all of its territories in Asia. The Imperial General Headquarters can now incorporate these bases into the southern operations system."
 JAP_imperial_headquarters_events.2.a:0 "Just as planned"
 JAP_imperial_headquarters_events.3.t:0 "Portugal Rejects the Ultimatum"
 JAP_imperial_headquarters_events.3.desc:0 "[FROM.GetNameDefCap] has refused to withdraw from its Asian territories and is attempting to preserve its colonial bases through diplomatic delay. The Imperial General Headquarters is prepared to seize these objectives by force."
 JAP_imperial_headquarters_events.3.a:0 "Prepare to seize these bases"
 JAP_imperial_headquarters_events.4.t:0 "Japanese Landing Attempt Detected"
 JAP_imperial_headquarters_events.4.desc:0 "Coastal security forces and intelligence departments report that Japanese forces are concentrating around §C[JAP_scripted_landing_origin_state.GetName]§!, with maritime transport and covering activity clearly increasing. Their target may be §R[JAP_scripted_landing_target_state.GetName]§!. Local coastal defenses must be placed on alert at once."
 JAP_imperial_headquarters_events.4.a:0 "Acknowledge"
 JAP_imperial_headquarters_events.5.t:0 "Japanese Surprise Landing"
 JAP_imperial_headquarters_events.5.desc:0 "Japanese forces have suddenly launched a landing from §C[JAP_scripted_landing_origin_state.GetName]§!, and their advance elements have struck the coastal defenses of §R[JAP_scripted_landing_target_state.GetName]§!. Communications and command have briefly fallen into confusion; the local garrison must stabilize its positions immediately."
 JAP_imperial_headquarters_events.5.a:0 "Acknowledge"

# Equipment administration and war readiness
 JAP_rework_equipment_designs:0 "Ministry of Munitions - Equipment Administration Bureau"
 JAP_rework_equipment_designs_desc:0 "The Equipment Administration Bureau is subordinate to the Ministry of Munitions. It coordinates the design, prototyping, standardization, and transition to mass production of §Y[ROOT.GetName]§! army, navy, and air weapons; oversees the development of tanks, ships, aircraft, and derivative equipment; and aligns military requirements, equipment series, and armament compatibility to strengthen the overall armaments renewal and sustained combat capability of §Y[ROOT.GetName]§!."
 JAP_unlock_equipment_design_decisions_tt:0 "Unlock decision category: §YMinistry of Munitions - Equipment Administration Bureau§!"
 JAP_rework_war_readiness_construction_decisions:0 "Ministry of Munitions - War Readiness Construction Bureau"
 JAP_rework_war_readiness_construction_decisions_desc:0 "The War Readiness Construction Bureau is subordinate to the Ministry of Munitions. It coordinates rear-area facilities, factory expansion, reserve depots, and key-area preparation required for wartime munitions production, aligning industrial construction, munitions allocation, and military deployment needs to improve the sustained mobilization, equipment replenishment, and battlefield support capacity of §Y[ROOT.GetName]§!."
 JAP_unlock_war_readiness_construction_decisions_tt:0 "Unlock decision category: §YMinistry of Munitions - War Readiness Construction Bureau§!"
 JAP_war_readiness_expand_lushun_naval_base:0 "Expand Ryojun Naval Base"
 JAP_war_readiness_expand_lushun_naval_base_desc:0 "The War Readiness Construction Bureau will organize engineering teams to repair the §YRyojun§! naval anchorage, fuel and ammunition storage, and repair facilities, improving fleet berthing, supply, and maintenance capacity in the §YDairen§! area."
 JAP_war_readiness_lushun_naval_base_completed:0 "Completed decision: §Y$JAP_war_readiness_expand_lushun_naval_base$§!"
 JAP_war_readiness_manchurian_soviet_border_supply_network:0 "Prepare the Manchurian-Soviet Border Supply Network"
 JAP_war_readiness_manchurian_soviet_border_supply_network_desc:0 "The War Readiness Construction Bureau will carry out border logistics works along §YKirin§!, §YHulunbuir§!, §YHeilungkiang§!, §YSungkiang§!, and §YLiaoning§!, repairing border railways, integrating storage and transshipment stations, establishing forward supply centers, and expanding air support facilities so the Manchurian-Soviet border supply points are connected to the existing supply network."
 JAP_war_readiness_manchurian_soviet_border_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_manchurian_soviet_border_supply_network$§!"
 JAP_war_readiness_manchurian_soviet_forward_supply_links:0 "Connect the Manchurian-Soviet Border Forward Supply Lines"
 JAP_war_readiness_manchurian_soviet_forward_supply_links_desc:0 "After Soviet border supply depots have been seized, the War Readiness Construction Bureau will organize engineering teams to lay connecting railways forward from the existing Manchurian-Soviet border supply network, bringing newly captured forward supply nodes into our logistics system."
 JAP_war_readiness_manchurian_soviet_forward_supply_links_completed:0 "Completed decision: §Y$JAP_war_readiness_manchurian_soviet_forward_supply_links$§!"
 JAP_war_readiness_vladivostok_naval_railway_base:0 "Prepare Vladivostok Naval and Railway Base"
 JAP_war_readiness_vladivostok_naval_railway_base_desc:0 "After the §YVladivostok§! harbor district has been seized, the War Readiness Construction Bureau will expand it into a forward naval base; once all of §YVladivostok§! is under control, engineering teams will continue repairing the rail connection between the harbor district and the existing supply node."
 JAP_war_readiness_vladivostok_naval_railway_base_completed:0 "Completed decision: §Y$JAP_war_readiness_vladivostok_naval_railway_base$§!"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases:0 "Prepare Khabarovsk Coastal Bases"
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases_desc:0 "After the §YKhabarovsk§! coastal harbor district has been seized, the War Readiness Construction Bureau will expand it into a forward naval base; once the entire area is under control, engineering teams will lay connecting railways from existing supply nodes to the coastal harbor district, bringing the new port into the Manchurian-Soviet border forward supply network."
 JAP_war_readiness_khabarovsk_coastal_naval_railway_bases_completed:0 "Completed decision: §Y$JAP_war_readiness_khabarovsk_coastal_naval_railway_bases$§!"
 JAP_war_readiness_jidong_air_naval_base:0 "Prepare East Hebei Forward Air-Sea Base"
 JAP_war_readiness_jidong_air_naval_base_desc:0 "The War Readiness Construction Bureau will prepare air and naval bases in §YEast Hebei§!, expanding coastal anchorages, air stations, fuel and ammunition storage, and rail links so forces entering the passes receive steadier coastal supply and air support."
 JAP_war_readiness_jidong_air_naval_base_completed:0 "Completed decision: §Y$JAP_war_readiness_jidong_air_naval_base$§!"
 JAP_war_readiness_bailingmiao_jidong_railway:0 "Prepare the Pailingmiao-East Hebei Connecting Railway"
 JAP_war_readiness_bailingmiao_jidong_railway_desc:0 "The War Readiness Construction Bureau will repair railway links along §YPailingmiao§!, §YChahar§!, §YJehol§!, and §YEast Hebei§!, expand air support facilities along the grassland corridor, and connect the western grassland route to the East Hebei supply network after entry through the passes, providing steadier transport for flank advances and subsequent security garrisons."
 JAP_war_readiness_bailingmiao_jidong_railway_completed:0 "Completed decision: §Y$JAP_war_readiness_bailingmiao_jidong_railway$§!"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network:0 "Prepare the Pailingmiao-Suiyuan Supply Network"
 JAP_war_readiness_bailingmiao_suiyuan_supply_network_desc:0 "The War Readiness Construction Bureau will begin railway and storage works from §YPailingmiao§! toward §YSuiyuan§! and connect them to the existing transport nodes along the §YChahar§! line, allowing forward supply posts in the western grasslands to support flank advances, mobile assembly, and later garrison duties."
 JAP_war_readiness_bailingmiao_suiyuan_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_bailingmiao_suiyuan_supply_network$§!"
 JAP_war_readiness_jidong_hebei_railway_corridor:0 "Prepare the East Hebei-Hebei Railway Corridor Through the Passes"
 JAP_war_readiness_jidong_hebei_railway_corridor_desc:0 "The War Readiness Construction Bureau will repair the railway corridor through the passes along §YEast Hebei§!, §YBeiping§!, and §YHebei§!, connecting the coastal supply entrance to the transport arteries of the North China interior and providing more reliable land transport for later southward and westward operations."
 JAP_war_readiness_jidong_hebei_railway_corridor_completed:0 "Completed decision: §Y$JAP_war_readiness_jidong_hebei_railway_corridor$§!"
 JAP_war_readiness_shimen_henan_supply_network:0 "Prepare the Shimen-Henan Supply Line"
 JAP_war_readiness_shimen_henan_supply_network_desc:0 "The War Readiness Construction Bureau will move south from §YShimen§! along the existing railway, pass through §YHebei§!, connect to forward nodes in northern §YHenan§!, and establish a supply center. Once all of §YHenan§! is under control, engineering teams will continue repairing the railway into the Central Plains interior, giving the North China inland advance toward the Central Plains steadier rail supply."
 JAP_war_readiness_shimen_henan_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_shimen_henan_supply_network$§!"
 JAP_war_readiness_henan_hubei_supply_network:0 "Prepare the Henan-Hubei Supply Line"
 JAP_war_readiness_henan_hubei_supply_network_desc:0 "The War Readiness Construction Bureau will repair the railway from the southern §YHenan§! supply node toward §YHubei§! and establish a supply center at the Hubei forward node, giving forces operating south from the Central Plains steadier logistics support."
 JAP_war_readiness_henan_hubei_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_henan_hubei_supply_network$§!"
 JAP_war_readiness_beiping_jinan_coastal_supply_network:0 "Prepare the Beiping-Jinan Coastal Supply Line"
 JAP_war_readiness_beiping_jinan_coastal_supply_network_desc:0 "The War Readiness Construction Bureau will use the §YBeiping§! transport hub as the starting point and, as the front advances, repair transport routes toward coastal and inland §YJinan§! in stages. It will expand forward port anchorages, storage, and loading facilities so the northern coast of Shandong is gradually incorporated into the North China supply network."
 JAP_war_readiness_beiping_jinan_coastal_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_beiping_jinan_coastal_supply_network$§!"
 JAP_war_readiness_beiping_jinan_has_supply_pivot.tt:0 "Controls the §YBeiping§! transport hub, or this axis is controlled by our faction."
 JAP_war_readiness_beiping_jinan_has_forward_target.tt:0 "Controls the §YJinan§! coastal or inland forward node, or the Jinan axis is controlled by our faction."
 JAP_war_readiness_beiping_jinan_can_connect_10068_12093.tt:0 "Controls a viable route from §YBeiping§! to the §YJinan§! coastal port, or every state along the route is fully controlled by our faction."
 JAP_war_readiness_beiping_jinan_can_connect_12093_1069.tt:0 "Controls a viable route from the §YJinan§! coastal port to the inland node, or §YJinan§! is fully controlled by our faction."
 JAP_war_readiness_beiping_jinan_can_connect_10068_1069.tt:0 "Fully controls §YJinan§!, and ensures that the route from §YBeiping§! to the Jinan inland node can be used for construction."
 JAP_war_readiness_beiping_jinan_has_ready_segment.tt:0 "At least one unfinished section of the Beiping-Jinan supply project is ready for construction."
 JAP_war_readiness_beiping_jinan_all_segments_completed.tt:0 "All staged sections of the Beiping-Jinan coastal supply line have been completed."
 JAP_war_readiness_qingdao_jiangsu_coastal_supply_network:0 "Prepare the Qingdao-Jiangsu Coastal Supply Line"
 JAP_war_readiness_qingdao_jiangsu_coastal_supply_network_desc:0 "The War Readiness Construction Bureau will carry out coastal logistics works in stages along §YQingdao§!, §YShandong§!, and §YJiangsu§!, expand the anchorages at §YDonghai§! and the southern Jiangsu coast, and lay a short railway toward Donghai so the southern Shandong coast and Jiangsu coastline are gradually connected to the forward supply network."
 JAP_war_readiness_qingdao_jiangsu_coastal_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_qingdao_jiangsu_coastal_supply_network$§!"
 JAP_war_readiness_qingdao_jiangsu_controls_1029.tt:0 "Controls §YDonghai§!."
 JAP_war_readiness_qingdao_jiangsu_controls_9953.tt:0 "Controls the §YSouthern Jiangsu coastal node§!."
 JAP_war_readiness_qingdao_jiangsu_can_connect_7025_1029.tt:0 "Fully controls §YJiangsu§!, and controls the route from §YXuzhou§! toward §YDonghai§!."
 JAP_war_readiness_qingdao_jiangsu_can_connect_1029_9953.tt:0 "Fully controls §YJiangsu§!, and controls §YDonghai§! and the southern Jiangsu coastal node."
 JAP_war_readiness_qingdao_jiangsu_can_connect_10000_1029.tt:0 "Controls the newly prepared short-line nodes from §YQingdao§! to §YDonghai§!."
 JAP_war_readiness_qingdao_jiangsu_has_ready_segment.tt:0 "At least one unfinished section of the Qingdao-Jiangsu coastal supply project is ready for construction."
 JAP_war_readiness_qingdao_jiangsu_all_segments_completed.tt:0 "All staged sections of the Qingdao-Jiangsu coastal supply line have been completed."
 JAP_war_readiness_shanghai_air_naval_base:0 "Prepare Shanghai Air-Sea Base"
 JAP_war_readiness_shanghai_air_naval_base_desc:0 "The War Readiness Construction Bureau will organize harbor, airfield, and fuel and ammunition storage expansion in §YShanghai§!, strengthening fleet berthing, aviation support, and forward supply capacity around the Yangtze estuary."
 JAP_war_readiness_shanghai_air_naval_base_completed:0 "Completed decision: §Y$JAP_war_readiness_shanghai_air_naval_base$§!"
 JAP_war_readiness_shanghai_suzhou_nanjing_railway:0 "Prepare the Shanghai-Suzhou-Nanjing Railway"
 JAP_war_readiness_shanghai_suzhou_nanjing_railway_desc:0 "The War Readiness Construction Bureau will repair the Shanghai-Nanjing railway links along §YShanghai§!, §YSuzhou§!, and §YNanjing§!, connecting the Yangtze estuary port district, the Suzhou transport node, and the forward supply line toward Nanjing into a single system."
 JAP_war_readiness_shanghai_suzhou_nanjing_railway_completed:0 "Completed decision: §Y$JAP_war_readiness_shanghai_suzhou_nanjing_railway$§!"
 JAP_war_readiness_ningbo_wenzhou_coastal_supply_network:0 "Prepare the Ningbo-Wenzhou Sea-Land Supply Line"
 JAP_war_readiness_ningbo_wenzhou_coastal_supply_network_desc:0 "The War Readiness Construction Bureau will repair the Zhejiang coastal railway from §YNingbo§! to §YWenzhou§! and expand the Wenzhou forward anchorage and munitions handling facilities, allowing the southern Zhejiang coast to support larger-scale fleet supply and landing support missions."
 JAP_war_readiness_ningbo_wenzhou_coastal_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_ningbo_wenzhou_coastal_supply_network$§!"
 JAP_war_readiness_ningbo_wenzhou_has_ready_segment.tt:0 "At least one unfinished section of the Ningbo-Wenzhou sea-land supply project is ready for construction."
 JAP_war_readiness_ningbo_wenzhou_all_segments_completed.tt:0 "All staged sections of the Ningbo-Wenzhou sea-land supply line have been completed."
 JAP_war_readiness_fujian_coastal_inland_supply_network:0 "Prepare the Fujian Coastal and Inland Supply Network"
 JAP_war_readiness_fujian_coastal_inland_supply_network_desc:0 "The War Readiness Construction Bureau will prepare railways, harbors, and inland supply nodes in stages along §YWenzhou§!, §YFuzhou§!, §YXiamen§!, and §YGanzhou§!, expand Fujian coastal naval anchorages, and connect the transport pivots of southern Zhejiang and southern §YJiangxi§! into the Fujian forward supply network."
 JAP_war_readiness_fujian_coastal_inland_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_fujian_coastal_inland_supply_network$§!"
 JAP_war_readiness_fujian_coastal_inland_has_ready_segment.tt:0 "At least one unfinished section of the Fujian coastal and inland supply project is ready for construction."
 JAP_war_readiness_fujian_coastal_inland_all_segments_completed.tt:0 "All staged sections of the Fujian coastal and inland supply network have been completed."
 JAP_war_readiness_nanjing_huangshan_supply_network:0 "Prepare the Nanjing-Huangshan Supply Line"
 JAP_war_readiness_nanjing_huangshan_supply_network_desc:0 "The War Readiness Construction Bureau will repair the inland short-line railway from §YNanjing§! toward §YHuangshan§! and establish a supply center at the Huangshan forward node, giving the lower Yangtze inland advance steadier logistics support."
 JAP_war_readiness_nanjing_huangshan_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_nanjing_huangshan_supply_network$§!"
 JAP_war_readiness_changde_supply_network:0 "Prepare the Changde Forward Supply Line"
 JAP_war_readiness_changde_supply_network_desc:0 "The War Readiness Construction Bureau will build in-state forward railway links toward §YChangde§! and establish a supply center at the forward node, giving forces operating in northwestern Hunan steadier logistics support."
 JAP_war_readiness_changde_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_changde_supply_network$§!"
 JAP_war_readiness_northern_guangdong_hunan_supply_network:0 "Prepare the Northern Guangdong-Southern Hunan Supply Line"
 JAP_war_readiness_northern_guangdong_hunan_supply_network_desc:0 "The War Readiness Construction Bureau will repair the short-line railway from northern §YGuangdong§! toward southern §YHunan§! and establish a supply center at the Hunan forward node, allowing the supply line from South China into the Hunan interior to advance along the shortest route."
 JAP_war_readiness_northern_guangdong_hunan_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_northern_guangdong_hunan_supply_network$§!"
 JAP_war_readiness_nanlu_nanning_coastal_railway:0 "Prepare the Nanlu-Nanning Port-Rail Link"
 JAP_war_readiness_nanlu_nanning_coastal_railway_desc:0 "The War Readiness Construction Bureau will expand forward military ports along the §YNanlu§! coast and, depending on control toward Nanning, repair the railway link to §YNanning§!, allowing landing support in western South China and inland advances to connect with each other."
 JAP_war_readiness_nanlu_nanning_coastal_railway_completed:0 "Completed decision: §Y$JAP_war_readiness_nanlu_nanning_coastal_railway$§!"
 JAP_war_readiness_nanlu_nanning_has_ready_segment.tt:0 "At least one unfinished section of the Nanlu-Nanning port-rail project is ready for construction."
 JAP_war_readiness_nanlu_nanning_all_segments_completed.tt:0 "All staged sections of the Nanlu-Nanning port-rail link have been completed."
 JAP_war_readiness_nanning_western_inland_supply_network:0 "Prepare the Nanning-Western Inland Supply Network"
 JAP_war_readiness_nanning_western_inland_supply_network_desc:0 "The War Readiness Construction Bureau will use §YNanning§! as a hub and repair railways in stages toward §YYunnan§!, §YGuangxi§!, and §YGuizhou§!, establishing supply centers at key forward nodes so the western inland advance from South China receives stable logistics support."
 JAP_war_readiness_nanning_western_inland_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_nanning_western_inland_supply_network$§!"
 JAP_war_readiness_nanning_western_inland_has_ready_segment.tt:0 "At least one unfinished section of the Nanning-western inland supply project is ready for construction."
 JAP_war_readiness_nanning_western_inland_all_segments_completed.tt:0 "All staged sections of the Nanning-western inland supply network have been completed."
 JAP_war_readiness_suiyuan_shanxi_hebei_railway:0 "Prepare the Suiyuan-Shanxi-Hebei Railway"
 JAP_war_readiness_suiyuan_shanxi_hebei_railway_desc:0 "The War Readiness Construction Bureau will repair railway links running across the western wing of North China along §YSuiyuan§!, §YShanxi§!, and §YHebei§!, and expand Shanxi air support facilities so the grassland corridor, the Shanxi front, and the Hebei transport network can connect with one another."
 JAP_war_readiness_suiyuan_shanxi_hebei_railway_completed:0 "Completed decision: §Y$JAP_war_readiness_suiyuan_shanxi_hebei_railway$§!"
 JAP_war_readiness_suiyuan_yulin_shanxi_supply_network:0 "Prepare the Suiyuan-Yulin-Shanxi Supply Line"
 JAP_war_readiness_suiyuan_yulin_shanxi_supply_network_desc:0 "The War Readiness Construction Bureau will extend the supply line from §YSuiyuan§! toward §YOrdos§! and §YYulin§!, while also repairing the inland railway and forward supply nodes from §YTaiyuan§! to §YYulin§!, strengthening depth logistics on the western wing of North China."
 JAP_war_readiness_suiyuan_yulin_shanxi_supply_network_completed:0 "Completed decision: §Y$JAP_war_readiness_suiyuan_yulin_shanxi_supply_network$§!"
 JAP_war_readiness_suiyuan_yulin_shanxi_has_ready_segment.tt:0 "At least one unfinished section of the Suiyuan-Yulin-Shanxi supply project is ready for construction."
 JAP_war_readiness_suiyuan_yulin_shanxi_all_segments_completed.tt:0 "All staged sections of the Suiyuan-Yulin-Shanxi supply line have been completed."
 JAP_ai_extra_equipment_grant_loop_start:0 "Start Land-Air Dynamic Supply Cycle"
 JAP_ai_extra_equipment_grant_loop_start_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, has more than §Y100§! military factories, it may start the land-air dynamic equipment supply cycle. Equipment quantity and type depend on the selected difficulty and are also affected by the dynamic multiplier. The system will immediately attempt to resolve the first round of additional army and air equipment, then rotate automatically every §Y60§! days. Players who want to use this system must first select a Rance difficulty and create the corresponding templates and equipment designs through decisions."
 JAP_ai_extra_equipment_grant_loop_start_tt:0 "Immediately attempts to resolve one round of §Yadditional land-air equipment supply§! based on the current dynamic multiplier and starts a cycle every §Y60§! days.\nIf the startup rule §Y$RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY$§! is set to §RNo§!, this round will not actually grant equipment."
 JAP_ai_extra_equipment_grant_cycle_mission:0 "Land-Air Dynamic Supply Rotation"
 JAP_ai_extra_equipment_grant_cycle_mission_desc:0 "Land-air dynamic equipment supply has started. Every §Y60§! days, the system rechecks Japanese AI assistance status, the land-air dynamic supply rule, and the current difficulty, then attempts to grant additional army and air equipment based on the current dynamic multiplier. Players who want to use it must first select a Rance difficulty and create the corresponding templates and equipment designs through decisions."
 JAP_ai_extra_equipment_grant_cycle_mission_tt:0 "At the end of this round, if the §YJapanese AI assistance check§! is still met and the startup rule §Y$RANCE_JAPAN_AI_LAND_AIR_DYNAMIC_SUPPLY$§! is set to §YYes§!, §Yadditional land-air equipment supply§! will be resolved based on the current dynamic multiplier.\nThe next §Y60-day§! timer will then be restarted."
 JAP_ai_navy_ship_grant_loop_start:0 "Start Semiannual Naval Ship Dynamic Supply"
 JAP_ai_navy_ship_grant_loop_start_desc:0 "From §YJune 1, 1939§!, the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, may start the naval ship dynamic supply cycle. The system will immediately attempt to resolve the first round of ship supply, then rotate automatically every §Y180§! days. Players who want to use it must first select a Rance difficulty and create ship designs through decisions; ship class names are used by the script to locate target designs, so manually renaming them after creation may cause ship supply to fail."
 JAP_ai_navy_ship_grant_loop_start_tt:0 "Immediately attempts to resolve one round of §Ynaval ship supply§! based on the current dynamic multiplier and starts a cycle every §Y180§! days.\nIf the startup rule §Y$RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY$§! is set to §RNo§!, this round will not actually grant ships.\nPlayers should first select a Rance difficulty and create ship designs through decisions; manually changing ship class names may cause ship supply to fail."
 JAP_ai_navy_ship_grant_cycle_mission:0 "Semiannual Naval Ship Dynamic Supply Rotation"
 JAP_ai_navy_ship_grant_cycle_mission_desc:0 "Naval ship dynamic supply has started. Every §Y180§! days, the system rechecks Japanese AI assistance status, the naval dynamic supply rule, and the current difficulty, then attempts to grant the corresponding ship package based on the dynamic multiplier. Players who want to use it must first select a Rance difficulty and create ship designs through decisions; manually renaming ship class names after creation may cause ship supply to fail."
 JAP_ai_navy_ship_grant_cycle_mission_tt:0 "At the end of this round, if the §YJapanese AI assistance check§! is still met and the startup rule §Y$RANCE_JAPAN_AI_NAVY_DYNAMIC_SUPPLY$§! is set to §YYes§!, §Ynaval ship supply§! will be resolved based on the current dynamic multiplier.\nThe next §Y180-day§! timer will then be restarted."
