 JAP_rai_free_officer_group:0 "AI Acquires Officer Corps Spirits"
 JAP_rai_free_mio_size:0 "AI One-Click MIO"
 JAP_rai_normal_general:0 "AI Army Leader Enhancement: §6EN§! Tier"
 JAP_rai_normal_general_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, is in the §YEN§! tier, raises all army leaders to at least skill §Y4§! and adds basic combat traits. It also adds Logistics Wizard, Thorough Planner, and Expert Delegator to all current field marshals. Newly gained army leaders and newly promoted field marshals will also be automatically enhanced according to the current tier."
 JAP_rai_hard_general:0 "AI Army Leader Enhancement: §4HL§! Tier"
 JAP_rai_hard_general_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, is in the §YHL§! tier, raises all army leaders to at least skill §Y7§! and adds basic, mountain, hill, armored warfare, and adaptable traits. It also adds Aggressive Assaulter and Defensive Doctrine to all current field marshals on top of the EN tier. Newly gained army leaders and newly promoted field marshals will also be automatically enhanced according to the current tier."
 JAP_rai_lunatic_general:0 "AI Army Leader Enhancement: §OEXPH§! Tier"
 JAP_rai_lunatic_general_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, is in the §YEXPH§! tier, raises all army leaders to at least skill §Y9§! and completes special forces, invasion, multi-terrain, fortress, ambush, and guerrilla warfare traits. It also adds Inspirational Leader and Organisational Leader to all current field marshals on top of the HL tier. Newly gained army leaders and newly promoted field marshals will also be automatically enhanced according to the current tier."
 JAP_rai_normal_admiral:0 "AI Navy Leader Enhancement: §6EN§! Tier"
 JAP_rai_normal_admiral_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, is in the §YEN§! tier, raises all navy leaders to at least skill §Y4§! and adds basic fleet combat traits. Newly gained navy leaders will also be automatically enhanced according to the current tier."
 JAP_rai_hard_admiral:0 "AI Navy Leader Enhancement: §4HL§! Tier"
 JAP_rai_hard_admiral_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, is in the §YHL§! tier, raises all navy leaders to at least skill §Y7§! and adds Concealment Expert, Lancer, Torpedo Expert, Destroyer Leader, Cruiser Captain, Flight Deck Manager, and other traits. Newly gained navy leaders will also be automatically enhanced according to the current tier."
 JAP_rai_lunatic_admiral:0 "AI Navy Leader Enhancement: §OEXPH§! Tier"
 JAP_rai_lunatic_admiral_desc:0 "When the Japanese AI, or a Japanese player with the startup rule §Y$RANCE_JAPAN_PLAYER_AI_CHEATS$§! set to §YYes§!, is in the §YEXPH§! tier, raises all navy leaders to at least skill §Y9§! and completes decisive battle, escort, carrier, torpedo, and coastal/blue-water warfare traits. Newly gained navy leaders will also be automatically enhanced according to the current tier."
 JAP_ai_opening_equipment_resupply:0 "AI Opening Land-Air Equipment Supply"
 JAP_ai_opening_equipment_resupply_desc:0 "Before the 45-day equipment cycle starts, supplies the Japanese AI with line infantry equipment and grants §Y100§! light fighters and §Y50§! close air support aircraft."
 JAP_ai_emergency_motorized_equipment_resupply:0 "AI Emergency Truck Supply"
 JAP_ai_emergency_motorized_equipment_resupply_desc:0 "When the truck stockpile is below §Y500§!, immediately supplies the Japanese AI with §Y1000§! trucks."
 JAP_ai_emergency_train_equipment_resupply:0 "AI Emergency Train Supply"
 JAP_ai_emergency_train_equipment_resupply_desc:0 "When the train stockpile is below §Y100§!, immediately supplies the Japanese AI with §Y200§! trains."
 JAP_ai_expand_infrastructure:0 "AI Mass Infrastructure Expansion"
 JAP_ai_expand_infrastructure_desc:0 "Expands infrastructure in eligible controlled states to support Japanese AI logistics."

# Imperial General Headquarters
 JAP_imperial_headquarters_decisions:0 "Imperial General Headquarters"
 JAP_imperial_headquarters_decisions_desc:0 "The Imperial General Headquarters coordinates §Y[ROOT.GetName]§!'s army and navy operations, homeland defense, and general mobilization plans, aligning the Army General Staff, the Naval General Staff, and government agencies to carry out the strategic deployments under §Y[JAP_the_imperial_defense_plan_key]§!."
 JAP_imperial_headquarters_landing_operations_decisions:0 "Imperial General Headquarters - Landing Operations Directives"
 JAP_imperial_headquarters_landing_operations_decisions_desc:0 "The Imperial General Headquarters handles landing operations, surprise attacks, and oceanic preparations as a separate set of directives, allowing landing capacity, staging points, warnings, and raid tempo to be coordinated across each axis of advance."
 JAP_unlock_imperial_headquarters_decisions_tt:0 "Unlock decision categories: §YImperial General Headquarters§! and §YImperial General Headquarters - Landing Operations Directives§!"
 JAP_imperial_headquarters_forge_chinese_claims:0 "Forge Claims on China"
 JAP_imperial_headquarters_forge_chinese_claims_desc:0 "The Imperial General Headquarters will organize the military and political records accumulated since the North China Incident into claim documents sufficient to support territorial demands across all of China, providing the pretext for subsequent military action."
 JAP_imperial_headquarters_subjugate_chinese_remnant:0 "Pacify [FROM.GetNameDef]"
 JAP_imperial_headquarters_subjugate_chinese_remnant_desc:0 "With the National Government and the main Chinese Communist regime successively collapsing, the Imperial General Headquarters will issue a final ultimatum to [FROM.GetNameDef], prepare full territorial claims, and secure a war goal for annexation."
 JAP_imperial_headquarters_declare_victory_in_china:0 "Declare Victory in the China War"
 JAP_imperial_headquarters_declare_victory_in_china_desc:0 "With the National Government and the Chinese Communist regime successively destroyed, the Imperial General Headquarters will formally declare that the main phase of the China War has ended and fold the China theater into the total mobilization system of the §YGreater Asian War§!."
 JAP_imperial_headquarters_establish_asia_pacific_supply_system:0 "Establish the Asia-Pacific Supply System"
 JAP_imperial_headquarters_establish_asia_pacific_supply_system_desc:0 "The Imperial General Headquarters will extend wartime logistics across Asia, the Middle East, and Australia, organizing ports, roads, depots, and staging areas into a supply framework for the Greater Asian War."
 JAP_imperial_headquarters_establish_asia_pacific_supply_system_tt:0 "Adds the §YGreater Asian War§! state modifier to §YAsia§!, the §YMiddle East§!, and §YAustralia§!. It applies regardless of controller and affects both friendly and enemy forces."
 JAP_imperial_headquarters_prepare_us_mainland_invasion:0 "Prepare the Landing on the American Mainland"
 JAP_imperial_headquarters_prepare_us_mainland_invasion_desc:0 "Hawaii has become the forward base for crossing the Pacific. The Imperial General Headquarters will prepare oceanic routes, landing fleets, and the American theater supply system, opening the way for the final landing on the United States mainland."
 JAP_imperial_headquarters_prepare_us_mainland_invasion_tt:0 "Gain §Y180 days§! of §YAmerican Mainland Landing Preparation§!, and add American theater supply and operations modifiers to all states in §YNorth America§! and §YSouth America§!: supply effects apply to both sides, while attack and defense bonuses apply only to §YJapanese§! units."
 JAP_imperial_headquarters_force_war_on_siam:0 "Authorize Operations Against Siam"
 JAP_imperial_headquarters_force_war_on_siam_desc:0 "Siam lies between Indochina and Malaya, an unavoidable land corridor for southern operations. If Bangkok remains outside the major factions and has not yet submitted, the Imperial General Headquarters may issue the final operational order to open the overland gate to Malaya."
 JAP_imperial_headquarters_force_war_on_siam_tt:0 "§RImmediately declares war on Siam.§!"
 JAP_imperial_headquarters_demand_portuguese_asian_territories:0 "Demand Portugal's Asian Territories"
 JAP_imperial_headquarters_demand_portuguese_asian_territories_desc:0 "§YNanshin-ron§! has become the empire's strategic course. The Imperial General Headquarters will present [POR.GetNameDef] with an ultimatum demanding the transfer of all its colonial territories in Asia. If Lisbon refuses to withdraw, we will gain war goals to seize these bases."
 JAP_imperial_headquarters_authorize_delayed_pacific_war:0 "Authorize Pacific Operations"
 JAP_imperial_headquarters_authorize_delayed_pacific_war_desc:0 "Operations toward Southeast Asia and the East Indies-Australia-New Zealand axis have reached the expected stage. The Imperial General Headquarters will begin 30 days of operational preparation toward the United States and the Philippines while easing the relevant restrictions on independent Pearl Harbor raids; once preparations are complete, the delayed Pacific war goals will be formally released."
 JAP_scripted_landing_naval_strength_available_tt:0 "Meets the naval strength threshold dynamically adjusted by the selected difficulty"
 JAP_scripted_landing_capacity_available_tt:0 "There is still available landing plan capacity"
 JAP_scripted_landing_eia_plan_slot_available_tt:0 "The East Indies-Australia-New Zealand axis still has a landing preparation slot available"

# Scripted landing operations
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam:0 "§CLanding Toward Siam from Hainan§!"
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_desc:0 "The Imperial General Headquarters will anchor the operation on §CHainan§!, assemble landing forces, organize maritime transport, and prepare to open the attack route toward §RSiam§! under air and naval cover. If repeated diversionary pressure exposes a gap in the enemy line, this operation will become an immediate surprise landing."
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_plan_tt:0 "§O[?JAP_scripted_landing_raid_remaining|0]§! more successful landing operations are required before a surprise attack can be launched.\nThis operation is a §Oregular landing§!: the defenders of §RSiam§! will receive a landing warning. After §O30 days§!, if §CHainan§! can still serve as an operational staging point and §RSiam§! remains under enemy control, a medium-scale landing will be launched there, disrupting local defensive deployments and causing some combat losses."
 JAP_imperial_headquarters_scripted_landing_hainan_to_siam_raid_tt:0 "§RThis operation will launch an immediate surprise landing.§!\nWhen this decision is selected, a medium-scale surprise landing will immediately be launched from §CHainan§! against §RSiam§!, disrupting local defensive deployments and causing heavier combat losses. After the surprise attack is complete, the operation will still occupy the corresponding landing preparation capacity and must wait §O30 days§! for reorganization before it can be assigned again."
 JAP_imperial_headquarters_scripted_landing_hainan_to_malaya:0 "§CLanding Toward Malaya from Hainan§!"
 JAP_imperial_headquarters_scripted_landing_hainan_to_malaya_desc:0 "The Imperial General Headquarters will anchor the operation on §CHainan§!, assemble landing forces, organize maritime transport, and prepare to open the attack route toward §RMalaya§! under air and naval cover. If repeated diversionary pressure exposes a gap in the enemy line, this operation will become an immediate surprise landing."
 JAP_imperial_headquarters_scripted_landing_hainan_to_malaya_plan_tt:0 "§O[?JAP_scripted_landing_raid_remaining|0]§! more successful landing operations are required before a surprise attack can be launched.\nThis operation is a §Oregular landing§!: the defenders of §RMalaya§! will receive a landing warning. After §O30 days§!, if §CHainan§! can still serve as an operational staging point and §RMalaya§! remains under enemy control, a medium-scale landing will be launched there, disrupting local defensive deployments and causing some combat losses."
 JAP_imperial_headquarters_scripted_landing_hainan_to_malaya_raid_tt:0 "§RThis operation will launch an immediate surprise landing.§!\nWhen this decision is selected, a medium-scale surprise landing will immediately be launched from §CHainan§! against §RMalaya§!, disrupting local defensive deployments and causing heavier combat losses. After the surprise attack is complete, the operation will still occupy the corresponding landing preparation capacity and must wait §O30 days§! for reorganization before it can be assigned again."
 JAP_imperial_headquarters_scripted_landing_malaya_to_pegu:0 "§CLanding Toward Pegu from Malaya§!"
 JAP_imperial_headquarters_scripted_landing_malaya_to_pegu_desc:0 "The Imperial General Headquarters will anchor the operation on §CMalaya§!, assemble landing forces, organize maritime transport, and prepare to open the attack route toward §RPegu§! under air and naval cover. If repeated diversionary pressure exposes a gap in the enemy line, this operation will become an immediate surprise landing."
