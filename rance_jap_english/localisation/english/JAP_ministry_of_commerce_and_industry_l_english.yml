l_english:
 JAP_ministry_of_commerce_and_industry_decisions:0 "Ministry of Commerce and Industry"
 JAP_ministry_of_commerce_and_industry_decisions_desc:0 "The Ministry of Commerce and Industry oversees §Y[ROOT.GetName]§!'s commercial and industrial policy, industrial preparation, and production controls, coordinating civilian industry, resource allocation, and corporate management to strengthen national economic mobilization and industrial development."
 JAP_shoko_special_charter:0 "Commerce Ministry Special Charter"
 JAP_shoko_special_charter_desc:0 "A construction charter issued by the §YMinistry of Commerce and Industry§! to selected regions. Approved regions receive additional administrative coordination and resource priority while projects are underway, improving local construction efficiency."
 JAP_unlock_ministry_of_commerce_and_industry_decisions_tt:0 "After the §Ypolitical situation stabilizes§!, unlock decision category: §YMinistry of Commerce and Industry§!."
 JAP_shoko_develop_kanto:0 "Develop Kanto"
 JAP_shoko_develop_kanto_desc:0 "§YKanto§! generally refers to the broad region of eastern Honshu centered on §YTokyo§!, one of Japan's most developed centers of §Ypolitics, economy, culture, and transportation§!. It is usually understood to include §YTokyo§!, §YKanagawa§!, §YSaitama§!, §YChiba§!, §YIbaraki§!, §YTochigi§!, and §YGunma§!.\n\nThe region combines the bustle of §Ymodern metropolitan centers§! with natural scenery and long-standing cultural traditions. §YTokyo§!, as Japan's capital, is an §Yinternational center of finance, commerce, and fashion§!; §YYokohama§! has a distinct port character; and §YKamakura§! preserves a strong historical atmosphere.\n\nAt the same time, §YKanto§! possesses a developed transport network, convenient living conditions, and highly concentrated §Yeducation, technology, and industrial resources§!, attracting both domestic population flows and visitors from abroad."
 JAP_shoko_develop_kanto_mission:0 "Kanto Development Plan"
 JAP_shoko_develop_kanto_mission_desc:0 "The §YMinistry of Commerce and Industry§! is working with the relevant agencies on the §YKanto Regional Improvement Plan§!, expanding the functions of the §Ycapital region§! to meet growing §Yadministrative, transport, and industrial demands§! under the §Ywartime system§!, while also improving local §Ypower transmission§! capacity.\n\nThe works are still underway, and their §Yprogress and results§! will guide subsequent §Yinvestment and expansion policy§!."
 JAP_shoko_develop_tokaido:0 "Develop Tokaido"
 JAP_shoko_develop_tokaido_desc:0 "§YTokaido§! lies along the Pacific coast of Honshu and has long formed the transport and industrial corridor linking §YTokyo§! with §YKansai§!. Its dense network of ports, railways, and cities gives it advantages in heavy industry, commercial distribution, and population concentration, making it one of the most promising economic arteries of the §Y[ROOT.GetName]§! home islands."
 JAP_shoko_develop_tokaido_mission:0 "Tokaido Development Plan"
 JAP_shoko_develop_tokaido_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving the §YTokaido§! region to strengthen its §Yindustrial production§!, §Ytransport coordination§!, §Ypower transmission§!, and §Yair research capabilities§!. Completing the infrastructure and factory expansion within the allotted period will further reinforce its role as an economic trunk line of §Y[ROOT.GetName]§!."
 JAP_shoko_develop_kansai:0 "Develop Kansai"
 JAP_shoko_develop_kansai_desc:0 "§YKansai§! is one of Japan's traditional centers of politics, commerce, and industry, encompassing major cities such as §YOsaka§!, §YKyoto§!, and §YKobe§!. It is both a major industrial base of the §Y[ROOT.GetName]§! home islands and a core region linking Inland Sea shipping, railway trunk lines, and urban consumer markets."
 JAP_shoko_develop_kansai_mission:0 "Kansai Development Plan"
 JAP_shoko_develop_kansai_mission_desc:0 "The §YMinistry of Commerce and Industry§! is coordinating with the relevant agencies to improve §YKansai§!, strengthening its §Yindustrial carrying capacity§!, §Ytransport coordination§!, and §Ypower transmission§!. Completing the infrastructure and military factory expansion on time will further secure its status as the western industrial center of §Y[ROOT.GetName]§!."
 JAP_shoko_develop_sanyo:0 "Develop Sanyo"
 JAP_shoko_develop_sanyo_desc:0 "§YSanyo§! stretches along the Seto Inland Sea, with numerous ports, industrial cities, and transport nodes, making it a major commercial and industrial belt of western Honshu. Further infrastructure improvements and civilian industrial expansion could strengthen its overall function as the Inland Sea economic corridor of §Y[ROOT.GetName]§!."
 JAP_shoko_develop_sanyo_mission:0 "Sanyo Development Plan"
 JAP_shoko_develop_sanyo_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YSanyo§! to strengthen its §Yindustrial production§!, §Yport traffic§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further increase its support for §Y[ROOT.GetName]§!'s home-island industrial system."
 JAP_shoko_develop_north_kyushu:0 "Develop Northern Kyushu"
 JAP_shoko_develop_north_kyushu_desc:0 "§YNorthern Kyushu§! sits at Japan's western edge and combines coal and iron resources, strong port conditions, and an established industrial base. It is an important heavy industrial and maritime transport node of the §Y[ROOT.GetName]§! home islands. Further infrastructure improvements and civilian industrial expansion could strengthen its position as a western industrial and logistics core."
 JAP_shoko_develop_north_kyushu_mission:0 "Northern Kyushu Development Plan"
 JAP_shoko_develop_north_kyushu_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YNorthern Kyushu§! to strengthen its §Yindustrial production§!, §Yport traffic§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further increase its support for §Y[ROOT.GetName]§!'s western industrial system."
 JAP_shoko_develop_hokuriku:0 "Develop Hokuriku"
 JAP_shoko_develop_hokuriku_desc:0 "§YHokuriku§! faces the Sea of Japan and combines ports, mountain transport routes, and a local industrial base, making it an important regional support point in north-central Honshu. Continued infrastructure improvement and civilian industrial expansion will strengthen its capacity to sustain §Y[ROOT.GetName]§!'s northern economy and rear-area industry."
 JAP_shoko_develop_hokuriku_mission:0 "Hokuriku Development Plan"
 JAP_shoko_develop_hokuriku_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YHokuriku§! to strengthen its §Yindustrial production§!, §Ytransport coordination§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further reinforce its support for §Y[ROOT.GetName]§!'s northern industrial system."
 JAP_shoko_develop_koshinetsu:0 "Develop Koshinetsu"
 JAP_shoko_develop_koshinetsu_desc:0 "§YKoshinetsu§! spans central Honshu, combining mountain resources, inland transport, and coastal port connections into an important region linking the Sea of Japan with interior markets. Further infrastructure improvements and dockyard expansion can greatly improve its support for §Y[ROOT.GetName]§!'s shipping and rear-area industrial systems."
 JAP_shoko_develop_koshinetsu_mission:0 "Koshinetsu Development Plan"
 JAP_shoko_develop_koshinetsu_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YKoshinetsu§! to strengthen its §Ycoastal industry§!, §Ytransport links§!, and §Ypower transmission§!. Completing the infrastructure and dockyard expansion on time will further reinforce its support for §Y[ROOT.GetName]§!'s shipping system and rear-area industry."
 JAP_shoko_develop_sanin:0 "Develop Sanin"
 JAP_shoko_develop_sanin_desc:0 "§YSanin§! stretches along the Sea of Japan, with ports, mineral resources, and local industry, making it an important regional support point in northwestern Honshu. Continued infrastructure improvement and civilian industrial expansion will strengthen its capacity to sustain §Y[ROOT.GetName]§!'s western rear-area industry and coastal transport."
 JAP_shoko_develop_sanin_mission:0 "Sanin Development Plan"
 JAP_shoko_develop_sanin_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YSanin§! to strengthen its §Yindustrial production§!, §Ytransport links§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will expand local §Yindustrial carrying space§! and provide a more stable §Ypower-grid base§! for later military production."
 JAP_shoko_develop_shikoku:0 "Develop Shikoku"
 JAP_shoko_develop_shikoku_desc:0 "§YShikoku§! lies between the Seto Inland Sea and the Pacific, with ports, coastal transport, and a local industrial base. It is an important node in §Y[ROOT.GetName]§!'s Inland Sea shipping and western Japanese coastal transport. Continued infrastructure improvement and civilian industrial expansion will strengthen its capacity to support shipping and rear-area industry."
 JAP_shoko_develop_shikoku_mission:0 "Shikoku Development Plan"
 JAP_shoko_develop_shikoku_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YShikoku§! to strengthen its §Yindustrial production§!, §Yport traffic§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further reinforce its support for §Y[ROOT.GetName]§!'s Inland Sea shipping system."
 JAP_shoko_develop_south_kyushu:0 "Develop Southern Kyushu"
 JAP_shoko_develop_south_kyushu_desc:0 "§YSouthern Kyushu§! faces the Pacific and the East China Sea, combining ports, coastal shipping, and a local industrial base. It is an important southwestern maritime and rear-area industrial node for §Y[ROOT.GetName]§!. Continued infrastructure improvement and civilian industrial expansion will strengthen its support for dockyard construction and the shipping system."
 JAP_shoko_develop_south_kyushu_mission:0 "Southern Kyushu Development Plan"
 JAP_shoko_develop_south_kyushu_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YSouthern Kyushu§! to strengthen its §Yindustrial production§!, §Yport traffic§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further reinforce its support for §Y[ROOT.GetName]§!'s southern shipping system and dockyard construction."
 JAP_shoko_develop_tohoku:0 "Develop Tohoku"
 JAP_shoko_develop_tohoku_desc:0 "§YTohoku§! spans northern Honshu, with broad territory, agricultural and forestry output, mineral resources, and coastal ports. It is an important hinterland for §Y[ROOT.GetName]§!'s northern reserve industry and transport system. Coordinated improvement of both §YSouthern Tohoku§! and §YNorthern Tohoku§! will further increase local support for industrial production, transport links, and wartime rear-area systems."
 JAP_shoko_develop_south_tohoku_mission:0 "Southern Tohoku Development Plan"
 JAP_shoko_develop_south_tohoku_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YSouthern Tohoku§! to strengthen its §Yindustrial production§!, §Ytransport links§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further increase its support for §Y[ROOT.GetName]§!'s northern industrial system."
 JAP_shoko_develop_north_tohoku_mission:0 "Northern Tohoku Development Plan"
 JAP_shoko_develop_north_tohoku_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YNorthern Tohoku§! to strengthen its §Yindustrial production§!, §Ytransport links§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further secure its status as a northern reserve industry and transport node for §Y[ROOT.GetName]§!."
 JAP_shoko_develop_hokkaido:0 "Develop Hokkaido"
 JAP_shoko_develop_hokkaido_desc:0 "§YHokkaido§! lies on the northern frontier of §Y[ROOT.GetName]§!, with vast territory, agriculture, forestry, fisheries, minerals, and port conditions. It is an important support point for §Y[ROOT.GetName]§!'s northern development and rear-area industry. Continued infrastructure improvement and civilian industrial expansion will increase its capacity for military production, energy transmission, and northern transport."
 JAP_shoko_develop_hokkaido_mission:0 "Hokkaido Development Plan"
 JAP_shoko_develop_hokkaido_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YHokkaido§! to strengthen its §Yindustrial production§!, §Ytransport links§!, and §Ypower transmission§!. Completing the infrastructure and civilian industry expansion on time will further support §Y[ROOT.GetName]§!'s northern military supply system while promoting §Yregional development§!."
 JAP_shoko_develop_shanghai:0 "Develop Shanghai"
 JAP_shoko_develop_shanghai_desc:0 "§YShanghai§!, located at the mouth of the Yangtze, is one of §Y[ROOT.GetName]§!'s most important ports, industrial centers, and commercial hubs in Central China. Continued infrastructure improvements and dockyard expansion will further strengthen its support for shipping, industrial coordination, and the coastal economy."
 JAP_shoko_develop_shanghai_mission:0 "Shanghai Development Plan"
 JAP_shoko_develop_shanghai_mission_desc:0 "The §YMinistry of Commerce and Industry§! is improving §YShanghai§! to strengthen its §Yport transport§!, §Yindustrial coordination§!, and §Ypower transmission§!. Completing the infrastructure and dockyard expansion on time will further secure its status as a coastal industrial and shipping node for §Y[ROOT.GetName]§!."

